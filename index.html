<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oggy Adventure</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #d1fae5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #a5f3fc 0%, #22d3ee 40%, #0891b2 100%);
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let lastTime = performance.now();

        // ─── CrazyGames SDK v3 Integration ───────────────────────────────────
        let cgSDK = null;

        async function initCrazyGamesSDK() {
            try {
                // Wait for the SDK script to finish loading before using it
                await new Promise((resolve, reject) => {
                    if (window.CrazyGames && window.CrazyGames.SDK) {
                        resolve();
                    } else {
                        const sdkScript = document.querySelector('script[src*="crazygames-sdk"]');
                        if (sdkScript) {
                            sdkScript.addEventListener("load", resolve);
                            sdkScript.addEventListener("error", reject);
                        } else {
                            reject(new Error("CrazyGames SDK script not found"));
                        }
                    }
                });
                await window.CrazyGames.SDK.init();
                cgSDK = window.CrazyGames.SDK;

                // Respect CrazyGames platform mute setting
                const settings = cgSDK.game.settings;
                if (settings && settings.muteAudio) {
                    isMuted = true;
                    localStorage.setItem("frogGameMuted", true);
                }
                // Listen for settings changes (e.g. user mutes from platform)
                cgSDK.game.addSettingsChangeListener((newSettings) => {
                    if (newSettings.muteAudio && !isMuted) {
                        isMuted = true;
                        stopBgMusic();
                    }
                });

                cgSDK.game.loadingStart();
            } catch (e) {
                console.warn("CrazyGames SDK init failed:", e);
            }
        }

        function cgGameplayStart() {
            try { if (cgSDK) cgSDK.game.gameplayStart(); } catch(e) {}
        }

        function cgGameplayStop() {
            try { if (cgSDK) cgSDK.game.gameplayStop(); } catch(e) {}
        }

        function cgHappyTime() {
            try { if (cgSDK) cgSDK.game.happytime(); } catch(e) {}
        }

        function cgRequestMidgameAd(onDone) {
            if (!cgSDK) { if (onDone) onDone(); return; }
            try {
                cgSDK.ad.requestAd("midgame", {
                    adStarted: () => {
                        // Pause game & mute audio during ad
                        stopBgMusic();
                        cgGameplayStop();
                    },
                    adFinished: () => {
                        // Resume audio & game after ad
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    },
                    adError: (err) => {
                        console.warn("CrazyGames ad error:", err);
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    }
                });
            } catch(e) {
                if (onDone) onDone();
            }
        }
        // ─────────────────────────────────────────────────────────────────────

        let audioCtx = null;
        let bgMusicInterval = null;
        let activeMusicNodes = [];
        let isMuted = localStorage.getItem("frogGameMuted") === 'true';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) startBgMusic();
            }
        }

        function playPluckedNote(freq, duration, volume = 0.05, type = "sine") {
            if (!audioCtx || isMuted || freq <= 0) return;
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            
            activeMusicNodes.push({ osc, gainNode });
        }

        function playTone(freq, type, duration, vol = 0.08, startTimeOffset = 0) {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTimeOffset);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTimeOffset + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

        function playJumpSound() {
            playTone(392.00, "sine", 0.15, 0.05);
            playTone(523.25, "sine", 0.12, 0.03, 0.03);
        }

        function playStarSound(isBoost) {
            if (isBoost) {
                playTone(523.25, "sine", 0.1, 0.04);
                playTone(659.25, "sine", 0.1, 0.04, 0.03);
                playTone(783.99, "sine", 0.15, 0.04, 0.06);
            } else {
                playTone(523.25, "sine", 0.08, 0.04);
                playTone(783.99, "sine", 0.12, 0.04, 0.03);
            }
        }

        function playSlowdownSound() {
            playTone(880.00, "sine", 0.12, 0.03);
            playTone(698.46, "sine", 0.12, 0.03, 0.05);
            playTone(523.25, "sine", 0.18, 0.03, 0.1);
        }

        function playCrashSound() {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBgMusic() {
            if (!audioCtx || isMuted) return;
            stopBgMusic();

            let melody = [
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                329.63, 392.00, 523.25, 392.00, 293.66, 349.23, 392.00, 0,
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                392.00, 440.00, 493.88, 523.25, 587.33, 0, 523.25, 0
            ];

            let harmony = [
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                196.00, 0, 196.00, 0, 146.83, 0, 196.00, 0,
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                146.83, 0, 196.00, 0, 261.63, 0, 196.00, 0
            ];

            let index = 0;
            let noteDuration = 0.22;

            bgMusicInterval = setInterval(() => {
                if (audioCtx && !isMuted) {
                    let currentNote = melody[index % melody.length];
                    let currentBass = harmony[index % harmony.length];
                    if (currentNote > 0) playPluckedNote(currentNote, 0.35, 0.035, "triangle");
                    if (currentBass > 0) playPluckedNote(currentBass, 0.5, 0.025, "sine");
                    index++;
                }
            }, noteDuration * 1000);
        }

        function stopBgMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
            activeMusicNodes.forEach(node => {
                try { node.osc.stop(); } catch(e) {}
            });
            activeMusicNodes = [];
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem("frogGameMuted", isMuted);
            if (!audioCtx) return; 

            if (isMuted) {
                stopBgMusic();
            } else {
                startBgMusic();
            }
        }

        let totalStars = parseInt(localStorage.getItem("frogTotalStars")) || 0;
        let unlockedSkins = JSON.parse(localStorage.getItem("frogUnlockedSkins")) || ["classic"];
        let currentSkin = localStorage.getItem("frogCurrentSkin") || "classic";
        let shopIndex = 0; 

        const skinsData = [
            { id: "classic", name: "Lime Whimsical", cost: 0, color: "#a3e635", belly: "#fef08a", comingSoon: false },
            { id: "ruby", name: "Blossom Pink", cost: 200, color: "#f43f5e", belly: "#ffe4e6", comingSoon: false },
            { id: "student", name: "Sky Blue", cost: 400, color: "#38bdf8", belly: "#e0f2fe", comingSoon: false },
            { id: "ninja", name: "Deep Teal", cost: 600, color: "#0f766e", belly: "#ccfbf1", comingSoon: false },
            { id: "wizard", name: "Magic Purple", cost: 800, color: "#c084fc", belly: "#f3e8ff", comingSoon: false },
            { id: "royal", name: "Bright Gold", cost: 1000, color: "#fbbf24", belly: "#fef3c7", comingSoon: false },
            { id: "cyber", name: "Neon Mint", cost: 1250, color: "#2dd4bf", belly: "#f1f5f9", comingSoon: true },
            { id: "party", name: "Rave Magenta", cost: 1500, color: "#f472b6", belly: "#ecfeff", comingSoon: true },
            { id: "alien", name: "Galaxy Alien", cost: 2000, color: "#a855f7", belly: "#22c55e", comingSoon: true }
        ];

        let showDailyBonusBanner = false;
        let dailyBonusAlreadyClaimed = false;
        let bannerTimer = 0;

        function checkDailyLogin() {
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem("frogLastVisitDate");
            
            if (lastVisit !== today) {
                totalStars += 20;
                localStorage.setItem("frogTotalStars", totalStars);
                localStorage.setItem("frogLastVisitDate", today);
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = false;
                bannerTimer = 180; 
            } else {
                // Already claimed today — show a reminder on the home page
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = true;
                bannerTimer = 180;
            }
        }
        checkDailyLogin();

        // Init SDK; signal loading complete once the page is ready
        initCrazyGamesSDK().then(() => {
            try { if (cgSDK) { cgSDK.game.loadingStop(); cgGameplayStop(); } } catch(e) {}
        });

        let gameState = "START_MENU"; 

        let frogX = 100;
        let frogY = 300;
        let frogRadius = 16;
        let velocity = 0;
        let gravity = 0.4;
        let jumpStrength = -7.5;
        let score = 0;
        let starsCollectedThisRound = 0;
        let isPaused = false;
        let highScore = localStorage.getItem("frogHighScore") || 0;

        // Celebration banners
        let personalBestBanner = false;
        let personalBestTimer = 0;
        let milestoneBanner = null;           // { score, timer }
        let milestonesReachedThisRun = new Set(); // avoid duplicate banners

        // Start screen animated frog
        let startScreenFrogY = 200;
        let startScreenFrogVel = 0;
        let startScreenFrogWave = 0;

        let lilies = [];
        let baseLilySpeed = 2.5;
        let lilySpeed = baseLilySpeed;
        let maxLilySpeed = 5.5; 
        let spawnTimer = 0;
        let spawnInterval = 90;

        let fishes = [];
        let fishTimer = 0;
        let fishInterval = 160; 

        let ripples = [];

        // Juice variables
        let deathAnim = null;          // { x, y, timer, particles[] }
        let landSquish = 0;            // 0→1 squish amount, decays each frame
        let speedStreaks = [];          // motion blur streaks at max speed
        let deathCount = 0;            // track deaths for ad pacing (every 3)
        let bgDanger = 0;              // 0→1 danger tint, ramps at max speed

        // Parallax layer: ribbon-blade lake weeds with stone base
        const WEED_COLORS = [
            { fill:"#16a34a", highlight:"#4ade80", dark:"#052e16", outline:"#14532d" },
            { fill:"#15803d", highlight:"#34d399", dark:"#052e16", outline:"#064e3b" },
            { fill:"#059669", highlight:"#6ee7b7", dark:"#064e3b", outline:"#065f46" },
        ];
        function makeWeedBlades(bladeCount) {
            let blades = [];
            for (let b = 0; b < bladeCount; b++) {
                blades.push({
                    angle: (b - (bladeCount-1)/2) * 0.38 + (Math.random()-0.5)*0.12,
                    len:   Math.random() * 28 + 38,
                    width: Math.random() * 5 + 7,
                    curve: (Math.random()-0.5) * 18
                });
            }
            return blades;
        }
        let plants = [];
        for (let i = 0; i < 7; i++) {
            let c = WEED_COLORS[Math.floor(Math.random()*WEED_COLORS.length)];
            plants.push({
                x:      Math.random() * 400,
                y:      Math.random() * 160 + 420,
                sway:   Math.random() * Math.PI,
                color:  c,
                blades: makeWeedBlades(Math.floor(Math.random()*2)+3),
                // small stone cluster at base
                stones: Array.from({length: Math.floor(Math.random()*2)+2}, () => ({
                    ox: (Math.random()-0.5)*20,
                    oy: Math.random()*4,
                    rx: Math.random()*7+4,
                    ry: Math.random()*3+2,
                    col: ["#a8a29e","#78716c","#d6d3d1"][Math.floor(Math.random()*3)]
                }))
            });
        }

        let slowBlossom = null; 
        let slowdownTimer = 0;
        let slowdownCooldown = 0;
        let dynamicSlowMultiplier = 1.0;

        // Freeze lily: random spawn timer (10-20 seconds = 600-1200 frames at 60fps)
        function newFreezeLilyDelay() {
            // 15-22 seconds at 60fps = 900-1320 frames
            return Math.floor(Math.random() * 420) + 900;
        }
        let freezeLilySpawnTimer = newFreezeLilyDelay();

        let bubbles = [];
        for (let i = 0; i < 15; i++) {
            bubbles.push({
                x: Math.random() * 400,
                y: Math.random() * 600,
                radius: Math.random() * 6 + 2,
                speed: Math.random() * 0.5 + 0.2,
                pulse: Math.random() * Math.PI
            });
        }

        function saveShopData() {
            localStorage.setItem("frogTotalStars", totalStars);
            localStorage.setItem("frogUnlockedSkins", JSON.stringify(unlockedSkins));
            localStorage.setItem("frogCurrentSkin", currentSkin);
        }

        function resetGame() {
            frogX = 100;
            frogY = 250;
            velocity = 0;
            lilies = [];
            fishes = [];
            ripples = [];
            slowBlossom = null;
            slowdownTimer = 0;
            slowdownCooldown = 0;
            dynamicSlowMultiplier = 1.0;
            freezeLilySpawnTimer = newFreezeLilyDelay();
            deathAnim = null;
            landSquish = 0;
            bgDanger = 0;
            speedStreaks = [];
            score = 0;
            starsCollectedThisRound = 0;
            lilySpeed = baseLilySpeed;
            spawnTimer = 0;
            fishTimer = 0;
            spawnInterval = 90;
            gameState = "PLAYING";
            if (audioCtx) startBgMusic();
            cgGameplayStart();
            personalBestBanner = false;
            personalBestTimer = 0;
            milestoneBanner = null;
            milestonesReachedThisRun.clear();
            isPaused = false;
            
            lilies.push({
                x: 70,
                y: 300,
                width: 70,
                height: 15,
                purple: false,
                passed: true,
                hasStar: false,
                starType: "gold", 
                starCollected: false,
                justLanded: true
            });
        }

        function triggerDeathAnim() {
            let particles = [];
            for (let i = 0; i < 14; i++) {
                let angle = (Math.PI * 2 / 14) * i + (Math.random() - 0.5) * 0.4;
                let speed = Math.random() * 3.5 + 1.5;
                particles.push({
                    x: frogX, y: frogY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    alpha: 1.0,
                    radius: Math.random() * 5 + 2,
                    color: ["#4ade80","#fef08a","#fff","#22d3ee"][Math.floor(Math.random()*4)]
                });
            }
            deathAnim = { x: frogX, y: frogY, timer: 60, particles };
        }

        function drawRoundedRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
            ctx.fill();
        }

        function spawnLily() {
            let randomY = Math.floor(Math.random() * 250) + 200; 
            let isPurple = Math.random() < 0.25; 
            let hasStar = !isPurple && Math.random() < 0.66; 
            let starType = Math.random() < 0.50 ? "boost" : "gold";
            
            lilies.push({
                x: canvas.width,
                y: randomY,
                width: 65,
                height: 15,
                purple: isPurple,
                passed: false,
                hasStar: hasStar,
                starType: starType,
                starCollected: false,
                justLanded: false
            });
        }

        function spawnFish() {
            let randomY = Math.floor(Math.random() * 280) + 180;
            fishes.push({
                x: canvas.width + 50, 
                y: randomY,
                baseY: randomY,
                angle: 0,
                radius: 12
            });
        }

        function isStandingOn(lily) {
            return frogX + frogRadius > lily.x &&
                   frogX - frogRadius < lily.x + lily.width &&
                   frogY + frogRadius >= lily.y &&
                   frogY + frogRadius <= lily.y + lily.height &&
                   velocity >= 0;
        }

        function checkSideCollision(lily) {
            let padding = lily.purple ? 5 : 0;
            return frogX + frogRadius > lily.x - padding &&
                   frogX - frogRadius < lily.x + lily.width + padding &&
                   frogY + frogRadius > lily.y - padding &&
                   frogY - frogRadius < lily.y + lily.height + padding;
        }

        function checkFishCollision(fish) {
            let dx = frogX - fish.x;
            let dy = frogY - fish.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            return distance < frogRadius + fish.radius;
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            
            let starGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, outerRadius);
            if (color === "boost") {
                starGrad.addColorStop(0, "#ff85a2");
                starGrad.addColorStop(1, "#AA1C41");
            } else {
                starGrad.addColorStop(0, "#fffbeb");
                starGrad.addColorStop(1, "#f59e0b");
            }
            
            ctx.fillStyle = starGrad;
            ctx.fill();
        }

        function drawSlowBlossom(cx, cy, radius, blinkState) {
            ctx.save();
            ctx.fillStyle = blinkState ? "#4274D9" : "#06b6d4";
            ctx.shadowBlur = 14;
            ctx.shadowColor = blinkState ? "#4274D9" : "#06b6d4";
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                let angle = (i * Math.PI) / 3;
                let px = cx + Math.cos(angle) * radius * 0.65;
                let py = cy + Math.sin(angle) * radius * 0.45;
                ctx.ellipse(px, py, radius * 0.7, radius * 0.35, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "#e0f7fa";
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawLogo(cx, cy) {
            ctx.save();
            let r = 18;
            
            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.beginPath();
            ctx.arc(cx, cy + 3, r, 0, Math.PI * 2);
            ctx.fill();

            let baseGrad = ctx.createRadialGradient(cx - 3, cy - 5, 2, cx, cy, r);
            baseGrad.addColorStop(0, "#4ade80");
            baseGrad.addColorStop(1, "#16a34a");
            ctx.fillStyle = baseGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fef08a";
            ctx.beginPath();
            ctx.arc(cx, cy + 5, 11, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#4ade80";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#0284c7";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 10.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.arc(cx + 7.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(cx, cy + 1, 7, 0, Math.PI);
            ctx.stroke();

            ctx.restore();
        }

        function drawMuteIcon() {
            ctx.save();
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            drawRoundedRect(canvas.width - 50, canvas.height - 50, 40, 40, 10);

            ctx.fillStyle = "#fff";
            ctx.font = "28px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (isMuted) {
                ctx.fillText("🔇", canvas.width - 30, canvas.height - 30);
            } else {
                ctx.fillText("🔊", canvas.width - 30, canvas.height - 30);
            }
            ctx.restore();
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (clientX === undefined || clientY === undefined) return;
            
            const clickX = clientX - rect.left;
            const clickY = clientY - rect.top;

            initAudio();

            if (clickX >= canvas.width - 50 && clickX <= canvas.width - 10 &&
                clickY >= canvas.height - 50 && clickY <= canvas.height - 10) {
                toggleMute();
                return; 
            }

            // Pause button — only active during PLAYING
            if (gameState === "PLAYING" &&
                clickX >= canvas.width - 45 && clickX <= canvas.width - 10 &&
                clickY >= 10 && clickY <= 45) {
                isPaused = !isPaused;
                if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                return;
            }

            // Block jumps and other input while paused
            if (gameState === "PLAYING" && isPaused) return;

            if (gameState === "START_MENU") {
                if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                    clickY >= canvas.height / 2 + 135 && clickY <= canvas.height / 2 + 185) {
                    gameState = "SHOP";
                    shopIndex = 0;
                    cgGameplayStop();
                } else if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                           clickY >= canvas.height / 2 + 70 && clickY <= canvas.height / 2 + 120) {
                    resetGame();
                }
            } 
            else if (gameState === "SHOP") {
                if (clickX >= 20 && clickX <= 100 && clickY >= 20 && clickY <= 60) {
                    gameState = "START_MENU";
                    return;
                }
                if (clickX >= 10 && clickX <= 90 && clickY >= 290 && clickY <= 380) {
                    shopIndex = (shopIndex - 1 + skinsData.length) % skinsData.length;
                    return;
                }
                if (clickX >= 310 && clickX <= 390 && clickY >= 290 && clickY <= 380) {
                    shopIndex = (shopIndex + 1) % skinsData.length;
                    return;
                }
                if (clickX >= canvas.width / 2 - 90 && clickX <= canvas.width / 2 + 90 &&
                    clickY >= 410 && clickY <= 465) {
                    let selectedSkin = skinsData[shopIndex];
                    if (selectedSkin.comingSoon) return;
                    if (unlockedSkins.includes(selectedSkin.id)) {
                        currentSkin = selectedSkin.id;
                        saveShopData();
                    } else if (totalStars >= selectedSkin.cost) {
                        totalStars -= selectedSkin.cost;
                        unlockedSkins.push(selectedSkin.id);
                        currentSkin = selectedSkin.id;
                        saveShopData();
                    }
                }
            } 
            else if (gameState === "GAME_OVER") {
                // MAIN MENU button still works for deliberate navigation
                if (clickX >= canvas.width / 2 - 90 && clickX <= canvas.width / 2 + 90 &&
                    clickY >= canvas.height / 2 + 125 && clickY <= canvas.height / 2 + 175) {
                    gameState = "START_MENU";
                    cgGameplayStop();
                } else {
                    // Tap ANYWHERE else = instant restart (Flappy Bird feel)
                    resetGame();
                }
            } 
            else if (gameState === "PLAYING") {
                velocity = jumpStrength;
                playJumpSound();
            }
        }

        window.addEventListener("keydown", function(e) {
            if (e.code === "Space") {
                e.preventDefault();
                if (gameState === "PLAYING") {
                    handleCanvasClick({ clientX: canvas.getBoundingClientRect().left + 200, clientY: canvas.getBoundingClientRect().top + 300 });
                } else if (gameState === "GAME_OVER") {
                    resetGame();
                } else if (gameState === "START_MENU") {
                    resetGame();
                }
            }
            else if (e.code === "KeyM") {
                e.preventDefault();
                toggleMute();
            }
            else if (e.code === "KeyP" || e.code === "Escape") {
                if (gameState === "PLAYING") {
                    e.preventDefault();
                    isPaused = !isPaused;
                    if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                }
            }
        });

        function drawBackground() {
            // Calm (d=0): light aqua top #b2eef0 → mid #8FDDDF → deep #5bbfc2
            // Full speed (d=1): #ccfbf1 → #22d3ee → #0e7490
            // Both states have vertical depth; d blends between them smoothly
            let d = bgDanger;

            let topR = Math.round(178 + (204-178)*d);  // #b2eef0 → #ccfbf1
            let topG = Math.round(238 + (251-238)*d);
            let topB = Math.round(240 + (241-240)*d);

            let midR = Math.round(143 + (34 -143)*d);  // #8FDDDF → #22d3ee
            let midG = Math.round(221 + (211-221)*d);
            let midB = Math.round(223 + (238-223)*d);

            let botR = Math.round(91  + (14 - 91)*d);  // #5bbfc2 → #0e7490
            let botG = Math.round(191 + (116-191)*d);
            let botB = Math.round(194 + (144-194)*d);

            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0,   `rgb(${topR},${topG},${topB})`);
            skyGrad.addColorStop(0.42, `rgb(${midR},${midG},${midB})`);
            skyGrad.addColorStop(1,   `rgb(${botR},${botG},${botB})`);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Parallax: ribbon-blade weeds with stone base (like reference image)
            ctx.save();
            for (let p of plants) {
                let sw = Math.sin(p.sway) * 8; // sway offset
                let c  = p.color;

                // Stone cluster at base
                for (let s of p.stones) {
                    let sg = ctx.createRadialGradient(
                        p.x+s.ox-s.rx*0.3, p.y+s.oy-s.ry*0.3, 1,
                        p.x+s.ox, p.y+s.oy, s.rx
                    );
                    sg.addColorStop(0, "#e7e5e4");
                    sg.addColorStop(1, s.col);
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.ellipse(p.x+s.ox, p.y+s.oy, s.rx, s.ry, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.13)";
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }

                // Each blade: dark outline filled with mid-green, highlight stripe
                for (let bl of p.blades) {
                    let bSway = sw * (0.7 + Math.abs(bl.angle) * 0.5);
                    let tipX = p.x + Math.sin(bl.angle) * bl.len + bSway + bl.curve;
                    let tipY = p.y - Math.cos(bl.angle) * bl.len;
                    let ctrlX = p.x + Math.sin(bl.angle) * bl.len*0.55 + bSway*0.5 + bl.curve*0.6;
                    let ctrlY = p.y - Math.cos(bl.angle) * bl.len*0.55;

                    // Perpendicular offset for blade width
                    let nx = -Math.cos(bl.angle) * bl.width * 0.5;
                    let ny = -Math.sin(bl.angle) * bl.width * 0.5;

                    // Filled blade shape
                    ctx.beginPath();
                    ctx.moveTo(p.x - nx*0.4, p.y - ny*0.4);
                    ctx.quadraticCurveTo(ctrlX - nx, ctrlY - ny, tipX, tipY);
                    ctx.quadraticCurveTo(ctrlX + nx, ctrlY + ny, p.x + nx*0.4, p.y + ny*0.4);
                    ctx.closePath();
                    ctx.fillStyle = c.fill;
                    ctx.fill();

                    // Dark outline
                    ctx.strokeStyle = c.outline;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    // Central highlight stripe
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.quadraticCurveTo(
                        ctrlX + nx*0.1, ctrlY + ny*0.1,
                        tipX - nx*0.15, tipY - ny*0.15
                    );
                    ctx.strokeStyle = c.highlight;
                    ctx.lineWidth = bl.width * 0.22;
                    ctx.globalAlpha = 0.55;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.restore();

            // Bubbles
            ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
            for (let b of bubbles) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawFrog(fx, fy, skinId) {
            let sData = skinsData.find(s => s.id === skinId) || skinsData[0];
            
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath();
            ctx.arc(fx - 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.arc(fx + 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.fill();

            // Apply landing squish: compress Y, stretch X
            let sq = landSquish;
            let scaleX = 1 + sq * 0.35;
            let scaleY = 1 - sq * 0.25;

            ctx.save();
            ctx.translate(fx, fy);
            ctx.scale(scaleX, scaleY);
            ctx.translate(-fx, -fy);

            let bodyGrad = ctx.createRadialGradient(fx - 4, fy - 6, 2, fx, fy, frogRadius);
            bodyGrad.addColorStop(0, sData.color);
            bodyGrad.addColorStop(1, adjustColorBrightness(sData.color, -25)); 
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(fx, fy, frogRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = sData.color;
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.fill();

            if (skinId === "alien") {
                ctx.fillStyle = "#a855f7"; 
            } else {
                ctx.fillStyle = "#0284c7";
            }
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 9.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.arc(fx + 6.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = sData.belly;
            ctx.beginPath();
            ctx.arc(fx, fy + 4, 10, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore(); // end squish transform

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(fx, fy - 1, 8, 0, Math.PI);
            ctx.stroke();

            if (skinId === "student") {
                ctx.fillStyle = "#0284c7";
                ctx.fillRect(fx - 12, fy - 22, 24, 3);
                ctx.beginPath(); ctx.moveTo(fx, fy - 22); ctx.lineTo(fx - 12, fy - 26); ctx.lineTo(fx, fy - 30); ctx.lineTo(fx + 12, fy - 26); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "ninja") {
                ctx.fillStyle = "#f43f5e";
                ctx.fillRect(fx - 12, fy - 8, 24, 3);
            }
            else if (skinId === "wizard") {
                ctx.fillStyle = "#7c3aed";
                ctx.beginPath(); ctx.moveTo(fx - 10, fy - 18); ctx.lineTo(fx, fy - 36); ctx.lineTo(fx + 10, fy - 18); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#fde047";
                ctx.beginPath(); ctx.arc(fx, fy - 25, 2, 0, Math.PI * 2); ctx.fill();
            }
            else if (skinId === "royal") {
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath(); ctx.moveTo(fx - 8, fy - 18); ctx.lineTo(fx - 8, fy - 25); ctx.lineTo(fx - 4, fy - 21); ctx.lineTo(fx, fy - 28); ctx.lineTo(fx + 4, fy - 21); ctx.lineTo(fx + 8, fy - 25); ctx.lineTo(fx + 8, fy - 18); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "party") {
                let hue = (Date.now() / 4) % 360;
                ctx.strokeStyle = "hsl(" + hue + ", 100%, 60%)";
                ctx.lineWidth = 2;
                ctx.strokeRect(fx - 13, fy - 10, 11, 7);
                ctx.strokeRect(fx + 2, fy - 10, 11, 7);
                ctx.lineWidth = 1;
                for(let l = -11; l <= -4; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
                for(let l = 4; l <= 11; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
            }
            else if (skinId === "alien") {
                ctx.fillStyle = "#a855f7";
                ctx.fillRect(fx - 2, fy - 26, 4, 10);
                ctx.fillStyle = "#22c55e";
                ctx.beginPath();
                ctx.arc(fx, fy - 27, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function adjustColorBrightness(hex, percent) {
            let num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        function draw() {
            drawBackground();

            if (gameState === "PLAYING") {
                for (let r of ripples) {
                    ctx.strokeStyle = "rgba(255, 255, 255, " + r.alpha + ")";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(r.x, r.y, r.radius * 1.5, r.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            if (gameState === "START_MENU") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw animated frog on a lily pad
                let lilyX = canvas.width / 2;
                let lilyY = startScreenFrogY + 50;
                // Lily pad
                let padGrad = ctx.createLinearGradient(lilyX - 35, lilyY - 40, lilyX + 35, lilyY - 40);
                padGrad.addColorStop(0, "#4ade80");
                padGrad.addColorStop(1, "#16a34a");
                ctx.fillStyle = padGrad;
                ctx.beginPath();
                ctx.ellipse(lilyX, lilyY, 35, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                // Lily petals
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                for (let i = 0; i < 5; i++) {
                    let px = lilyX + Math.cos(i * 1.2) * 8;
                    let py = lilyY + Math.sin(i * 1.2) * 5;
                    ctx.beginPath();
                    ctx.arc(px, py, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = "#eab308";
                ctx.beginPath();
                ctx.arc(lilyX, lilyY, 3, 0, Math.PI * 2);
                ctx.fill();
                // Frog on the lily
                drawFrog(lilyX, startScreenFrogY, currentSkin);

                drawLogo(canvas.width / 2, canvas.height / 2 - 200);

                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 34px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText("OGGY", canvas.width / 2, canvas.height / 2 - 135);
                
                ctx.fillStyle = "#ea580c";
                ctx.fillText("ADVENTURE", canvas.width / 2, canvas.height / 2 - 85);

                drawMuteIcon();

                ctx.fillStyle = "#b45309";
                ctx.font = "bold 18px Arial";
                ctx.fillText("⭐ " + totalStars, canvas.width / 2, canvas.height / 2 + 40);

                ctx.fillStyle = "#1e40af";
                ctx.font = "14px Arial";
                ctx.fillText("PC: Spacebar or Tap", canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillText("Mobile: Tap to Jump", canvas.width / 2, canvas.height / 2 + 15);

                ctx.fillStyle = "#10b981";
                drawRoundedRect(canvas.width / 2 - 80, canvas.height / 2 + 70, 160, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("PLAY", canvas.width / 2, canvas.height / 2 + 101);

                ctx.fillStyle = "#f59e0b";
                drawRoundedRect(canvas.width / 2 - 80, canvas.height / 2 + 135, 160, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.fillText("SHOP 🛒", canvas.width / 2, canvas.height / 2 + 166);

                if (showDailyBonusBanner && bannerTimer > 0) {
                    ctx.fillStyle = "rgba(30, 41, 59, 0.9)";
                    drawRoundedRect(30, 18, canvas.width - 60, 54, 12);
                    if (dailyBonusAlreadyClaimed) {
                        ctx.fillStyle = "#67e8f9";
                        ctx.font = "bold 13px Arial";
                        ctx.fillText("⭐ Come back daily for +20 Stars!", canvas.width / 2, 40);
                        ctx.fillStyle = "#94a3b8";
                        ctx.font = "12px Arial";
                        ctx.fillText("You already collected today's bonus.", canvas.width / 2, 60);
                    } else {
                        ctx.fillStyle = "#fbbf24";
                        ctx.font = "bold 15px Arial";
                        ctx.fillText("🎉 Daily Reward: +20 Stars!", canvas.width / 2, 40);
                        ctx.fillStyle = "#a7f3d0";
                        ctx.font = "12px Arial";
                        ctx.fillText("Visit every day to earn your bonus!", canvas.width / 2, 60);
                    }
                }
                
                ctx.textAlign = "start";
                return;
            }

            if (gameState === "SHOP") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.fillText("FROG SHOP", canvas.width / 2, 80);

                ctx.fillStyle = "#c2410c";
                ctx.font = "bold 20px Arial";
                ctx.fillText("Your Stars: ⭐ " + totalStars, canvas.width / 2, 130);

                ctx.fillStyle = "#0891b2";
                drawRoundedRect(20, 20, 80, 40, 10);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px Arial";
                ctx.fillText("BACK", 60, 45);

                let activeSkin = skinsData[shopIndex];
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 22px Arial";
                ctx.fillText(activeSkin.name, canvas.width / 2, 220);

                ctx.fillStyle = "rgba(255,255,255,0.4)";
                drawRoundedRect(canvas.width/2 - 50, 260, 100, 110, 15);

                drawFrog(canvas.width / 2, 320, activeSkin.id);

                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 30px Arial";
                ctx.fillText("◀", 50, 332);
                ctx.fillText("▶", 350, 332);

                let isUnlocked = unlockedSkins.includes(activeSkin.id);
                let isCurrent = currentSkin === activeSkin.id;

                // Progress bar toward locked skin cost
                if (!isUnlocked && !activeSkin.comingSoon) {
                    let progress = Math.min(1, totalStars / activeSkin.cost);
                    let barW = 180, barH = 10, barX = canvas.width/2 - 90, barY = 395;
                    ctx.fillStyle = "#1e293b";
                    ctx.beginPath();
                    ctx.roundRect(barX, barY, barW, barH, 5);
                    ctx.fill();
                    ctx.fillStyle = progress >= 1 ? "#10b981" : "#f59e0b";
                    ctx.beginPath();
                    ctx.roundRect(barX, barY, barW * progress, barH, 5);
                    ctx.fill();
                    ctx.fillStyle = "#94a3b8";
                    ctx.font = "11px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("⭐ " + totalStars + " / " + activeSkin.cost, canvas.width/2, barY + 24);
                }

                if (activeSkin.comingSoon) {
                    // Show lock + star cost so players know what to work toward
                    ctx.fillStyle = "#475569";
                    drawRoundedRect(canvas.width / 2 - 90, 400, 180, 70, 15);
                    // Lock icon
                    ctx.fillStyle = "#fbbf24";
                    ctx.font = "bold 22px Arial";
                    ctx.fillText("🔒", canvas.width / 2, 428);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 13px Arial";
                    ctx.fillText("COMING SOON", canvas.width / 2, 448);
                    ctx.fillStyle = "#fde68a";
                    ctx.font = "12px Arial";
                    ctx.fillText("⭐ " + activeSkin.cost + " stars", canvas.width / 2, 464);
                } else if (isCurrent) {
                    ctx.fillStyle = "#64748b";
                    drawRoundedRect(canvas.width / 2 - 90, 410, 180, 55, 15);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 16px Arial";
                    ctx.fillText("EQUIPPED", canvas.width / 2, 443);
                } else if (isUnlocked) {
                    ctx.fillStyle = "#10b981";
                    drawRoundedRect(canvas.width / 2 - 90, 410, 180, 55, 15);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 16px Arial";
                    ctx.fillText("EQUIP", canvas.width / 2, 443);
                } else {
                    let canBuy = totalStars >= activeSkin.cost;
                    ctx.fillStyle = canBuy ? "#f59e0b" : "#94a3b8";
                    drawRoundedRect(canvas.width / 2 - 90, 410, 180, 55, 15);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 16px Arial";
                    ctx.fillText("BUY: ⭐ " + activeSkin.cost, canvas.width / 2, 443);
                }

                ctx.textAlign = "start";
                return;
            }

            // Speed streaks (behind everything)
            if (speedStreaks.length > 0) {
                for (let s of speedStreaks) {
                    ctx.strokeStyle = `rgba(255,255,255,${s.alpha})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x + s.length, s.y);
                    ctx.stroke();
                }
            }

            for (let lily of lilies) {
                let centerX = lily.x + lily.width / 2;
                let centerY = lily.y + lily.height / 2;
                let radiusX = lily.width / 2;
                let radiusY = lily.height / 1.2;

                if (lily.purple) {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#c084fc");
                    padGrad.addColorStop(1, "#7c3aed");
                    ctx.fillStyle = padGrad;
                    
                    ctx.fillStyle = "#f43f5e";
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        let spikeX = centerX + Math.cos(angle) * (radiusX + 5);
                        let spikeY = centerY + Math.sin(angle) * (radiusY - 2);
                        ctx.beginPath(); ctx.arc(spikeX, spikeY, 3, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();
                } else {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#4ade80");
                    padGrad.addColorStop(1, "#16a34a");
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();

                    ctx.fillStyle = "rgba(255,255,255,0.85)";
                    for (let i = 0; i < 5; i++) {
                        let petalX = centerX + Math.cos(i * 1.2) * 5;
                        let petalY = centerY + Math.sin(i * 1.2) * 3;
                        ctx.beginPath(); ctx.arc(petalX, petalY, 4, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = "#eab308";
                    ctx.beginPath(); ctx.arc(centerX, centerY, 2.5, 0, Math.PI * 2); ctx.fill();

                    if (lily.hasStar && !lily.starCollected) {
                        let hover = Math.sin(Date.now() * 0.007) * 4;
                        drawStar(centerX, lily.y - 22 + hover, 5, 11, 5, lily.starType);
                    }
                }
            }

            if (slowBlossom) {
                let blinkState = Math.floor(Date.now() / 150) % 2 === 0;
                drawSlowBlossom(slowBlossom.x, slowBlossom.y, slowBlossom.radius, blinkState);
            }

            for (let fish of fishes) {
                let r = fish.radius;
                
                ctx.fillStyle = "#ea580c"; 
                ctx.beginPath();
                ctx.moveTo(fish.x + r * 1.2, fish.y);
                ctx.lineTo(fish.x + r * 2.2, fish.y - r * 1.1);
                ctx.lineTo(fish.x + r * 1.8, fish.y);
                ctx.lineTo(fish.x + r * 2.2, fish.y + r * 1.1);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "#14b8a6"; 
                ctx.beginPath();
                ctx.ellipse(fish.x, fish.y, r * 1.5, r * 1.2, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#ea580c"; 
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(fish.x, fish.y, r * 1.5, r * 1.2, 0, 0, Math.PI);
                ctx.clip();
                ctx.fillRect(fish.x - r * 2, fish.y, r * 4, r * 2);
                ctx.restore();

                ctx.fillStyle = "#fee2e2";
                ctx.beginPath();
                ctx.arc(fish.x - r * 0.6, fish.y - r * 0.6, r * 0.45, 0, Math.PI * 2);
                ctx.arc(fish.x - r * 0.1, fish.y - r * 0.7, r * 0.45, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(fish.x - r * 0.6, fish.y - r * 0.6, r * 0.2, 0, Math.PI * 2);
                ctx.arc(fish.x - r * 0.1, fish.y - r * 0.7, r * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(fish.x - r * 1.4, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 1.2, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 1.0, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 0.8, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 0.6, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 0.4, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 0.2, fish.y + r * 0.1);
                ctx.closePath();
                ctx.fill();
            }

            if (gameState !== "GAME_OVER") {
                drawFrog(frogX, frogY, currentSkin);
            }

            // Death particle burst
            if (deathAnim) {
                for (let p of deathAnim.particles) {
                    if (p.alpha <= 0) continue;
                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            ctx.fillStyle = "#0f766e";
            ctx.font = "bold 16px sans-serif";
            ctx.textAlign = "start";
            ctx.fillText("SCORE: " + score, 20, 35);
            ctx.fillStyle = "#b45309";
            ctx.fillText("BEST: " + highScore, 20, 60);

            // Personal best banner — fades in over first 20 frames, out over last 40
            if (personalBestTimer > 0) {
                let alpha = personalBestTimer > 130
                    ? (150 - personalBestTimer) / 20          // fade in
                    : Math.min(1, personalBestTimer / 40);    // fade out
                alpha = Math.max(0, Math.min(1, alpha));
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.textAlign = "center";
                ctx.fillStyle = "#fbbf24";
                drawRoundedRect(canvas.width / 2 - 120, 80, 240, 65, 12);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 24px Arial";
                ctx.fillText("🏆 NEW BEST!", canvas.width / 2, 115);
                ctx.font = "14px Arial";
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                ctx.fillText(highScore + " points!", canvas.width / 2, 133);
                ctx.restore();
            }

            // Pause button — top-right corner
            ctx.fillStyle = isPaused ? "#0ea5e9" : "rgba(0,0,0,0.25)";
            ctx.beginPath();
            ctx.roundRect(canvas.width - 45, 10, 35, 35, 8);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.fillText(isPaused ? "▶" : "⏸", canvas.width - 27, 33);
            ctx.textAlign = "start";

            drawMuteIcon();

            // Pause overlay
            if (isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 36px Arial";
                ctx.textAlign = "center";
                ctx.fillText("⏸ PAUSED", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Arial";
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.fillText("Tap ▶ to resume", canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = "start";
            }

            if (slowdownTimer > 0) {
                ctx.fillStyle = "rgba(6, 182, 212, 0.15)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("❄️ POND SLOWED ❄️", canvas.width / 2, 35);
            }

            if (gameState === "GAME_OVER") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawLogo(canvas.width / 2, canvas.height / 2 - 145);

                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 36px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 80);
                
                ctx.fillStyle = "#c2410c";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Final Score: " + score, canvas.width / 2, canvas.height / 2 - 30);
                ctx.fillStyle = "#0284c7";
                ctx.fillText("Earned: ⭐ " + starsCollectedThisRound, canvas.width / 2, canvas.height / 2 + 10);

                ctx.fillStyle = "#10b981";
                drawRoundedRect(canvas.width / 2 - 90, canvas.height / 2 + 60, 180, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Arial";
                ctx.fillText("RESTART", canvas.width / 2, canvas.height / 2 + 91);

                ctx.fillStyle = "#06b6d4";
                drawRoundedRect(canvas.width / 2 - 90, canvas.height / 2 + 125, 180, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.fillText("MAIN MENU", canvas.width / 2, canvas.height / 2 + 156);

                ctx.fillStyle = "rgba(255,255,255,0.55)";
                ctx.font = "13px Arial";
                ctx.fillText("Tap anywhere to restart", canvas.width / 2, canvas.height / 2 + 200);

                drawMuteIcon();
                
                ctx.textAlign = "start"; 
            }
        }

        function update() {
            let now = performance.now();
            let dt = (now - lastTime) / 16.666; 
            lastTime = now;
            
            if (dt > 4) dt = 1;

            if (gameState === "START_MENU" && showDailyBonusBanner && bannerTimer > 0) {
                bannerTimer -= dt;
            }

            for (let b of bubbles) {
                b.y -= b.speed * dt;
                b.pulse += 0.02 * dt;
                b.x += Math.sin(b.pulse) * 0.2 * dt;
                if (b.y < -10) {
                    b.y = 610;
                    b.x = Math.random() * 400;
                }
            }

            // Decay celebration banners
            if (personalBestTimer > 0) personalBestTimer -= dt;


            // Animate start screen frog (gentle bobbing)
            if (gameState === "START_MENU") {
                startScreenFrogWave += 0.03;
                startScreenFrogY = 270 + Math.sin(startScreenFrogWave) * 8;
            }

            // Decay landing squish
            if (landSquish > 0) {
                landSquish = Math.max(0, landSquish - 0.08 * dt);
            }

            // Animate parallax plants (half the lily speed)
            for (let p of plants) {
                p.x -= (lilySpeed * 0.45) * dt;
                p.sway += 0.018 * dt;
                if (p.x < -40) {
                    p.x = canvas.width + 15;
                    p.y = Math.random() * 160 + 420;
                    let c = WEED_COLORS[Math.floor(Math.random()*WEED_COLORS.length)];
                    p.color  = c;
                    p.blades = makeWeedBlades(Math.floor(Math.random()*2)+3);
                    p.stones = Array.from({length: Math.floor(Math.random()*2)+2}, () => ({
                        ox: (Math.random()-0.5)*20,
                        oy: Math.random()*4,
                        rx: Math.random()*7+4,
                        ry: Math.random()*3+2,
                        col: ["#a8a29e","#78716c","#d6d3d1"][Math.floor(Math.random()*3)]
                    }));
                }
            }

            // Tick death particles
            if (deathAnim) {
                deathAnim.timer -= dt;
                for (let p of deathAnim.particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 0.15 * dt;
                    p.alpha -= 0.022 * dt;
                }
                if (deathAnim.timer <= 0) deathAnim = null;
            }

            if (gameState !== "PLAYING" || isPaused) return;

            let normalSpeed = baseLilySpeed + (score * 0.04);
            let targetSpeed = normalSpeed;

            if (slowdownTimer > 0) {
                slowdownTimer -= dt;
                let slowFloor = baseLilySpeed * 0.70;
                if (slowdownTimer > 120) {
                    dynamicSlowMultiplier = 0.35; 
                } else {
                    dynamicSlowMultiplier = 0.35 + (0.65 * (1.0 - (slowdownTimer / 120)));
                }
                targetSpeed = slowFloor + (normalSpeed - slowFloor) * dynamicSlowMultiplier;
            } else {
                dynamicSlowMultiplier = 1.0;
                if (slowdownCooldown > 0) {
                    slowdownCooldown -= dt;
                }
            }

            lilySpeed = Math.min(maxLilySpeed, targetSpeed);

            // Ramp speed glow: 0 = calm, 1 = full speed bright
            let dangerTarget = (slowdownTimer > 0) ? 0 : Math.max(0, (lilySpeed - maxLilySpeed * 0.75) / (maxLilySpeed * 0.25));
            bgDanger += (dangerTarget - bgDanger) * 0.03 * dt;

            // Speed streaks: spawn cyan-white streaks at full speed
            if (bgDanger > 0.6 && Math.random() < 0.15 * dt) {
                speedStreaks.push({
                    x: canvas.width + 10,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 60 + 30,
                    speed: lilySpeed * 2.5,
                    alpha: Math.random() * 0.35 + 0.12
                });
            }
            for (let i = speedStreaks.length - 1; i >= 0; i--) {
                speedStreaks[i].x -= speedStreaks[i].speed * dt;
                if (speedStreaks[i].x + speedStreaks[i].length < 0) speedStreaks.splice(i, 1);
            }

            spawnInterval = Math.max(55, 90 - (score * 0.4));
            fishInterval = Math.max(110, 160 - (score * 0.6));

            velocity += gravity * dt;
            frogY += velocity * dt;

            // Rare freeze water lily: only spawns when at full speed, randomly every 10-20 seconds
            if (normalSpeed >= maxLilySpeed) {
                // Timer always counts down at full speed (independent of cooldown)
                if (!slowBlossom) {
                    freezeLilySpawnTimer -= dt;
                    if (freezeLilySpawnTimer <= 0) {
                        // Only actually spawn if cooldown has expired
                        if (slowdownCooldown <= 0) {
                            // Always spawn from the right — player needs time to react and collect it
                            let spawnX = canvas.width + 15;
                            let spawnY = Math.floor(Math.random() * 320) + 130; // random height
                            slowBlossom = {
                                x: spawnX,
                                y: spawnY,
                                vx: -lilySpeed,                        // moves left with stage
                                vy: (Math.random() - 0.5) * 1.0,       // very slight vertical drift
                                radius: 13
                            };
                        }
                        // Always reset timer whether we spawned or skipped
                        freezeLilySpawnTimer = newFreezeLilyDelay();
                    }
                }
            } else {
                // Not at full speed yet — reset timer so countdown starts fresh when full speed is reached
                freezeLilySpawnTimer = newFreezeLilyDelay();
            }

            if (slowBlossom) {
                slowBlossom.x += slowBlossom.vx * dt;
                slowBlossom.y += slowBlossom.vy * dt;
                
                let dx = frogX - slowBlossom.x;
                let dy = frogY - slowBlossom.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < frogRadius + slowBlossom.radius) {
                    slowBlossom = null;
                    slowdownTimer = 340; 
                    slowdownCooldown = 850; 
                    playSlowdownSound();
                } else if (
                    slowBlossom.x < -30 || slowBlossom.x > canvas.width + 30 ||
                    slowBlossom.y < -30 || slowBlossom.y > canvas.height + 30
                ) {
                    slowBlossom = null;
                    slowdownCooldown = 400; 
                }
            }

            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].radius += 1.2 * dt;
                ripples[i].alpha -= 0.03 * dt;
                ripples[i].x -= lilySpeed * dt; 
                if (ripples[i].alpha <= 0) {
                    ripples.splice(i, 1);
                }
            }

            for (let i = lilies.length - 1; i >= 0; i--) {
                lilies[i].x -= lilySpeed * dt;

                if (!lilies[i].purple && isStandingOn(lilies[i])) {
                    frogY = lilies[i].y - frogRadius;
                    velocity = 0;
                    frogX -= lilySpeed * dt; 

                    if (!lilies[i].justLanded) {
                        ripples.push({
                            x: frogX,
                            y: lilies[i].y + 4,
                            radius: 10,
                            alpha: 1.0
                        });
                        lilies[i].justLanded = true;
                        landSquish = 1.0; // trigger squish anim
                    }

                    if (lilies[i].hasStar && !lilies[i].starCollected) {
                        lilies[i].starCollected = true;
                        score += 8; 
                        starsCollectedThisRound++;
                        totalStars++; 
                        localStorage.setItem("frogTotalStars", totalStars);
                        
                        if (lilies[i].starType === "boost") {
                            frogX = Math.min(250, frogX + 45); 
                            playStarSound(true);
                        } else {
                            playStarSound(false);
                        }
                    }

                    if (!lilies[i].passed) {
                        lilies[i].passed = true;
                        score++;
                    }
                    
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem("frogHighScore", highScore);
                        personalBestBanner = true;
                        personalBestTimer = 150;  // 2.5 seconds at 60fps
                        cgHappyTime();
                    }


                } else {
                    if (!isStandingOn(lilies[i])) {
                        lilies[i].justLanded = false;
                    }
                }

                if (lilies[i].purple && checkSideCollision(lilies[i])) {
                    gameState = "GAME_OVER";
                    stopBgMusic();
                    playCrashSound();
                    cgGameplayStop();
                    triggerDeathAnim();
                    deathCount++;
                    if (deathCount % 3 === 0) cgRequestMidgameAd(null);
                }

                if (lilies[i].x + lilies[i].width < -20) {
                    lilies.splice(i, 1);
                }
            }

            for (let i = fishes.length - 1; i >= 0; i--) {
                fishes[i].x -= (lilySpeed + 0.8) * dt; 
                fishes[i].angle += 0.07 * dt;
                fishes[i].y = fishes[i].baseY + Math.sin(fishes[i].angle) * 35; 

                if (checkFishCollision(fishes[i])) {
                    gameState = "GAME_OVER";
                    stopBgMusic();
                    playCrashSound();
                    cgGameplayStop();
                    triggerDeathAnim();
                    deathCount++;
                    if (deathCount % 3 === 0) cgRequestMidgameAd(null);
                }

                if (fishes[i].x < -40) {
                    fishes.splice(i, 1);
                }
            }

            // Die when any part of frog crosses the left edge (frogX is center, so right edge = frogX+frogRadius)
            // Or when fully fallen below the bottom
            if (frogY - frogRadius > canvas.height || frogX + frogRadius <= 1) {
                gameState = "GAME_OVER";
                stopBgMusic();
                playCrashSound();
                cgGameplayStop();
                triggerDeathAnim();
                deathCount++;
                if (deathCount % 3 === 0) cgRequestMidgameAd(null);
            }

            spawnTimer += dt;
            if (spawnTimer > spawnInterval) {
                spawnLily();
                spawnTimer = 0;
            }

            fishTimer += dt;
            if (fishTimer > fishInterval) {
                spawnFish();
                fishTimer = 0;
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault();
            handleCanvasClick(e);
        }, { passive: false });

        canvas.addEventListener("mousedown", function(e) {
            if ('ontouchstart' in window) return;
            handleCanvasClick(e);
        });

        gameLoop();
    </script>
</body>
