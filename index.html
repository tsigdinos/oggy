                    ctx.fillText("▶", 352, 258);

                    let isUnlocked = unlockedSkins.includes(activeSkin.id);
                    let isCurrent = currentSkin === activeSkin.id;

                    if (!isUnlocked && !activeSkin.comingSoon) {
                        let progress = Math.min(1, totalStars / activeSkin.cost);
                        let barW = 180, barH = 9, barX = canvas.width/2 - 90, barY = 316;
                        ctx.fillStyle = "#1e293b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 5); ctx.fill();
                        ctx.fillStyle = progress >= 1 ? "#10b981" : "#f59e0b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 5); ctx.fill();
                        ctx.fillStyle = "#94a3b8";
                        ctx.font = "11px Arial";
                        ctx.fillText("⭐ " + totalStars + " / " + activeSkin.cost, canvas.width/2, barY + 22);
                    }

                    let btnY2 = 348;
                    if (activeSkin.comingSoon) {
                        ctx.fillStyle = "#475569";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 65, 15);
                        ctx.fillStyle = "#fbbf24"; ctx.font = "bold 20px Arial";
                        ctx.fillText("🔒", canvas.width/2, btnY2 + 24);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 13px Arial";
                        ctx.fillText("COMING SOON", canvas.width/2, btnY2 + 42);
                        ctx.fillStyle = "#fde68a"; ctx.font = "12px Arial";
                        ctx.fillText("⭐ " + activeSkin.cost + " stars", canvas.width/2, btnY2 + 57);
                    } else if (isCurrent) {
                        ctx.fillStyle = "#64748b";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("EQUIPPED", canvas.width/2, btnY2 + 31);
                    } else if (isUnlocked) {
                        ctx.fillStyle = "#10b981";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("EQUIP", canvas.width/2, btnY2 + 31);
                    } else {
                        let canBuy = totalStars >= activeSkin.cost;
                        ctx.fillStyle = canBuy ? "#f59e0b" : "#94a3b8";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("BUY: ⭐ " + activeSkin.cost, canvas.width/2, btnY2 + 31);
                    }

                    // Dot indicators
                    let dotY = 430;
                    for (let i = 0; i < skinsData.length; i++) {
                        ctx.fillStyle = i === shopIndex ? "#0e7490" : "rgba(14,116,144,0.3)";
                        ctx.beginPath(); ctx.arc(canvas.width/2 - (skinsData.length-1)*8 + i*16, dotY, 4, 0, Math.PI*2); ctx.fill();
                    }

                // ── THEMES TAB ───────────────────────────────────────────
                } else {
                    let activeTheme = themesData[shopIndex % themesData.length];
                    ctx.fillStyle = "#1e293b";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(activeTheme.name, canvas.width/2, 185);

                    // Theme preview: mini gradient swatch
                    let swX = canvas.width/2 - 90, swY = 198, swW = 180, swH = 100;
                    let swGrad = ctx.createLinearGradient(swX, swY, swX, swY + swH);
                    let tc = activeTheme.calm;
                    swGrad.addColorStop(0,   `rgb(${tc.top[0]},${tc.top[1]},${tc.top[2]})`);
                    swGrad.addColorStop(0.5, `rgb(${tc.mid[0]},${tc.mid[1]},${tc.mid[2]})`);
                    swGrad.addColorStop(1,   `rgb(${tc.bot[0]},${tc.bot[1]},${tc.bot[2]})`);
                    ctx.fillStyle = swGrad;
                    ctx.beginPath(); ctx.roundRect(swX, swY, swW, swH, 12); ctx.fill();
                    // Decorative bubbles in preview
                    ctx.fillStyle = activeTheme.bubble;
                    [[swX+30,swY+70,6],[swX+80,swY+40,4],[swX+140,swY+80,7],[swX+160,swY+55,5]].forEach(([bx,by,br]) => {
                        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
                    });
                    // Label overlay
                    ctx.fillStyle = "rgba(0,0,0,0.25)";
                    ctx.font = "11px Arial";
                    ctx.fillText("PREVIEW", canvas.width/2, swY + swH - 8);

                    ctx.fillStyle = "#7c3aed";
                    ctx.font = "bold 28px Arial";
                    ctx.fillText("◀", 48, 258);
                    ctx.fillText("▶", 352, 258);

                    let thIsUnlocked = unlockedThemes.includes(activeTheme.id);
                    let thIsCurrent = currentTheme === activeTheme.id;

                    if (!thIsUnlocked && !activeTheme.comingSoon && activeTheme.cost > 0) {
                        let progress = Math.min(1, totalStars / activeTheme.cost);
                        let barW = 180, barH = 9, barX = canvas.width/2 - 90, barY = 316;
                        ctx.fillStyle = "#1e293b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 5); ctx.fill();
                        ctx.fillStyle = progress >= 1 ? "#10b981" : "#a78bfa";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 5); ctx.fill();
                        ctx.fillStyle = "#94a3b8"; ctx.font = "11px Arial";
                        ctx.fillText("⭐ " + totalStars + " / " + activeTheme.cost, canvas.width/2, barY + 22);
                    }

                    let btnY3 = 348;
                    if (activeTheme.comingSoon) {
                        ctx.fillStyle = "#475569";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 65, 15);
                        ctx.fillStyle = "#fbbf24"; ctx.font = "bold 20px Arial";
                        ctx.fillText("🔒", canvas.width/2, btnY3 + 24);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 13px Arial";
                        ctx.fillText("COMING SOON", canvas.width/2, btnY3 + 42);
                        ctx.fillStyle = "#ddd6fe"; ctx.font = "12px Arial";
                        ctx.fillText("Theme expansion", canvas.width/2, btnY3 + 57);
                    } else if (thIsCurrent) {
                        ctx.fillStyle = "#64748b";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("ACTIVE", canvas.width/2, btnY3 + 31);
                    } else if (thIsUnlocked) {
                        ctx.fillStyle = "#7c3aed";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("APPLY", canvas.width/2, btnY3 + 31);
                    } else {
                        let canBuy = totalStars >= activeTheme.cost;
                        ctx.fillStyle = canBuy ? "#a78bfa" : "#94a3b8";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("BUY: ⭐ " + activeTheme.cost, canvas.width/2, btnY3 + 31);
                    }

                    // Dot indicators
                    let dotY2 = 430;
                    for (let i = 0; i < themesData.length; i++) {
                        ctx.fillStyle = i === shopIndex % themesData.length ? "#7c3aed" : "rgba(124,58,237,0.3)";
                        ctx.beginPath(); ctx.arc(canvas.width/2 - (themesData.length-1)*8 + i*16, dotY2, 4, 0, Math.PI*2); ctx.fill();
                    }
                }

                ctx.textAlign = "start";
                return;
            }

            // Speed streaks (behind everything)
            if (speedStreaks.length > 0) {
                for (let s of speedStreaks) {
                    let th2 = themesData.find(t => t.id === currentTheme) || themesData[0];
                    ctx.strokeStyle = th2.streakColor.replace("{a}", s.alpha);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x + s.length, s.y);
                    ctx.stroke();
                }
            }

            for (let lily of lilies) {
                let centerX = lily.x + lily.width / 2;
                let centerY = lily.y + lily.height / 2;
                let radiusX = lily.width / 2;
                let radiusY = lily.height / 1.2;

                if (lily.purple) {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#c084fc");
                    padGrad.addColorStop(1, "#7c3aed");
                    ctx.fillStyle = padGrad;
                    
                    ctx.fillStyle = "#f43f5e";
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        let spikeX = centerX + Math.cos(angle) * (radiusX + 5);
                        let spikeY = centerY + Math.sin(angle) * (radiusY - 2);
                        ctx.beginPath(); ctx.arc(spikeX, spikeY, 3, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();
                    // Outline purple lily on sunset to keep it distinct
                    if (currentTheme === "sunset") {
                        ctx.strokeStyle = "rgba(255,255,255,0.6)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    } else if (currentTheme === "night") {
                        ctx.strokeStyle = "rgba(200,150,255,0.7)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    }

                    // Carnivorous plant on top of purple lily
                    if (lily.hasPlant) {
                        let px = centerX;
                        let py = lily.y;
                        let sw = Math.sin(lily.plantSway) * 3;
                        let snapA = lily.plantSnapAngle;

                        ctx.save();

                        // Short stubby stem (height 30)
                        ctx.strokeStyle = "#365314";
                        ctx.lineWidth = 5;
                        ctx.lineCap = "round";
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.bezierCurveTo(px + sw, py - 10, px - sw + 2, py - 22, px + sw, py - 30);
                        ctx.stroke();
                        // Stem highlight
                        ctx.strokeStyle = "#4d7c0f";
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(px + 1, py);
                        ctx.bezierCurveTo(px + sw + 1, py - 10, px - sw + 3, py - 22, px + sw + 1, py - 30);
                        ctx.stroke();

                        // Head at tip of stem — flipped to face LEFT (toward incoming frog)
                        let hx = px + sw;
                        let hy = py - 30;
                        let jawOpen = snapA * 0.65;

                        // Mirror the head horizontally so it faces left
                        ctx.save();
                        ctx.translate(hx, hy);
                        ctx.scale(-1, 1);   // flip: now left side of head faces left in screen space

                        // Bottom jaw
                        ctx.save();
                        ctx.rotate(jawOpen * 0.45);
                        ctx.fillStyle = "#86198f";
                        ctx.beginPath();
                        ctx.moveTo(-18, 0);
                        ctx.bezierCurveTo(-14, 9, 14, 9, 18, 0);
                        ctx.bezierCurveTo(14, -3, -14, -3, -18, 0);
                        ctx.fill();
                        ctx.fillStyle = "#f8fafc";
                        for (let t = -14; t <= 14; t += 5) {
                            ctx.beginPath();
                            ctx.moveTo(t, 1);
                            ctx.lineTo(t + 2, 8);
                            ctx.lineTo(t + 4, 1);
                            ctx.closePath();
                            ctx.fill();
                        }
                        ctx.restore();

                        // Top jaw
                        ctx.save();
                        ctx.rotate(-jawOpen * 1.0);
                        ctx.fillStyle = "#a21caf";
                        ctx.beginPath();
                        ctx.moveTo(-18, 0);
                        ctx.bezierCurveTo(-12, -14, 12, -14, 18, 0);
                        ctx.bezierCurveTo(14, 3, -14, 3, -18, 0);
                        ctx.fill();
                        if (snapA > 0.15) {
                            ctx.fillStyle = `rgba(236,72,153,${snapA * 0.85})`;
                            ctx.beginPath();
                            ctx.ellipse(0, -4, 11 * snapA, 6 * snapA, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        ctx.fillStyle = "#f8fafc";
                        for (let t = -14; t <= 14; t += 5) {
                            ctx.beginPath();
                            ctx.moveTo(t, -1);
                            ctx.lineTo(t + 2, -8);
                            ctx.lineTo(t + 4, -1);
                            ctx.closePath();
                            ctx.fill();
                        }
                        // Eye faces left (positive x in flipped space = left on screen)
                        ctx.fillStyle = "#fef08a";
                        ctx.beginPath();
                        ctx.arc(5, -7, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "#1a1a1a";
                        ctx.beginPath();
                        ctx.arc(5 + snapA * 0.8, -7, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(4 + snapA * 0.8, -8, 1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        ctx.restore(); // end mirror flip

                        ctx.restore();
                    }
                } else {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#4ade80");
                    padGrad.addColorStop(1, "#16a34a");
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();
                    // Outline for visibility on dark/sunset themes
                    if (currentTheme === "night") {
                        ctx.strokeStyle = "rgba(255,255,255,0.55)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    } else if (currentTheme === "sunset") {
                        ctx.strokeStyle = "rgba(0,0,0,0.3)";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    }

                    ctx.fillStyle = "rgba(255,255,255,0.85)";
                    for (let i = 0; i < 5; i++) {
                        let petalX = centerX + Math.cos(i * 1.2) * 5;
                        let petalY = centerY + Math.sin(i * 1.2) * 3;
                        ctx.beginPath(); ctx.arc(petalX, petalY, 4, 0, Math.PI * 2); ctx.fill();
                    }
                    // Winter: frost the flower petals + snow cap on pad
                    if (currentTheme === "winter") {
                        // Icy blue tint over petals
                        ctx.fillStyle = "rgba(186,230,253,0.55)";
                        for (let i = 0; i < 5; i++) {
                            let petalX = centerX + Math.cos(i * 1.2) * 5;
                            let petalY = centerY + Math.sin(i * 1.2) * 3;
                            ctx.beginPath(); ctx.arc(petalX, petalY, 4, 0, Math.PI * 2); ctx.fill();
                        }
                        // Snow cap — rounded blob on top of pad
                        ctx.fillStyle = "rgba(240,249,255,0.92)";
                        ctx.beginPath();
                        ctx.ellipse(centerX, centerY - radiusY + 2, radiusX * 0.7, 6, 0, Math.PI, 0);
                        ctx.fill();
                        // Snow drips at edges
                        ctx.fillStyle = "rgba(224,242,254,0.8)";
                        for (let d = -1; d <= 1; d++) {
                            ctx.beginPath();
                            ctx.arc(centerX + d * radiusX * 0.45, centerY - radiusY + 4, 3.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    } else {
                        ctx.fillStyle = "#eab308";
                        ctx.beginPath(); ctx.arc(centerX, centerY, 2.5, 0, Math.PI * 2); ctx.fill();
                    }

                    if (lily.hasStar && !lily.starCollected) {
                        let hover = Math.sin(Date.now() * 0.007) * 4;
                        // Halo behind star so it pops on any background
                        let haloColor = currentTheme === "night" ? "rgba(255,255,255,0.25)"
                                      : currentTheme === "sunset" ? "rgba(0,0,0,0.2)"
                                      : "rgba(255,255,255,0.15)";
                        ctx.fillStyle = haloColor;
                        ctx.beginPath(); ctx.arc(centerX, lily.y - 22 + hover, 14, 0, Math.PI*2); ctx.fill();
                        drawStar(centerX, lily.y - 22 + hover, 5, 11, 5, lily.starType);
                    }
                }
            }

            if (slowBlossom) {
                let blinkState = Math.floor(Date.now() / 150) % 2 === 0;
                drawSlowBlossom(slowBlossom.x, slowBlossom.y, slowBlossom.radius, blinkState);
            }

            for (let fish of fishes) {
                let r = fish.radius;
                
                ctx.fillStyle = "#ea580c"; 
                ctx.beginPath();
                ctx.moveTo(fish.x + r * 1.2, fish.y);
                ctx.lineTo(fish.x + r * 2.2, fish.y - r * 1.1);
                ctx.lineTo(fish.x + r * 1.8, fish.y);
                ctx.lineTo(fish.x + r * 2.2, fish.y + r * 1.1);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "#14b8a6"; 
                ctx.beginPath();
                ctx.ellipse(fish.x, fish.y, r * 1.5, r * 1.2, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#ea580c"; 
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(fish.x, fish.y, r * 1.5, r * 1.2, 0, 0, Math.PI);
                ctx.clip();
                ctx.fillRect(fish.x - r * 2, fish.y, r * 4, r * 2);
                ctx.restore();

                ctx.fillStyle = "#fee2e2";
                ctx.beginPath();
                ctx.arc(fish.x - r * 0.6, fish.y - r * 0.6, r * 0.45, 0, Math.PI * 2);
                ctx.arc(fish.x - r * 0.1, fish.y - r * 0.7, r * 0.45, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(fish.x - r * 0.6, fish.y - r * 0.6, r * 0.2, 0, Math.PI * 2);
                ctx.arc(fish.x - r * 0.1, fish.y - r * 0.7, r * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(fish.x - r * 1.4, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 1.2, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 1.0, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 0.8, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 0.6, fish.y + r * 0.1);
                ctx.lineTo(fish.x - r * 0.4, fish.y + r * 0.4);
                ctx.lineTo(fish.x - r * 0.2, fish.y + r * 0.1);
                ctx.closePath();
                ctx.fill();
            }

            // Draw piranha ripple warnings and leaping piranhas
            for (let p of piranhas) {
                if (p.phase === "ripple") {
                    // Expanding ripple rings — warning signal
                    let pulse = Math.sin(p.rippleTimer * 0.18) * 0.3 + 0.7;
                    for (let r = 0; r < 3; r++) {
                        let rr = p.rippleR * (1 - r * 0.3);
                        ctx.strokeStyle = `rgba(239,68,68,${(0.7 - r * 0.2) * pulse})`;
                        ctx.lineWidth = 2 - r * 0.5;
                        ctx.beginPath();
                        ctx.ellipse(p.x, p.y, rr, rr * 0.35, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    // Small fin tip peeking above waterline
                    ctx.fillStyle = "#dc2626";
                    ctx.beginPath();
                    ctx.moveTo(p.x - 6, p.y - p.rippleR * 0.2);
                    ctx.lineTo(p.x, p.y - p.rippleR * 0.55);
                    ctx.lineTo(p.x + 6, p.y - p.rippleR * 0.2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Leaping piranha — body + fin + eye
                    ctx.save();
                    let angle = Math.atan2(p.vy, p.vx);
                    ctx.translate(p.x, p.y);
                    ctx.rotate(angle);
                    // Body
                    ctx.fillStyle = "#14b8a6";
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 18, 9, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Belly
                    ctx.fillStyle = "#f0fdfa";
                    ctx.beginPath();
                    ctx.ellipse(-2, 2, 10, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Tail
                    ctx.fillStyle = "#0f766e";
                    ctx.beginPath();
                    ctx.moveTo(18, 0);
                    ctx.lineTo(28, -7);
                    ctx.lineTo(28, 7);
                    ctx.closePath();
                    ctx.fill();
                    // Dorsal fin
                    ctx.fillStyle = "#dc2626";
                    ctx.beginPath();
                    ctx.moveTo(-4, -9);
                    ctx.lineTo(2, -18);
                    ctx.lineTo(8, -9);
                    ctx.closePath();
                    ctx.fill();
                    // Eye
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(-10, -3, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = "#1a1a1a";
                    ctx.beginPath();
                    ctx.arc(-10, -3, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // Teeth
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.moveTo(-18, 0);
                    ctx.lineTo(-22, -4);
                    ctx.lineTo(-19, 0);
                    ctx.lineTo(-16, -3);
                    ctx.lineTo(-14, 0);
                    ctx.fill();
                    ctx.restore();
                }
            }

            drawGameEffects();

            if (gameState !== "GAME_OVER" && !snapDeathPending) {
                let blinkOff = invincibleTimer > 0 && Math.floor(invincibleTimer / 8) % 2 === 0;
                if (!blinkOff) drawFrog(frogX, frogY, currentSkin);
                if (invincibleTimer > 0) {
                    ctx.strokeStyle = `rgba(125,211,252,${0.35 + Math.sin(invincibleTimer * 0.12) * 0.2})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(frogX, frogY, frogRadius + 10, 0, Math.PI * 2);
                    ctx.stroke();
                }
                // Winter: frog breath puffs (tiny mist left of mouth)
                if (currentTheme === "winter") {
                    for (let bp of breathPuffs) {
                        ctx.fillStyle = `rgba(220,240,255,${Math.max(0,bp.alpha).toFixed(2)})`;
                        ctx.beginPath();
                        ctx.arc(bp.x, bp.y, bp.r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // Snap-shut death animation: plant jaws close around frog
            if (snapPlant) {
                let sp = snapPlant;
                let progress = 1 - (sp.timer / 35);  // 0→1 as timer counts down
                let jawClose = Math.max(0, sp.snapAngle * (1 - progress * 1.4));

                ctx.save();
                ctx.translate(sp.x, sp.y);

                // Stem
                ctx.strokeStyle = "#365314";
                ctx.lineWidth = 4;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(0, sp.stemBase);
                ctx.bezierCurveTo(sp.sw * 1.5, sp.stemBase - 18, -sp.sw + 4, sp.stemBase - 35, sp.sw, -50);
                ctx.stroke();

                // Bottom jaw
                ctx.fillStyle = "#86198f";
                ctx.save();
                ctx.rotate(jawClose * 0.4);
                ctx.beginPath();
                ctx.moveTo(-12, 0); ctx.bezierCurveTo(-10, 6, 10, 6, 12, 0);
                ctx.bezierCurveTo(10, -2, -10, -2, -12, 0); ctx.fill();
                ctx.fillStyle = "#f8fafc";
                for (let t = -9; t <= 9; t += 4) {
                    ctx.beginPath(); ctx.moveTo(t, 0); ctx.lineTo(t+1.5, 5); ctx.lineTo(t+3, 0); ctx.closePath(); ctx.fill();
                }
                ctx.restore();

                // Top jaw closing
                ctx.fillStyle = "#a21caf";
                ctx.save();
                ctx.rotate(-jawClose * 0.9);
                ctx.beginPath();
                ctx.moveTo(-12, 0); ctx.bezierCurveTo(-8, -10, 8, -10, 12, 0);
                ctx.bezierCurveTo(10, 2, -10, 2, -12, 0); ctx.fill();
                // Frog visible inside if not fully closed yet
                if (jawClose > 0.05) {
                    ctx.globalAlpha = Math.min(1, jawClose * 2);
                    ctx.fillStyle = "#4ade80";
                    ctx.beginPath(); ctx.arc(0, -3, 5 * (jawClose), 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1;
                }
                ctx.fillStyle = "#f8fafc";
                for (let t = -9; t <= 9; t += 4) {
                    ctx.beginPath(); ctx.moveTo(t, 0); ctx.lineTo(t+1.5, -5); ctx.lineTo(t+3, 0); ctx.closePath(); ctx.fill();
                }
                ctx.restore();

                ctx.restore();

                sp.timer -= 1;
                if (sp.timer <= 0) {
                    // Now trigger real death
                    snapPlant = null;
                    snapDeathPending = false;
                    gameState = "GAME_OVER";
                    stopBgMusic();
                    playCrashSound();
                    cgGameplayStop();
                    triggerDeathAnim();
                    deathCount++;
                    checkNewBest();
                }
            }

            // Death particle burst
            if (deathAnim) {
                for (let p of deathAnim.particles) {
                    if (p.alpha <= 0) continue;
                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            drawHudPill(12, 8,  118, "SCORE", score, "#4ade80");
            drawHudPill(12, 34, 118, "BEST",  highScore, "#f97316");
            drawSpeedMeter();

            if (combo > 1 && comboTimer > 0) {
                ctx.textAlign = "center";
                drawButton(canvas.width/2 - 62, 16, 124, 32, "COMBO x" + combo, "#f59e0b", "#d97706", "#fff", 14);
                ctx.textAlign = "start";
            }

            if (milestoneBanner && milestoneBanner.timer > 0) {
                let mAlpha = Math.min(1, milestoneBanner.timer / 30);
                ctx.save();
                ctx.globalAlpha = mAlpha;
                ctx.textAlign = "center";
                ctx.shadowColor = "rgba(0,0,0,0.45)";
                ctx.shadowBlur = 6;
                ctx.fillStyle = "#fbbf24";
                ctx.font = "bold 15px Arial";
                ctx.fillText("🏅 " + milestoneBanner.score + " POINT MILESTONE", canvas.width/2, 96);
                ctx.restore();
            }

            // One-time feature warnings — semi-transparent, non-obstructive
            function drawFeatureWarning(msg, sub, timer, maxTimer) {
                if (timer <= 0) return;
                let alpha = timer > maxTimer * 0.8
                    ? (maxTimer - timer) / (maxTimer * 0.2)
                    : Math.min(1, timer / (maxTimer * 0.2));
                alpha = Math.max(0, Math.min(0.82, alpha));
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 150, canvas.height/2 - 34, 300, 68, 14);
                ctx.fill();
                ctx.fillStyle = "#fbbf24";
                ctx.font = "bold 15px Arial";
                ctx.textAlign = "center";
                ctx.fillText(msg, canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                ctx.font = "12px Arial";
                ctx.fillText(sub, canvas.width/2, canvas.height/2 + 12);
                ctx.textAlign = "start";
                ctx.restore();
            }
            drawFeatureWarning("🌿 Carnivorous Plants!", "Land on green lily pads only", plantWarningTimer, 240);
            drawFeatureWarning("🐟 Piranhas are jumping!", "Watch the ripples — dodge the leap!", piranhaWarningTimer, 240);

            // (NEW BEST shown on game over screen only)

            // First-run tutorial hints
            if (tutorialStep < 2 && tutorialTimer > 0) {
                let tAlpha = Math.min(1, tutorialTimer / 30);  // fade out in last 0.5s
                ctx.save();
                ctx.globalAlpha = tAlpha;
                ctx.textAlign = "center";

                if (tutorialStep === 0) {
                    // Step 0: tap to jump hint — bottom center, unobtrusive
                    ctx.fillStyle = "rgba(0,0,0,0.55)";
                    drawRoundedRect(canvas.width/2 - 110, canvas.height - 105, 220, 52, 12);
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 18px Arial";
                    ctx.fillText("👆 Tap to Jump!", canvas.width/2, canvas.height - 78);
                    ctx.font = "13px Arial";
                    ctx.fillStyle = "rgba(255,255,255,0.8)";
                    ctx.fillText("Stay on the lily pads!", canvas.width/2, canvas.height - 60);
                } else if (tutorialStep === 1) {
                    // Step 1: purple lily warning — pointed, urgent
                    ctx.fillStyle = "rgba(124,58,237,0.85)";
                    drawRoundedRect(canvas.width/2 - 130, canvas.height - 115, 260, 62, 12);
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 16px Arial";
                    ctx.fillText("⚠️ Avoid purple spiky lilies!", canvas.width/2, canvas.height - 88);
                    ctx.font = "13px Arial";
                    ctx.fillStyle = "rgba(255,255,255,0.85)";
                    ctx.fillText("❄️ Catch the snowflake to slow time!", canvas.width/2, canvas.height - 68);
                }

                ctx.restore();
            }

            // Pause button — top-right corner
            drawRoundIconButton(canvas.width - 45, 10, 35, 35, isPaused ? "▶" : "⏸", isPaused);

            drawMuteIcon();



            // Pause overlay
            if (isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 36px Arial";
                ctx.textAlign = "center";
                ctx.fillText("⏸ PAUSED", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Arial";
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.fillText("Tap ▶ to resume", canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = "start";
            }

            if (slowdownTimer > 0) {
                ctx.fillStyle = "rgba(6, 182, 212, 0.15)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("❄️ POND SLOWED ❄️", canvas.width / 2, 35);
            }

            if (gameState === "GAME_OVER") {
                ctx.fillStyle = "rgba(255,255,255,0.45)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let cx2 = canvas.width / 2;
                ctx.textAlign = "center";

                // Semi-transparent overlay so text is readable on ALL themes
                ctx.fillStyle = "rgba(255,255,255,0.42)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawLogo(cx2, canvas.height / 2 - 148);

                drawMenuTitleText("GAME OVER", cx2, canvas.height / 2 - 85, 34, "#0e7490", "rgba(255,255,255,0.88)");

                ctx.fillStyle = "#c2410c";
                ctx.font = "bold 22px Arial";
                ctx.fillText("Score: " + score, cx2, canvas.height / 2 - 42);

                ctx.fillStyle = "#0f4c75";
                ctx.font = "18px Arial";
                ctx.fillText("Best: " + highScore + "  ⭐ " + totalStars, cx2, canvas.height / 2 - 14);

                ctx.fillStyle = "#065f46";
                ctx.font = "16px Arial";
                ctx.fillText("Earned this run: ⭐ " + starsCollectedThisRound, cx2, canvas.height / 2 + 14);

                // NEW BEST — compact pill that fits cleanly between the stats and PLAY AGAIN
                if (personalBestBanner) {
                    ctx.fillStyle = "#fbbf24";
                    drawRoundedRect(cx2 - 78, canvas.height / 2 + 22, 156, 22, 8);
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 11px Arial";
                    ctx.fillText("🏆 NEW BEST!  " + highScore + " pts", cx2, canvas.height / 2 + 37);
                }

                // 1. PLAY AGAIN
                let goRestartY = canvas.height / 2 + 50;
                drawButton(cx2 - 92, goRestartY, 184, 48, "PLAY AGAIN", "#38bdf8", "#0284c7", "#fff", 16);

                // 2. MAIN MENU
                let goMenuY = canvas.height / 2 + 110;
                drawButton(cx2 - 92, goMenuY, 184, 48, "MAIN MENU", "#22d3ee", "#0891b2", "#fff", 16);

                // 3. REVIVE (if available)
                let goReviveY = canvas.height / 2 + 170;
                if (canRevive) {
                    drawButton(cx2 - 92, goReviveY, 184, 48, "▶ REVIVE", "#34d399", "#059669", "#fff", 15);
                    ctx.fillStyle = "rgba(15,23,42,0.55)";
                    ctx.font = "10px Arial";
                    ctx.fillText("watch ad", cx2, goReviveY + 42);
                }

                // 4. DOUBLE STARS (once per day)
                let goBoostY = canvas.height / 2 + 230;
                let boostUsedToday = storageGet("frogLastBoostDate") === new Date().toDateString();
                drawButton(cx2 - 92, goBoostY, 184, 48, boostUsedToday ? "⭐ DOUBLED" : "⭐ DOUBLE STARS", boostUsedToday ? "#cbd5e1" : "#f59e0b", boostUsedToday ? "#94a3b8" : "#d97706", "#fff", 14);
                if (!boostUsedToday) {
                    ctx.fillStyle = "rgba(15,23,42,0.55)";
                    ctx.font = "10px Arial";
                    ctx.fillText("watch ad", cx2, goBoostY + 42);
                }

                ctx.fillStyle = "rgba(15,76,117,0.75)";
                ctx.font = "12px Arial";
                ctx.fillText("Tap anywhere to play again", cx2, canvas.height / 2 + 296);

                drawMuteIcon();
                ctx.textAlign = "start";
            }
        }

        function drawDebugPanel() {
            if (!debugOpen) return;
            let pw = 260, ph = 310, px = canvas.width/2 - pw/2, py = 60;
            // Panel background
            ctx.fillStyle = "rgba(15,23,42,0.97)";
            ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 14); ctx.fill();
            ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 14); ctx.stroke();

            ctx.textAlign = "center";
            ctx.fillStyle = "#f59e0b"; ctx.font = "bold 14px Arial";
            ctx.fillText("🛠  DEBUG PANEL  (Shift+D to close)", px + pw/2, py + 22);

            ctx.strokeStyle = "rgba(245,158,11,0.3)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(px+12, py+32); ctx.lineTo(px+pw-12, py+32); ctx.stroke();

            // Section: Themes
            ctx.fillStyle = "#94a3b8"; ctx.font = "bold 11px Arial";
            ctx.fillText("POND THEME", px + pw/2, py + 48);
            let themes = ["classic","sunset","night","winter"];
            themes.forEach((t, i) => {
                let bx = px + 14 + i * 58, by = py + 55, bw2 = 52, bh = 28;
                ctx.fillStyle = currentTheme === t ? "#7c3aed" : "rgba(255,255,255,0.08)";
                ctx.beginPath(); ctx.roundRect(bx, by, bw2, bh, 7); ctx.fill();
                if (currentTheme === t) { ctx.strokeStyle="#a78bfa"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(bx,by,bw2,bh,7); ctx.stroke(); }
                ctx.fillStyle = currentTheme === t ? "#fff" : "#94a3b8";
                ctx.font = "10px Arial";
                ctx.fillText(t.charAt(0).toUpperCase()+t.slice(1), bx+bw2/2, by+18);
            });

            // Section: Score
            ctx.fillStyle = "#94a3b8"; ctx.font = "bold 11px Arial";
            ctx.fillText("SET SCORE TO", px + pw/2, py + 108);
            let scorePresets = [{l:"0",v:0},{l:"150",v:150},{l:"250",v:250},{l:"350",v:350},{l:"500",v:500}];
            scorePresets.forEach((s, i) => {
                let bx2 = px + 10 + i * 48, by2 = py + 114, bw3 = 42, bh2 = 28;
                ctx.fillStyle = "rgba(255,255,255,0.08)";
                ctx.beginPath(); ctx.roundRect(bx2, by2, bw3, bh2, 7); ctx.fill();
                ctx.fillStyle = "#7dd3fc"; ctx.font = "bold 11px Arial";
                ctx.fillText(s.l, bx2+bw3/2, by2+18);
            });

            // Section: Stars
            ctx.fillStyle = "#94a3b8"; ctx.font = "bold 11px Arial";
            ctx.fillText("ADD STARS", px + pw/2, py + 165);
            let starPresets = [{l:"+50",v:50},{l:"+200",v:200},{l:"+500",v:500},{l:"+1000",v:1000}];
            starPresets.forEach((s, i) => {
                let bx3 = px + 14 + i * 58, by3 = py + 172, bw4 = 52, bh3 = 28;
                ctx.fillStyle = "rgba(255,255,255,0.08)";
                ctx.beginPath(); ctx.roundRect(bx3, by3, bw4, bh3, 7); ctx.fill();
                ctx.fillStyle = "#fbbf24"; ctx.font = "bold 11px Arial";
                ctx.fillText(s.l, bx3+bw4/2, by3+18);
            });

            // Section: Unlock themes
            ctx.fillStyle = "#94a3b8"; ctx.font = "bold 11px Arial";
            ctx.fillText("UNLOCK ALL THEMES", px + pw/2, py + 222);
            let ux = px + pw/2 - 80, uy = py + 228;
            ctx.fillStyle = "rgba(124,58,237,0.25)";
            ctx.beginPath(); ctx.roundRect(ux, uy, 160, 28, 7); ctx.fill();
            ctx.strokeStyle = "#7c3aed"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(ux, uy, 160, 28, 7); ctx.stroke();
            ctx.fillStyle = "#a78bfa"; ctx.font = "bold 12px Arial";
            ctx.fillText("Unlock All Themes", px+pw/2, uy+18);

            // Current state display
            ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "11px Arial";
            ctx.fillText("Score: " + score + "  |  Stars: " + totalStars, px+pw/2, py + 278);
            ctx.fillText("Theme: " + currentTheme, px+pw/2, py + 294);

            ctx.textAlign = "start";
        }

        function handleDebugClick(clickX, clickY) {
            if (!debugOpen) return false;
            let pw = 260, ph = 310, px = canvas.width/2 - pw/2, py = 60;
            // Ignore clicks outside panel
            if (clickX < px || clickX > px+pw || clickY < py || clickY > py+ph) {
                debugOpen = false; return true;
            }
            // Theme buttons
            let themes = ["classic","sunset","night","winter"];
            themes.forEach((t, i) => {
                let bx = px + 14 + i * 58, by = py + 55;
                if (clickX >= bx && clickX <= bx+52 && clickY >= by && clickY <= by+28) {
                    currentTheme = t;
                    if (!unlockedThemes.includes(t)) unlockedThemes.push(t);
                    saveShopData();
                }
            });
            // Score presets
            let scorePresets = [0,150,250,350,500];
            scorePresets.forEach((v, i) => {
                let bx2 = px + 10 + i * 48, by2 = py + 114;
                if (clickX >= bx2 && clickX <= bx2+42 && clickY >= by2 && clickY <= by2+28) {
                    score = v;
                }
            });
            // Star presets
            let starVals = [50,200,500,1000];
            starVals.forEach((v, i) => {
                let bx3 = px + 14 + i * 58, by3 = py + 172;
                if (clickX >= bx3 && clickX <= bx3+52 && clickY >= by3 && clickY <= by3+28) {
                    addStars(v);
                }
            });
            // Unlock all themes
            let ux = px + pw/2 - 80, uy = py + 228;
            if (clickX >= ux && clickX <= ux+160 && clickY >= uy && clickY <= uy+28) {
                unlockedThemes = ["classic","sunset","night","winter"];
                saveShopData();
            }
            return true;
        }

        function update() {
            let now = performance.now();
            let dt = (now - lastTime) / 16.666; 
            lastTime = now;
            
            if (dt > 4) dt = 1;
            waterSheenOffset = (waterSheenOffset + 0.18 * dt) % 240;

            if (gameState === "START_MENU" && showDailyBonusBanner && bannerTimer > 0) {
                bannerTimer -= dt;
            }

            updateGameEffects(dt);

            if (comboTimer > 0) {
                comboTimer -= dt;
                if (comboTimer <= 0) combo = 0;
            }
            if (milestoneBanner && milestoneBanner.timer > 0) {
                milestoneBanner.timer -= dt;
                if (milestoneBanner.timer <= 0) milestoneBanner = null;
            }
            if (personalBestTimer > 0) personalBestTimer -= dt;
            if (invincibleTimer > 0 && gameState === "PLAYING") {
                invincibleTimer = Math.max(0, invincibleTimer - dt);
            }

            for (let b of bubbles) {
                b.y -= b.speed * dt;
                b.pulse += 0.02 * dt;
                b.x += Math.sin(b.pulse) * 0.2 * dt;
                if (b.y < -10) {
                    b.y = 610;
                    b.x = Math.random() * 400;
                }
            }

            // Decay tutorial timer
            if (tutorialTimer > 0) {
                tutorialTimer -= dt;
                if (tutorialTimer <= 0) {
                    if (tutorialStep === 0) {
                        // Auto-advance to step 1 even if player hasn't tapped yet
                        tutorialStep = 1;
                        tutorialTimer = 320;
                    } else {
                        tutorialStep = 2;  // done
                    }
                }
            }

            // Decay feature-warning banners

            if (plantWarningTimer > 0) plantWarningTimer -= dt;
            if (piranhaWarningTimer > 0) piranhaWarningTimer -= dt;


            // Animate start screen frog (gentle bobbing)
            if (gameState === "START_MENU") {
                startScreenFrogWave += 0.03;
                startScreenFrogY = 270 + Math.sin(startScreenFrogWave) * 8;
            }

            // Decay landing squish
            if (landSquish > 0) {
                landSquish = Math.max(0, landSquish - 0.08 * dt);
            }

            // Animate winter snowflakes
            if (currentTheme === "winter") {
                for (let sf of snowflakes) {
                    sf.y += sf.speed * dt;
                    sf.x += sf.drift * dt;
                    if (sf.y > canvas.height + 5) {
                        sf.y = -5;
                        sf.x = Math.random() * canvas.width;
                    }
                }

                // Frog breath puffs — emit periodically
                breathTimer -= dt;
                if (breathTimer <= 0 && gameState === "PLAYING") {
                    breathTimer = 90 + Math.random() * 60;  // every 1.5–2.5s
                    // Three puffs: bigger, more opaque, slightly faster
                    breathPuffs.push({ x: frogX - 16, y: frogY + 3, r: 4.5, alpha: 0.78, vy: -0.7 });
                    breathPuffs.push({ x: frogX - 12, y: frogY + 5, r: 3.5, alpha: 0.65, vy: -0.5 });
                    breathPuffs.push({ x: frogX - 8,  y: frogY + 2, r: 2.5, alpha: 0.5,  vy: -0.4 });
                }
                // Animate puffs
                for (let i = breathPuffs.length - 1; i >= 0; i--) {
                    let bp = breathPuffs[i];
                    bp.y += bp.vy * dt;
                    bp.r += 0.03 * dt;
                    bp.alpha -= 0.008 * dt;
                    if (bp.alpha <= 0) breathPuffs.splice(i, 1);
                }
            } else {
                breathPuffs = [];
                breathTimer = 0;
            }

            // Animate parallax plants (half the lily speed)
            for (let p of plants) {
                p.x -= (lilySpeed * 0.45) * dt;
                p.sway += 0.018 * dt;
                if (p.x < -40) {
                    p.x = canvas.width + 15;
                    p.y = Math.random() * 160 + 420;
                    let c = WEED_COLORS[Math.floor(Math.random()*WEED_COLORS.length)];
                    p.color  = c;
                    p.blades = makeWeedBlades(Math.floor(Math.random()*2)+3);
                    p.stones = Array.from({length: Math.floor(Math.random()*2)+2}, () => ({
                        ox: (Math.random()-0.5)*20,
                        oy: Math.random()*4,
                        rx: Math.random()*7+4,
                        ry: Math.random()*3+2,
                        col: ["#a8a29e","#78716c","#d6d3d1"][Math.floor(Math.random()*3)]
                    }));
                }
            }

            // Tick death particles
            if (deathAnim) {
                deathAnim.timer -= dt;
                for (let p of deathAnim.particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 0.15 * dt;
                    p.alpha -= 0.022 * dt;
                }
                if (deathAnim.timer <= 0) deathAnim = null;
            }

            if (gameState !== "PLAYING" || isPaused || snapDeathPending) return;

            let normalSpeed = baseLilySpeed + (score * 0.028);
            let targetSpeed = normalSpeed;

            if (slowdownTimer > 0) {
                slowdownTimer -= dt;
                // During freeze: reset to start speed immediately
                if (slowdownTimer > 60) {
                    targetSpeed = baseLilySpeed;   // fully reset to game-start speed
                } else {
                    // Final 1s: gentle bridge into ramp-back phase
                    let t = slowdownTimer / 60;
                    targetSpeed = baseLilySpeed + (preSlowSpeed - baseLilySpeed) * (1 - t) * 0.3;
                }
                rampBackTimer = 0;  // reset ramp timer while still frozen
            } else {
                dynamicSlowMultiplier = 1.0;
                if (slowdownCooldown > 0) slowdownCooldown -= dt;

                // Gradual ramp back to the speed the player had before the freeze
                if (preSlowSpeed > 0 && lilySpeed < preSlowSpeed) {
                    rampBackTimer += dt;
                    let rampProgress = Math.min(1, rampBackTimer / rampBackDuration);
                    // Ease-in curve so it feels gradual at first then builds
                    let eased = rampProgress * rampProgress;
                    targetSpeed = baseLilySpeed + (preSlowSpeed - baseLilySpeed) * eased;
                    if (rampProgress >= 1) preSlowSpeed = 0;  // ramp complete
                }
            }

            lilySpeed = Math.min(maxLilySpeed, targetSpeed);

            // Ramp speed glow: 0 = calm, 1 = full speed bright
            let dangerTarget = (slowdownTimer > 0) ? 0 : Math.max(0, (lilySpeed - maxLilySpeed * 0.75) / (maxLilySpeed * 0.25));
            bgDanger += (dangerTarget - bgDanger) * 0.03 * dt;

            // Speed streaks: spawn cyan-white streaks at full speed
            if (bgDanger > 0.6 && Math.random() < 0.15 * dt) {
                speedStreaks.push({
                    x: canvas.width + 10,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 60 + 30,
                    speed: lilySpeed * 2.5,
                    alpha: Math.random() * 0.35 + 0.12
                });
            }
            for (let i = speedStreaks.length - 1; i >= 0; i--) {
                speedStreaks[i].x -= speedStreaks[i].speed * dt;
                if (speedStreaks[i].x + speedStreaks[i].length < 0) speedStreaks.splice(i, 1);
            }

            spawnInterval = Math.max(58, 90 - (score * 0.24));
            fishInterval = Math.max(112, 160 - (score * 0.35));

            velocity += gravity * dt;
            frogY += velocity * dt;

            // Vertical ceiling: no matter how many times the player taps,
            // the frog can only rise until a sliver of its bottom is still
            // visible at the very top of the screen — it can't fly off-screen.
            let topLimit = -frogRadius + 6;
            if (frogY < topLimit) {
                frogY = topLimit;
                if (velocity < 0) velocity = 0;
            }

            // Rare freeze water lily: only spawns when at full speed, randomly every 10-20 seconds
            if (normalSpeed >= maxLilySpeed) {
                // Timer always counts down at full speed (independent of cooldown)
                if (!slowBlossom) {
                    freezeLilySpawnTimer -= dt;
                    if (freezeLilySpawnTimer <= 0) {
                        // Only actually spawn if cooldown has expired
                        if (slowdownCooldown <= 0) {
                            // Always spawn from the right — player needs time to react and collect it
                            let spawnX = canvas.width + 15;
                            let spawnY = Math.floor(Math.random() * 320) + 130; // random height
                            slowBlossom = {
                                x: spawnX,
                                y: spawnY,
                                vx: -lilySpeed,                        // moves left with stage
                                vy: (Math.random() - 0.5) * 1.0,       // very slight vertical drift
                                radius: 13
                            };
                        }
                        // Always reset timer whether we spawned or skipped
                        freezeLilySpawnTimer = newFreezeLilyDelay();
                    }
                }
            } else {
                // Not at full speed yet — reset timer so countdown starts fresh when full speed is reached
                freezeLilySpawnTimer = newFreezeLilyDelay();
            }

            if (slowBlossom) {
                slowBlossom.x += slowBlossom.vx * dt;
                slowBlossom.y += slowBlossom.vy * dt;
                
                let dx = frogX - slowBlossom.x;
                let dy = frogY - slowBlossom.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < frogRadius + slowBlossom.radius) {
                    slowBlossom = null;
                    slowdownTimer = 600;          // ~10 seconds
                    slowdownCooldown = 1000;
                    preSlowSpeed = lilySpeed;     // remember speed before freeze
                    playSlowdownSound();
                    addSparkles(frogX, frogY, "#67e8f9", 22);
                    addFloatingText("Slow motion!", frogX, frogY - 28, "#67e8f9");
                    vibrate([18, 18, 18]);
                } else if (
                    slowBlossom.x < -30 || slowBlossom.x > canvas.width + 30 ||
                    slowBlossom.y < -30 || slowBlossom.y > canvas.height + 30
                ) {
                    slowBlossom = null;
                    slowdownCooldown = 400; 
                }
            }

            // ── Jumping piranhas (score >= 350) ──────────────────────────────
            if (score >= 350) {
                piranhaTimer += dt;
                // Interval tightens from 420 → 240 as score climbs past 350
                piranhaInterval = Math.max(240, 420 - (score - 350) * 0.6);
                if (piranhaTimer >= piranhaInterval) {
                    piranhaTimer = 0;
                    // Spawn ripple warning on the right half, below waterline
                    let wx = canvas.width * 0.55 + Math.random() * canvas.width * 0.35;
                    let wy = canvas.height * 0.55 + Math.random() * canvas.height * 0.2;
                    if (!piranhaWarningShown) {
                        piranhaWarningShown = true;
                        piranhaWarningTimer = 240;
                        storageSet("frogSeenPiranhaWarning", "1");
                    }
                    piranhas.push({
                        x: wx, y: wy,
                        vx: -(lilySpeed * 0.6 + Math.random() * 1.5),
                        vy: -(9 + Math.random() * 3),
                        phase: "ripple",
                        rippleTimer: 65,
                        rippleR: 0,
                        radius: 10
                    });
                }
            }

            for (let i = piranhas.length - 1; i >= 0; i--) {
                let p = piranhas[i];
                if (p.phase === "ripple") {
                    p.rippleTimer -= dt;
                    p.rippleR = Math.min(28, p.rippleR + 0.55 * dt);
                    p.x -= lilySpeed * 0.4 * dt;   // drift slightly left with stage
                    if (p.rippleTimer <= 0) {
                        p.phase = "jump";           // launch!
                    }
                } else {
                    // Parabolic arc
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 0.38 * dt;             // gravity
                    // Collision with frog
                    let dx = frogX - p.x;
                    let dy = frogY - p.y;
                    if (invincibleTimer <= 0 && Math.sqrt(dx*dx + dy*dy) < frogRadius + p.radius) {
                        gameState = "GAME_OVER";
                        stopBgMusic();
                        playCrashSound();
                        cgGameplayStop();
                        triggerDeathAnim();
                        deathCount++;
                    checkNewBest();
                        if (deathCount % 5 === 0) cgRequestMidgameAd(null);
                        break;
                    }
                    // Remove once below screen or far left
                    if (p.y > canvas.height + 20 || p.x < -30) {
                        piranhas.splice(i, 1);
                    }
                }
            }

            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].radius += 1.2 * dt;
                ripples[i].alpha -= 0.03 * dt;
                ripples[i].x -= lilySpeed * dt; 
                if (ripples[i].alpha <= 0) {
                    ripples.splice(i, 1);
                }
            }

            // Animate carnivorous plants: sway + snap open/close cycle
            for (let lily of lilies) {
                if (!lily.hasPlant) continue;
                // Trigger one-time plant warning
                if (!plantWarningShown && lily.x < canvas.width * 0.85) {
                    plantWarningShown = true;
                    plantWarningTimer = 240;  // 4 seconds
                    storageSet("frogSeenPlantWarning", "1");
                }
                lily.plantSway += 0.022 * dt;
                // Snap open/close: snapAngle bounces between 0.05 and 0.9
                lily.plantSnapAngle += lily.plantSnapDir * 0.018 * dt;
                if (lily.plantSnapAngle >= 0.9) { lily.plantSnapAngle = 0.9; lily.plantSnapDir = -1; }
                if (lily.plantSnapAngle <= 0.05) {
                    lily.plantSnapAngle = 0.05;
                    lily.plantSnapDir = 1;
                    // Pause at closed for a moment — more threatening
                    lily.plantSnapDir = 1;
                }

                // Frog collision with plant head (only during PLAYING, not already in snap)
                if (gameState === "PLAYING" && !snapDeathPending) {
                    let sw = Math.sin(lily.plantSway) * 4;
                    let headX = lily.x + lily.width / 2 + sw;
                    let headY = lily.y - 30;
                    let dx = frogX - headX;
                    let dy = frogY - headY;
                    if (invincibleTimer <= 0 && Math.sqrt(dx*dx + dy*dy) < frogRadius + 18) {
                        // Trigger snap death
                        snapDeathPending = true;
                        snapPlant = {
                            x: headX, y: headY,
                            stemBase: 30,
                            sw, snapAngle: lily.plantSnapAngle,
                            timer: 35   // ~0.58s at 60fps
                        };
                        // Freeze frog in place
                        velocity = 0;
                    }
                }
            }

            for (let i = lilies.length - 1; i >= 0; i--) {
                lilies[i].x -= lilySpeed * dt;

                if (!lilies[i].purple && isStandingOn(lilies[i])) {
                    frogY = lilies[i].y - frogRadius;
                    velocity = 0;
                    frogX -= lilySpeed * dt; 

                    if (!lilies[i].justLanded) {
                        ripples.push({
                            x: frogX,
                            y: lilies[i].y + 4,
                            radius: 10,
                            alpha: 1.0
                        });
                        lilies[i].justLanded = true;
                        landSquish = 1.0; // trigger squish anim
                    }

                    if (lilies[i].hasStar && !lilies[i].starCollected) {
                        lilies[i].starCollected = true;
                        combo = Math.min(20, combo + 1);
                        comboTimer = 180;
                        // Base +8, each consecutive landing adds +1 more
                        // combo=1 → +8, combo=2 → +9, combo=3 → +10, etc.
                        let comboBonus = combo > 1 ? combo - 1 : 0;
                        let totalPoints = 8 + comboBonus;
                        score += totalPoints;
                        starsCollectedThisRound++;
                        addStars(1);
                        addSparkles(frogX, frogY - 18, lilies[i].starType === "boost" ? "#fb7185" : "#fbbf24", 14 + Math.min(comboBonus, 6) * 2);
                        addFloatingText(comboBonus > 0 ? "+" + totalPoints + "  combo!" : "+8", frogX, frogY - 30, lilies[i].starType === "boost" ? "#fb7185" : "#fbbf24");
                        vibrate(12);
                        
                        if (lilies[i].starType === "boost") {
                            frogX = Math.min(250, frogX + 45); 
                            playStarSound(true);
                        } else {
                            playStarSound(false);
                        }
                        checkMilestones();
                    }

                    if (!lilies[i].passed) {
                        lilies[i].passed = true;
                        score++;
                        checkMilestones();
                    }
                    
                    // High score updated on death only — not mid-run


                } else {
                    if (!isStandingOn(lilies[i])) {
                        lilies[i].justLanded = false;
                    }
                }

                if (invincibleTimer <= 0 && lilies[i].purple && checkSideCollision(lilies[i])) {
                    gameState = "GAME_OVER";
                    stopBgMusic();
                    playCrashSound();
                    cgGameplayStop();
                    triggerDeathAnim();
                    deathCount++;
                    checkNewBest();
                }

                if (lilies[i].x + lilies[i].width < -20) {
                    lilies.splice(i, 1);
                }
            }

            for (let i = fishes.length - 1; i >= 0; i--) {
                fishes[i].x -= (lilySpeed + 0.8) * dt; 
                fishes[i].angle += 0.07 * dt;
                fishes[i].y = fishes[i].baseY + Math.sin(fishes[i].angle) * 35; 

                if (invincibleTimer <= 0 && checkFishCollision(fishes[i])) {
                    gameState = "GAME_OVER";
                    stopBgMusic();
                    playCrashSound();
                    cgGameplayStop();
                    triggerDeathAnim();
                    deathCount++;
                    checkNewBest();
                }

                if (fishes[i].x < -40) {
                    fishes.splice(i, 1);
                }
            }

            // Die when any part of frog crosses the left edge (frogX is center, so right edge = frogX+frogRadius)
            // Or when fully fallen below the bottom
            // Die when completely off left edge (not even 1px visible)
            // frogX + frogRadius is the rightmost pixel of the frog
            if (frogY - frogRadius > canvas.height || frogX + frogRadius < 0) {
                gameState = "GAME_OVER";
                stopBgMusic();
                playCrashSound();
                cgGameplayStop();
                triggerDeathAnim();
                deathCount++;
                    checkNewBest();
                if (deathCount % 5 === 0) cgRequestMidgameAd(null);
            }

            spawnTimer += dt;
            if (spawnTimer > spawnInterval) {
                spawnLily();
                spawnTimer = 0;
            }

            fishTimer += dt;
            if (fishTimer > fishInterval) {
                spawnFish();
                fishTimer = 0;
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        let lastPrimaryInputAt = 0;
        function processPrimaryInput(e) {
            stopNativeTouchFeedback(e);
            lastPrimaryInputAt = Date.now();
            try { canvas.setPointerCapture && e.pointerId !== undefined && canvas.setPointerCapture(e.pointerId); } catch(err) {}
            try { canvas.blur(); } catch(err) {}
            handleCanvasClick(e);
        }

        canvas.addEventListener("pointerdown", processPrimaryInput, { passive: false });
        canvas.addEventListener("touchstart", function(e) {
            // On modern browsers Pointer Events handle the game input; this line
            // still blocks the native grey/black tap overlay. On older browsers it
            // also acts as the gameplay input fallback.
            stopNativeTouchFeedback(e);
            if (!window.PointerEvent && Date.now() - lastPrimaryInputAt > 350) {
                lastPrimaryInputAt = Date.now();
                handleCanvasClick(e);
            }
        }, { passive: false });
        canvas.addEventListener("mousedown", function(e) {
            if (window.PointerEvent || Date.now() - lastPrimaryInputAt < 350) return;
            processPrimaryInput(e);
        }, { passive: false });
        canvas.addEventListener("click", stopNativeTouchFeedback, { passive: false });
        ["touchmove", "touchend", "touchcancel", "pointerup", "pointermove", "pointercancel", "lostpointercapture", "contextmenu", "selectstart", "dragstart"].forEach(type => {
            canvas.addEventListener(type, stopNativeTouchFeedback, { passive: false });
        });

        gameLoop();
    </script>
</body>
</html>
