<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#8FDDDF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Froggy Adventure</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
        }
        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            background-color: #8FDDDF;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -ms-touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-text-size-adjust: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, canvas, #gameCanvas {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
        #gameCanvas {
            display: block;
            cursor: pointer;
            outline: none !important;
            border: 0;
            background: transparent !important;
            touch-action: none;
            -ms-touch-action: none;
            -webkit-user-drag: none;
            -webkit-appearance: none;
            appearance: none;
        }
        #gameCanvas:active,
        #gameCanvas:focus,
        #gameCanvas:focus-visible {
            outline: none !important;
            background: transparent !important;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
        }
        ::selection { background: transparent; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600" tabindex="-1" aria-label="Froggy Adventure game canvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Mobile polish: remove browser tap highlights, callouts, selection,
        // drag, and synthetic click feedback so taps do not dark-flash the canvas.
        canvas.setAttribute("tabindex", "-1");
        canvas.setAttribute("draggable", "false");
        canvas.style.webkitTapHighlightColor = "rgba(0,0,0,0)";
        canvas.style.touchAction = "none";
        document.documentElement.style.webkitTapHighlightColor = "rgba(0,0,0,0)";
        document.body.style.webkitTapHighlightColor = "rgba(0,0,0,0)";

        function stopNativeTouchFeedback(e) {
            try {
                if (e && e.cancelable !== false) e.preventDefault();
            } catch(err) {}
        }

        ["contextmenu", "selectstart", "dragstart"].forEach(type => {
            document.addEventListener(type, stopNativeTouchFeedback, { passive: false, capture: true });
        });
        ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
            document.addEventListener(type, stopNativeTouchFeedback, { passive: false, capture: true });
        });
        document.addEventListener("touchstart", function(e) {
            if (e.target === canvas) stopNativeTouchFeedback(e);
        }, { passive: false, capture: true });

        // ─── Responsive canvas scaling ─────────────────────────────────────
        // Internal resolution always stays 400x600 (canvas.width/height attributes).
        // Only the CSS display size changes, keeping the 2:3 aspect ratio and
        // fitting within whatever viewport CrazyGames gives us (desktop iframe,
        // mobile portrait, mobile landscape, fullscreen, etc).
        const GAME_W = 400, GAME_H = 600;

        function resizeCanvas() {
            // documentElement.clientWidth/Height is more reliable than
            // window.innerWidth/Height inside nested iframes (CrazyGames embeds
            // the game in an iframe, and innerWidth can briefly report stale
            // or incorrect values before the iframe has fully settled).
            const vw = document.documentElement.clientWidth  || window.innerWidth;
            const vh = document.documentElement.clientHeight || window.innerHeight;

            if (!vw || !vh) return; // not ready yet, skip this pass

            const gameRatio = GAME_W / GAME_H;
            const viewRatio = vw / vh;

            let displayW, displayH;
            if (viewRatio > gameRatio) {
                // Viewport wider than game ratio → fit to height
                displayH = vh;
                displayW = vh * gameRatio;
            } else {
                // Viewport taller/narrower than game ratio → fit to width
                displayW = vw;
                displayH = vw / gameRatio;
            }

            canvas.style.width = displayW + "px";
            canvas.style.height = displayH + "px";
            canvas.style.position = "absolute";
            canvas.style.left = ((vw - displayW) / 2) + "px";
            canvas.style.top = ((vh - displayH) / 2) + "px";
        }

        canvas.style.position = "absolute"; // ensure positioning works even before first resize

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("orientationchange", resizeCanvas);
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", resizeCanvas);
            window.visualViewport.addEventListener("scroll", resizeCanvas);
        }

        // Run resize multiple times after load — CrazyGames' iframe and player UI
        // can settle into their final size a few frames after our script starts,
        // so a single immediate call isn't always enough.
        resizeCanvas();
        window.addEventListener("load", resizeCanvas);
        setTimeout(resizeCanvas, 100);
        setTimeout(resizeCanvas, 500);
        setTimeout(resizeCanvas, 1500);

        let lastTime = performance.now();

        // ─── CrazyGames SDK v3 Integration ───────────────────────────────────
        let cgSDK = null;

        async function initCrazyGamesSDK() {
            try {
                // Wait for the SDK script to finish loading before using it
                await new Promise((resolve, reject) => {
                    if (window.CrazyGames && window.CrazyGames.SDK) {
                        resolve();
                    } else {
                        const sdkScript = document.querySelector('script[src*="crazygames-sdk"]');
                        if (sdkScript) {
                            sdkScript.addEventListener("load", resolve);
                            sdkScript.addEventListener("error", reject);
                        } else {
                            reject(new Error("CrazyGames SDK script not found"));
                        }
                    }
                });
                await window.CrazyGames.SDK.init();
                cgSDK = window.CrazyGames.SDK;

                // Respect CrazyGames platform mute setting
                const settings = cgSDK.game.settings;
                if (settings && settings.muteAudio) {
                    isMuted = true;
                    storageSet("frogGameMuted", true);
                }
                // Listen for settings changes (e.g. user mutes from platform)
                cgSDK.game.addSettingsChangeListener((newSettings) => {
                    if (newSettings.muteAudio && !isMuted) {
                        isMuted = true;
                        stopBgMusic();
                    }
                });

                cgSDK.game.loadingStart();
            } catch (e) {
                console.warn("CrazyGames SDK init failed:", e);
            }
        }

        function cgGameplayStart() {
            try { if (cgSDK) cgSDK.game.gameplayStart(); } catch(e) {}
        }

        function cgGameplayStop() {
            try { if (cgSDK) cgSDK.game.gameplayStop(); } catch(e) {}
        }

        function cgHappyTime() {
            try { if (cgSDK) cgSDK.game.happytime(); } catch(e) {}
        }

        function cgRequestRewardedAd(onGranted, onSkipped) {
            if (!cgSDK) { if (onGranted) onGranted(); return; }
            try {
                cgSDK.ad.requestAd("rewarded", {
                    adStarted:  () => { stopBgMusic(); cgGameplayStop(); },
                    adFinished: () => { if (!isMuted) startBgMusic(); if (onGranted) onGranted(); },
                    adError:    () => { if (!isMuted) startBgMusic(); if (onSkipped) onSkipped(); }
                });
            } catch(e) { if (onSkipped) onSkipped(); }
        }

        // Revive state
        let canRevive = true;   // only one revive per run
        let reviveUsed = false;
        let invincibleTimer = 0; // post-revive safety window, in frames

        function doRevive() {
            reviveUsed = true;
            canRevive = false;
            // True revive: clear the death burst, pull the frog back on screen,
            // and grant a visible grace period so the rewarded ad feels fair.
            deathAnim = null;
            snapPlant = null;
            snapDeathPending = false;
            invincibleTimer = 180; // ~3 seconds at 60fps
            frogX = Math.max(115, frogX);
            frogY = clamp(frogY, 120, canvas.height - 120);
            velocity = jumpStrength * 0.55;
            piranhas = piranhas.filter(p => p.x < frogX - 70 || p.x > frogX + 120);
            gameState = "PLAYING";
            vibrate([30, 20, 30]);
            if (!isMuted) startBgMusic();
            cgGameplayStart();
        }

        function cgRequestMidgameAd(onDone) {
            if (!cgSDK) { if (onDone) onDone(); return; }
            try {
                cgSDK.ad.requestAd("midgame", {
                    adStarted: () => {
                        // Pause game & mute audio during ad
                        stopBgMusic();
                        cgGameplayStop();
                    },
                    adFinished: () => {
                        // Resume audio & game after ad
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    },
                    adError: (err) => {
                        console.warn("CrazyGames ad error:", err);
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    }
                });
            } catch(e) {
                if (onDone) onDone();
            }
        }
        // ─────────────────────────────────────────────────────────────────────

        // Small platform helpers. Storage can be unavailable in private tabs or
        // strict iframes, so keep the game playable even when persistence fails.
        function storageGet(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }
        function storageSet(key, value) {
            try { localStorage.setItem(key, value); } catch(e) {}
        }
        function getStoredInt(key, fallback = 0) {
            let n = parseInt(storageGet(key), 10);
            return Number.isFinite(n) ? n : fallback;
        }
        function getStoredArray(key, fallback) {
            try {
                let parsed = JSON.parse(storageGet(key));
                return Array.isArray(parsed) ? parsed : fallback.slice();
            } catch(e) {
                return fallback.slice();
            }
        }
        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }
        function vibrate(pattern) {
            try { if (navigator.vibrate && !isMuted) navigator.vibrate(pattern); } catch(e) {}
        }

        let audioCtx = null;
        let bgMusicInterval = null;
        let activeMusicNodes = [];
        let isMuted = storageGet("frogGameMuted") === 'true';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) startBgMusic();
            }
        }

        function playPluckedNote(freq, duration, volume = 0.05, type = "sine") {
            if (!audioCtx || isMuted || freq <= 0) return;
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            
            activeMusicNodes.push({ osc, gainNode });
        }

        function playTone(freq, type, duration, vol = 0.08, startTimeOffset = 0) {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTimeOffset);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTimeOffset + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

        function playJumpSound() {
            playTone(392.00, "sine", 0.15, 0.05);
            playTone(523.25, "sine", 0.12, 0.03, 0.03);
        }

        function playStarSound(isBoost) {
            if (isBoost) {
                playTone(523.25, "sine", 0.1, 0.04);
                playTone(659.25, "sine", 0.1, 0.04, 0.03);
                playTone(783.99, "sine", 0.15, 0.04, 0.06);
            } else {
                playTone(523.25, "sine", 0.08, 0.04);
                playTone(783.99, "sine", 0.12, 0.04, 0.03);
            }
        }

        function playSlowdownSound() {
            playTone(880.00, "sine", 0.12, 0.03);
            playTone(698.46, "sine", 0.12, 0.03, 0.05);
            playTone(523.25, "sine", 0.18, 0.03, 0.1);
        }

        function playCrashSound() {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBgMusic() {
            if (!audioCtx || isMuted) return;
            stopBgMusic();

            let melody = [
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                329.63, 392.00, 523.25, 392.00, 293.66, 349.23, 392.00, 0,
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                392.00, 440.00, 493.88, 523.25, 587.33, 0, 523.25, 0
            ];

            let harmony = [
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                196.00, 0, 196.00, 0, 146.83, 0, 196.00, 0,
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                146.83, 0, 196.00, 0, 261.63, 0, 196.00, 0
            ];

            let index = 0;
            let noteDuration = 0.22;

            bgMusicInterval = setInterval(() => {
                if (audioCtx && !isMuted) {
                    let currentNote = melody[index % melody.length];
                    let currentBass = harmony[index % harmony.length];
                    if (currentNote > 0) playPluckedNote(currentNote, 0.35, 0.06, "triangle");
                    if (currentBass > 0) playPluckedNote(currentBass, 0.5, 0.045, "sine");
                    index++;
                }
            }, noteDuration * 1000);
        }

        function stopBgMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
            activeMusicNodes.forEach(node => {
                try { node.osc.stop(); } catch(e) {}
            });
            activeMusicNodes = [];
        }

        function toggleMute() {
            isMuted = !isMuted;
            storageSet("frogGameMuted", isMuted);
            if (!audioCtx) return; 

            if (isMuted) {
                stopBgMusic();
            } else {
                startBgMusic();
            }
        }

        let totalStars = getStoredInt("frogTotalStars", 0);
        let unlockedSkins = getStoredArray("frogUnlockedSkins", ["classic"]);
        if (!unlockedSkins.includes("classic")) unlockedSkins.unshift("classic");
        let currentSkin = storageGet("frogCurrentSkin") || "classic";
        let shopIndex = 0; 

        const skinsData = [
            { id: "classic", name: "Lime Whimsical", cost: 0,    color: "#a3e635", belly: "#fef08a", comingSoon: false },
            { id: "ruby",    name: "Blossom Pink",   cost: 400,  color: "#f43f5e", belly: "#ffe4e6", comingSoon: false },
            { id: "student", name: "Sky Blue",        cost: 600,  color: "#38bdf8", belly: "#e0f2fe", comingSoon: false },
            { id: "ninja",   name: "Deep Teal",       cost: 800,  color: "#0f766e", belly: "#ccfbf1", comingSoon: false },
            { id: "wizard",  name: "Magic Purple",    cost: 1000, color: "#c084fc", belly: "#f3e8ff", comingSoon: false },
            { id: "royal",   name: "Bright Gold",     cost: 1200, color: "#fbbf24", belly: "#fef3c7", comingSoon: false },
            { id: "cyber",   name: "Neon Mint",       cost: 1800, color: "#2dd4bf", belly: "#f1f5f9", comingSoon: true },
            { id: "party",   name: "Rave Magenta",    cost: 2400, color: "#f472b6", belly: "#ecfeff", comingSoon: true },
            { id: "alien",   name: "Galaxy Alien",    cost: 3000, color: "#a855f7", belly: "#22c55e", comingSoon: true }
        ];
        if (!skinsData.some(s => s.id === currentSkin && unlockedSkins.includes(s.id) && !s.comingSoon)) {
            currentSkin = "classic";
        }

        // Pond themes — separate from skins, unlock background style
        const themesData = [
            {
                id: "classic",
                name: "Lake Classic",
                cost: 0,
                comingSoon: false,
                // gradient stops [top, mid, bot] for calm state and full-speed state
                calm:  { top:[178,238,240], mid:[143,221,223], bot:[91,191,194] },
                fast:  { top:[204,251,241], mid:[34,211,238],  bot:[14,116,144] },
                bubble: "rgba(255,255,255,0.25)",
                streakColor: "rgba(255,255,255,{a})"
            },
            {
                id: "sunset",
                name: "Sunset Pond",
                cost: 400,
                comingSoon: false,
                calm:  { top:[254,215,170], mid:[251,146,60],  bot:[194,65,12]  },
                fast:  { top:[255,237,213], mid:[249,115,22],  bot:[154,52,18]  },
                bubble: "rgba(255,200,150,0.3)",
                streakColor: "rgba(255,220,150,{a})"
            },
            {
                id: "night",
                name: "Night Pond",
                cost: 600,
                comingSoon: false,
                calm:  { top:[30,27,75],   mid:[17,24,39],    bot:[7,10,20]    },
                fast:  { top:[49,46,129],  mid:[30,27,75],    bot:[17,24,39]   },
                bubble: "rgba(148,163,184,0.2)",
                streakColor: "rgba(200,220,255,{a})"
            },
            {
                id: "winter",
                name: "Winter Pond",
                cost: 900,
                comingSoon: false,
                calm:  { top:[224,242,254], mid:[186,230,253], bot:[125,211,252] },
                fast:  { top:[240,249,255], mid:[224,242,254], bot:[147,197,253] },
                bubble: "rgba(220,240,255,0.35)",
                streakColor: "rgba(200,230,255,{a})"
            },
            {
                id: "tropical",
                name: "Tropical Forest",
                cost: 1200,
                comingSoon: true,
                calm:  { top:[134,239,172], mid:[34,197,94],  bot:[21,128,61]  },
                fast:  { top:[187,247,208], mid:[74,222,128], bot:[22,163,74]  },
                bubble: "rgba(187,247,208,0.35)",
                streakColor: "rgba(220,252,231,{a})"
            }
        ];

        let currentTheme = storageGet("frogCurrentTheme") || "classic";
        let unlockedThemes = getStoredArray("frogUnlockedThemes", ["classic"]);
        if (!unlockedThemes.includes("classic")) unlockedThemes.unshift("classic");
        if (!themesData.some(t => t.id === currentTheme && unlockedThemes.includes(t.id) && !t.comingSoon)) {
            currentTheme = "classic";
        }
        let shopTab = "skins";   // "skins" | "themes"


        let showDailyBonusBanner = false;
        let dailyBonusAlreadyClaimed = false;
        let bannerTimer = 0;

        let totalRuns = getStoredInt("frogTotalRuns", 0);
        let totalStarsEver = getStoredInt("frogTotalStarsEver", 0);

        function checkDailyLogin() {
            const today = new Date().toDateString();
            const lastVisit = storageGet("frogLastVisitDate");
            
            if (lastVisit !== today) {
                addStars(20);
                storageSet("frogLastVisitDate", today);
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = false;
                bannerTimer = 180; 
            } else {
                // Already claimed today — show a reminder on the home page
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = true;
                bannerTimer = 180;
            }
        }
        checkDailyLogin();

        // Init SDK; signal loading complete once the page is ready
        initCrazyGamesSDK().then(() => {
            try { if (cgSDK) { cgSDK.game.loadingStop(); cgGameplayStop(); } } catch(e) {}
        });

        let gameState = "START_MENU"; 

        let frogX = 100;
        let frogY = 300;
        let frogRadius = 16;
        let velocity = 0;
        let gravity = 0.4;
        let jumpStrength = -7.5;
        let score = 0;
        let starsCollectedThisRound = 0;
        let isPaused = false;
        let highScore = getStoredInt("frogHighScore", 0);
        let isFirstRun = !storageGet("frogHasPlayed");
        let tutorialStep = 0;
        let tutorialTimer = 0;

        // One-time feature warnings (transparent, non-obstructive)
        let plantWarningShown = !!storageGet("frogSeenPlantWarning");
        let plantWarningTimer = 0;
        let piranhaWarningShown = !!storageGet("frogSeenPiranhaWarning");
        let piranhaWarningTimer = 0;

        // Jumping piranhas (score >= 300)
        let piranhas = [];          // { x, y, vx, vy, phase: "ripple"|"jump", rippleTimer, rippleR }
        let piranhaTimer = 0;
        let piranhaInterval = 420; // frames between piranha warnings (~7s initially)

        // ── DEBUG PANEL (remove before final release) ────────────────────────
        let debugOpen = false;

        // ── Carnivorous plant snap death ──────────────────────────────────────
        let snapPlant = null;   // { x, y, snapAngle, timer } — plays snap-shut anim before GAME_OVER
        let snapDeathPending = false;

        // Celebration banners
        let personalBestBanner = false;
        let personalBestTimer = 0;
        let milestoneBanner = null;           // { score, timer }
        let milestonesReachedThisRun = new Set(); // avoid duplicate banners

        // Start screen animated frog
        let startScreenFrogY = 200;
        let startScreenFrogVel = 0;
        let startScreenFrogWave = 0;

        let lilies = [];
        let baseLilySpeed = 2.5;
        let lilySpeed = baseLilySpeed;
        let maxLilySpeed = 5.8;
        let spawnTimer = 0;
        let spawnInterval = 90;
        let lastLilyY = 300;      // used to keep new pads reachable instead of fully random
        let combo = 0;
        let comboTimer = 0;

        let fishes = [];
        let fishTimer = 0;
        let fishInterval = 160; 

        let ripples = [];

        // Juice variables
        let deathAnim = null;          // { x, y, timer, particles[] }
        let sparkleParticles = [];     // tiny collectible/landing particles
        let floatingTexts = [];        // score popups and milestone feedback
        let jumpRings = [];            // subtle local tap feedback around the frog, not a full-screen flash
        let waterSheenOffset = 0;      // slow animated light ribbons on the pond surface
        let landSquish = 0;            // 0→1 squish amount, decays each frame
        let speedStreaks = [];          // motion blur streaks at max speed
        let deathCount = 0;            // track deaths for ad pacing
        let bgDanger = 0;              // 0→1 danger tint, ramps at max speed

        // Frog breath puff (winter theme only)
        let breathTimer = 0;
        let breathPuffs = [];  // { x, y, r, alpha, vy }

        // Night theme: static stars in the sky
        let nightStars = [];
        for (let i = 0; i < 55; i++) {
            nightStars.push({
                x: Math.random() * 400,
                y: Math.random() * 280,
                r: Math.random() * 1.4 + 0.3,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        // Winter theme: falling snowflakes
        let snowflakes = [];
        for (let i = 0; i < 75; i++) {
            snowflakes.push({
                x: Math.random() * 400,
                y: Math.random() * 600,
                r: Math.random() * 4 + 1.8,
                speed: Math.random() * 1.0 + 0.45,
                drift: (Math.random() - 0.5) * 0.45,
                alpha: Math.random() * 0.5 + 0.25
            });
        }

        // Parallax layer: ribbon-blade lake weeds with stone base
        const WEED_COLORS = [
            { fill:"#16a34a", highlight:"#4ade80", dark:"#052e16", outline:"#14532d" },
            { fill:"#15803d", highlight:"#34d399", dark:"#052e16", outline:"#064e3b" },
            { fill:"#059669", highlight:"#6ee7b7", dark:"#064e3b", outline:"#065f46" },
        ];
        function makeWeedBlades(bladeCount) {
            let blades = [];
            for (let b = 0; b < bladeCount; b++) {
                blades.push({
                    angle: (b - (bladeCount-1)/2) * 0.38 + (Math.random()-0.5)*0.12,

                });
            }

        }
        let plants = [];

                sway:   Math.random() * Math.PI,

                stones: Array.from({length: Math.floor(Math.random()*2)+2}, () => ({
                    ox: (Math.random()-0.5)*20,

                    rx: Math.random()*7+4,

                }))

        let slowBlossom = null;

        let slowdownCooldown = 0;
        let dynamicSlowMultiplier = 1.0;
        let preSlowSpeed = 0;       // speed at the moment the freeze lily was collected
        let rampBackTimer = 0;      // counts up during speed ramp-back phase
        let rampBackDuration = 300; // frames (~5s) to ramp back to pre-slow speed

        // Freeze lily: random spawn timer (10-20 seconds = 600-1200 frames at 60fps)
        function newFreezeLilyDelay() {
            // 15-22 seconds at 60fps = 900-1320 frames
            return Math.floor(Math.random() * 420) + 900;
        }

        function addStars(amount) {
            amount = Math.max(0, Math.floor(amount || 0));
            if (amount <= 0) return;
            totalStars += amount;
            totalStarsEver += amount;
            storageSet("frogTotalStarsEver", totalStarsEver);
            storageSet("frogTotalStars", totalStars);
        }

        function spendStars(cost) {
            cost = Math.max(0, Math.floor(cost || 0));
            if (totalStars < cost) return false;
            totalStars -= cost;
            storageSet("frogTotalStars", totalStars);
            return true;
        }

        function activateShopSelection() {
            if (shopTab === "skins") {
                let sel = skinsData[shopIndex % skinsData.length];

                    currentSkin = sel.id;
                    saveShopData();
                    addFloatingText("Equipped!", canvas.width / 2, 320, "#10b981");
                } else if (spendStars(sel.cost)) {
                    unlockedSkins.push(sel.id);
                    currentSkin = sel.id;

                    addSparkles(canvas.width / 2, 252, "#fbbf24", 18);
                    addFloatingText("Unlocked!", canvas.width / 2, 320, "#f59e0b");
                }
            } else {
                let sel = themesData[shopIndex % themesData.length];
                if (!sel || sel.comingSoon) return;
                if (unlockedThemes.includes(sel.id)) {
                    currentTheme = sel.id;
                    saveShopData();
                    addFloatingText("Theme applied!", canvas.width / 2, 320, "#7c3aed");

        function addSparkles(x, y, color = "#fbbf24", count = 10) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 2.4 + 0.6;
                sparkleParticles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.7,
                    alpha: 1,
                    radius: Math.random() * 2.8 + 1.4,

                });

        }

        function addFloatingText(text, x, y, color = "#ffffff") {
            floatingTexts.push({ text, x, y, vy: -0.65, alpha: 1, color, timer: 80 });
        }

        function addJumpRing() {
            jumpRings.push({ x: frogX, y: frogY, radius: frogRadius + 7, alpha: 0.42 });
            if (jumpRings.length > 5) jumpRings.shift();
        }

        function drawGameEffects() {
            for (let jr of jumpRings) {
                if (jr.alpha <= 0) continue;
                ctx.save();
                ctx.globalAlpha = Math.max(0, jr.alpha);
                ctx.strokeStyle = "rgba(255,255,255,0.95)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(jr.x, jr.y, jr.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = "rgba(45,212,191,0.55)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(jr.x, jr.y, jr.radius + 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            for (let s of sparkleParticles) {
                if (s.alpha <= 0) continue;
                ctx.globalAlpha = Math.max(0, s.alpha);
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.textAlign = "center";
            for (let ft of floatingTexts) {
                if (ft.alpha <= 0) continue;
                ctx.globalAlpha = Math.max(0, ft.alpha);
                ctx.fillStyle = ft.color;
                ctx.font = "bold 14px Arial";
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;
            ctx.textAlign = "start";
        }

        function updateGameEffects(dt) {
            for (let i = jumpRings.length - 1; i >= 0; i--) {
                let jr = jumpRings[i];
                jr.radius += 2.1 * dt;
                jr.alpha -= 0.045 * dt;
                if (jr.alpha <= 0) jumpRings.splice(i, 1);
            }
            for (let i = sparkleParticles.length - 1; i >= 0; i--) {
                let s = sparkleParticles[i];
                s.x += s.vx * dt;
                s.y += s.vy * dt;
                s.vy += 0.035 * dt;
                s.alpha -= 0.025 * dt;
                if (s.alpha <= 0) sparkleParticles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy * dt;
                ft.timer -= dt;
                ft.alpha = Math.min(1, ft.timer / 30);
                if (ft.timer <= 0) floatingTexts.splice(i, 1);
            }
        }

        function drawRoundedRect(x, y, w, h, r) {
            let radii = Array.isArray(r) ? r.slice(0, 4) : [r, r, r, r];
            while (radii.length < 4) radii.push(radii[radii.length - 1] || 0);
            let maxR = Math.max(0, Math.min(Math.abs(w), Math.abs(h)) / 2);
            let [tl, tr, br, bl] = radii.map(v => clamp(Number(v) || 0, 0, maxR));
            ctx.beginPath();
            ctx.moveTo(x + tl, y);
            ctx.lineTo(x + w - tr, y);
            if (tr) ctx.quadraticCurveTo(x + w, y, x + w, y + tr); else ctx.lineTo(x + w, y);
            ctx.lineTo(x + w, y + h - br);
            if (br) ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h); else ctx.lineTo(x + w, y + h);
            ctx.lineTo(x + bl, y + h);
            if (bl) ctx.quadraticCurveTo(x, y + h, x, y + h - bl); else ctx.lineTo(x, y + h);
            ctx.lineTo(x, y + tl);
            if (tl) ctx.quadraticCurveTo(x, y, x + tl, y); else ctx.lineTo(x, y);
            ctx.closePath();
            ctx.fill();
        }

        function drawGlassPanel(x, y, w, h, r = 18, alpha = 0.52) {
            ctx.save();
            ctx.shadowColor = "rgba(15,23,42,0.16)";
            ctx.shadowBlur = 18;
            ctx.shadowOffsetY = 8;
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            drawRoundedRect(x, y, w, h, r);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(255,255,255,0.55)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x + 0.5, y + 0.5, w - 1, h - 1, r);
            ctx.stroke();
            ctx.restore();
        }

        function drawButton(x, y, w, h, label, topColor, bottomColor, textColor = "#fff", fontSize = 16) {
            ctx.save();
            ctx.shadowColor = "rgba(15,23,42,0.22)";
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 5;
            let grad = ctx.createLinearGradient(x, y, x, y + h);
            grad.addColorStop(0, topColor);
            grad.addColorStop(1, bottomColor || adjustColorBrightness(topColor, -16));
            ctx.fillStyle = grad;
            drawRoundedRect(x, y, w, h, 15);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(255,255,255,0.35)";
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.roundRect(x + 1, y + 1, w - 2, h - 2, 14);
            ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.20)";
            drawRoundedRect(x + 9, y + 7, w - 18, Math.max(5, h * 0.22), 8);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(label, x + w / 2, y + h / 2 + 1);
            ctx.textBaseline = "alphabetic";
            ctx.restore();
        }

        function drawTopAndBottomShade() {
            ctx.save();
            let topShade = ctx.createLinearGradient(0, 0, 0, 100);
            topShade.addColorStop(0, "rgba(15,23,42,0.16)");
            topShade.addColorStop(1, "rgba(15,23,42,0)");

        function spawnLily() {
            // Reachability pass: new pads are biased near the previous pad height,
            // then clamped to the safe play band. This keeps runs fair while still varied.
            let maxDelta = score < 80 ? 70 : (score < 220 ? 90 : 110);
            let randomY = Math.round(clamp(lastLilyY + (Math.random() * 2 - 1) * maxDelta, 180, 455));
            lastLilyY = randomY;
            let lilyW = 65;  // fixed width — difficulty via plants, piranhas, purple frequency
            // Difficulty ramps in readable steps instead of spiking during the first minute.
            let purpleChance = score >= 300 ? 0.43 : (score >= 180 ? 0.34 : Math.min(0.24, 0.10 + score * 0.0012));
            let isPurple = Math.random() < purpleChance;
            let hasStar = !isPurple && Math.random() < 0.66;
            let starType = Math.random() < 0.50 ? "boost" : "gold";
            // Carnivorous plant on purple lilies from score 150
            let hasPlant = false;
            if (isPurple && score >= 150) {
                hasPlant = Math.random() < (score >= 250 ? 0.65 : 0.35);
            }
            // Each plant has its own sway phase and snap timer
            let plantSway = Math.random() * Math.PI * 2;
            let plantSnapAngle = 0.6;   // how open the jaw is (0=closed, 1=fully open)
            let plantSnapDir = -1;      // -1 closing, +1 opening
            
            lilies.push({
                x: canvas.width,
                y: randomY,
                width: lilyW,
                height: 15,
                purple: isPurple,
                passed: false,
                hasStar: hasStar,
                starType: starType,
                starCollected: false,
                justLanded: false,
                hasPlant,
                plantSway,
                plantSnapAngle,
                plantSnapDir
            });
        }

        function spawnFish() {
            let randomY = Math.floor(Math.random() * 280) + 180;
            fishes.push({
                x: canvas.width + 50, 
                y: randomY,
                baseY: randomY,
                angle: 0,
                radius: 12
            });
        }

        function isStandingOn(lily) {
            return frogX + frogRadius > lily.x &&
                   frogX - frogRadius < lily.x + lily.width &&
                   frogY + frogRadius >= lily.y &&
                   frogY + frogRadius <= lily.y + lily.height &&
                   velocity >= 0;
        }

        function checkSideCollision(lily) {
            let padding = lily.purple ? 5 : 0;
            return frogX + frogRadius > lily.x - padding &&
                   frogX - frogRadius < lily.x + lily.width + padding &&
                   frogY + frogRadius > lily.y - padding &&
                   frogY - frogRadius < lily.y + lily.height + padding;
        }

        function checkFishCollision(fish) {
            let dx = frogX - fish.x;
            let dy = frogY - fish.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            return distance < frogRadius + fish.radius;
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            
            let starGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, outerRadius);
            if (color === "boost") {
                starGrad.addColorStop(0, "#ff85a2");
                starGrad.addColorStop(1, "#AA1C41");
            } else {
                starGrad.addColorStop(0, "#fffbeb");
                starGrad.addColorStop(1, "#f59e0b");
            }
            
            ctx.fillStyle = starGrad;
            ctx.fill();
            // Thin outline so star reads on any background
            if (currentTheme === "night" || currentTheme === "sunset") {
                ctx.strokeStyle = currentTheme === "night" ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.25)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawSlowBlossom(cx, cy, radius, blinkState) {
            ctx.save();
            ctx.fillStyle = blinkState ? "#4274D9" : "#06b6d4";
            ctx.shadowBlur = 14;
            ctx.shadowColor = blinkState ? "#4274D9" : "#06b6d4";
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                let angle = (i * Math.PI) / 3;
                let px = cx + Math.cos(angle) * radius * 0.65;
                let py = cy + Math.sin(angle) * radius * 0.45;
                ctx.ellipse(px, py, radius * 0.7, radius * 0.35, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "#e0f7fa";
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawLogo(cx, cy) {
            ctx.save();
            let r = 18;
            
            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.beginPath();
            ctx.arc(cx, cy + 3, r, 0, Math.PI * 2);
            ctx.fill();

            let baseGrad = ctx.createRadialGradient(cx - 3, cy - 5, 2, cx, cy, r);
            baseGrad.addColorStop(0, "#4ade80");
            baseGrad.addColorStop(1, "#16a34a");
            ctx.fillStyle = baseGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fef08a";
            ctx.beginPath();
            ctx.arc(cx, cy + 5, 11, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#4ade80";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#0284c7";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 10.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.arc(cx + 7.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(cx, cy + 1, 7, 0, Math.PI);
            ctx.stroke();

            ctx.restore();
        }

        function drawMuteIcon() {
            ctx.save();
            ctx.shadowColor = "rgba(15,23,42,0.20)";
            ctx.shadowBlur = 9;
            ctx.shadowOffsetY = 4;
            ctx.fillStyle = "rgba(15, 23, 42, 0.24)";
            drawRoundedRect(canvas.width - 50, canvas.height - 50, 40, 40, 12);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(255,255,255,0.34)";
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(canvas.width - 49.5, canvas.height - 49.5, 39, 39, 12); ctx.stroke();
            ctx.fillStyle = "#fff";
            ctx.font = "25px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(isMuted ? "🔇" : "🔊", canvas.width - 30, canvas.height - 30);
            ctx.restore();
        }


        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX !== undefined ? e.clientX
                          : (e.touches && e.touches[0]) ? e.touches[0].clientX : undefined;
            const clientY = e.clientY !== undefined ? e.clientY
                          : (e.touches && e.touches[0]) ? e.touches[0].clientY : undefined;

            if (clientX === undefined || clientY === undefined) return;

            // Scale CSS display coordinates to canvas pixel coordinates
            // (canvas may be displayed smaller/larger than its 400x600 pixel size)
            const scaleX = canvas.width  / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (clientX - rect.left) * scaleX;
            const clickY = (clientY - rect.top)  * scaleY;

            initAudio();

            if (clickX >= canvas.width - 50 && clickX <= canvas.width - 10 &&
                clickY >= canvas.height - 50 && clickY <= canvas.height - 10) {
                toggleMute();
                return; 
            }

            // Pause button — only active during PLAYING
            if (gameState === "PLAYING" &&
                clickX >= canvas.width - 45 && clickX <= canvas.width - 10 &&
                clickY >= 10 && clickY <= 45) {
                isPaused = !isPaused;
                if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                return;
            }

            // Block jumps and other input while paused
            if (gameState === "PLAYING" && isPaused) return;

            // Advance tutorial on first tap
            if (gameState === "PLAYING" && tutorialStep === 0) {
                tutorialStep = 1;
                tutorialTimer = 320;  // show purple lily warning for ~5.3s
            }

            if (gameState === "START_MENU") {
                // Daily ad bonus button
                if (clickX >= canvas.width/2 - 110 && clickX <= canvas.width/2 + 110 &&
                    clickY >= canvas.height - 70 && clickY <= canvas.height - 28) {
                    let today = new Date().toDateString();
                    let lastAdBonus = storageGet("frogLastAdBonus");
                    if (lastAdBonus === today) {
                        // Already claimed today — show brief message (handled by existing banner system)
                        return;
                    }
                    cgRequestRewardedAd(
                        () => {
                            addStars(15);
                            storageSet("frogLastAdBonus", today);
                        },
                        null
                    );
                    return;
                }
                if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                    clickY >= canvas.height / 2 + 135 && clickY <= canvas.height / 2 + 185) {
                    gameState = "SHOP";
                    shopIndex = 0;
                    shopTab = "skins";
                    cgGameplayStop();
                } else if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                           clickY >= canvas.height / 2 + 70 && clickY <= canvas.height / 2 + 120) {
                    resetGame();
                }
            } 
            else if (gameState === "SHOP") {
                // Back button
                if (clickX >= 14 && clickX <= 84 && clickY >= 14 && clickY <= 50) {
                    gameState = "START_MENU"; return;
                }
                // Tab: Skins (left half, y 88-124)
                if (clickX >= canvas.width/2 - 150 && clickX <= canvas.width/2 - 12 && clickY >= 88 && clickY <= 124) {
                    shopTab = "skins"; shopIndex = 0; return;
                }
                // Tab: Themes (right half, y 88-124)
                if (clickX >= canvas.width/2 + 12 && clickX <= canvas.width/2 + 150 && clickY >= 88 && clickY <= 124) {
                    shopTab = "themes"; shopIndex = 0; return;
                }
                // Arrow left
                if (clickX >= 10 && clickX <= 90 && clickY >= 220 && clickY <= 300) {
                    let len = shopTab === "skins" ? skinsData.length : themesData.length;
                    shopIndex = (shopIndex - 1 + len) % len; return;
                }
                // Arrow right
                if (clickX >= 310 && clickX <= 390 && clickY >= 220 && clickY <= 300) {
                    let len = shopTab === "skins" ? skinsData.length : themesData.length;
                    shopIndex = (shopIndex + 1) % len; return;
                }
                // Action button (BUY/EQUIP/APPLY)
                if (clickX >= canvas.width/2 - 90 && clickX <= canvas.width/2 + 90 && clickY >= 348 && clickY <= 398) {
                    activateShopSelection();
                    return;
                }
            } 
            else if (gameState === "GAME_OVER") {
                let cx3        = canvas.width / 2;
                let goRestartY = canvas.height/2 + 50;
                let goMenuY    = canvas.height/2 + 110;
                let goReviveY  = canvas.height/2 + 170;
                let goBoostY   = canvas.height/2 + 230;

                // 1. Play Again
                if (clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goRestartY && clickY <= goRestartY+48) {
                    resetGame(); return;
                }
                // 2. Main Menu
                if (clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goMenuY && clickY <= goMenuY+48) {
                    cgRequestMidgameAd(() => { gameState = "START_MENU"; cgGameplayStop(); });
                    return;
                }
                // 3. Revive
                if (canRevive &&
                    clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goReviveY && clickY <= goReviveY+48) {
                    cgRequestRewardedAd(() => { doRevive(); }, null);
                    return;
                }
                // 4. Double Stars (once per day)
                if (clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goBoostY && clickY <= goBoostY+48) {
                    let boostToday = storageGet("frogLastBoostDate") === new Date().toDateString();
                    if (!boostToday) {
                        cgRequestRewardedAd(() => {
                            addStars(starsCollectedThisRound);
                            storageSet("frogLastBoostDate", new Date().toDateString());
                        }, null);
                    }
                    return;
                }
                // Tap anywhere else = restart
                resetGame();
            } 
            else if (gameState === "PLAYING") {
                velocity = jumpStrength;
                addJumpRing();
                playJumpSound();
            }
        }

        window.addEventListener("keydown", function(e) {
            if (gameState === "SHOP" && (e.code === "Enter" || e.code === "Space")) {
                e.preventDefault();
                activateShopSelection();
                return;
            }

            if (e.code === "Space") {
                e.preventDefault();
                if (gameState === "PLAYING" && !isPaused && !snapDeathPending) {
                    // Trigger jump directly — avoids coordinate scaling issues
                    velocity = jumpStrength;
                    initAudio();
                } else if (gameState === "GAME_OVER") {
                    resetGame();
                } else if (gameState === "START_MENU") {
                    resetGame();
                }
            }
            // Arrow keys navigate the shop
            else if (e.code === "ArrowLeft" && gameState === "SHOP") {
                e.preventDefault();
                let len = shopTab === "skins" ? skinsData.length : themesData.length;
                shopIndex = (shopIndex - 1 + len) % len;
            }
            else if (e.code === "ArrowRight" && gameState === "SHOP") {
                e.preventDefault();
                let len2 = shopTab === "skins" ? skinsData.length : themesData.length;
                shopIndex = (shopIndex + 1) % len2;
            }
            else if (e.code === "Tab" && gameState === "SHOP") {
                e.preventDefault();
                shopTab = shopTab === "skins" ? "themes" : "skins";
                shopIndex = 0;
            }
            else if (e.code === "KeyM") {
                e.preventDefault();
                toggleMute();
            }
            else if (e.code === "KeyP") {
                // Esc removed: CrazyGames uses it to exit fullscreen, causing conflicts
                if (gameState === "PLAYING") {
                    e.preventDefault();
                    isPaused = !isPaused;
                    if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                }
            }

        });

        function drawBackground() {
            // Use active pond theme for gradient colours
            let th = themesData.find(t => t.id === currentTheme) || themesData[0];
            let d = bgDanger;
            function lerp(a, b) { return Math.round(a + (b-a)*d); }

            let topR = lerp(th.calm.top[0], th.fast.top[0]);
            let topG = lerp(th.calm.top[1], th.fast.top[1]);
            let topB = lerp(th.calm.top[2], th.fast.top[2]);
            let midR = lerp(th.calm.mid[0], th.fast.mid[0]);
            let midG = lerp(th.calm.mid[1], th.fast.mid[1]);
            let midB = lerp(th.calm.mid[2], th.fast.mid[2]);
            let botR = lerp(th.calm.bot[0], th.fast.bot[0]);
            let botG = lerp(th.calm.bot[1], th.fast.bot[1]);
            let botB = lerp(th.calm.bot[2], th.fast.bot[2]);

            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0,    `rgb(${topR},${topG},${topB})`);
            skyGrad.addColorStop(0.42, `rgb(${midR},${midG},${midB})`);
            skyGrad.addColorStop(1,    `rgb(${botR},${botG},${botB})`);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Night theme: discreet twinkling stars in the sky
            if (currentTheme === "night") {
                for (let ns of nightStars) {
                    ns.twinkle += 0.02;
                    let alpha = 0.4 + Math.sin(ns.twinkle) * 0.25;
                    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
                    ctx.beginPath();
                    ctx.arc(ns.x, ns.y, ns.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Winter theme: gently falling snowflakes (very subtle)
            if (currentTheme === "winter") {
                for (let sf of snowflakes) {
                    ctx.fillStyle = `rgba(220,240,255,${sf.alpha})`;
                    ctx.beginPath();
                    ctx.arc(sf.x, sf.y, sf.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Parallax: ribbon-blade weeds with stone base (like reference image)
            ctx.save();
            for (let p of plants) {
                let sw = Math.sin(p.sway) * 8; // sway offset
                let c  = p.color;

                // Stone cluster at base
                for (let s of p.stones) {
                    let sg = ctx.createRadialGradient(
                        p.x+s.ox-s.rx*0.3, p.y+s.oy-s.ry*0.3, 1,
                        p.x+s.ox, p.y+s.oy, s.rx
                    );
                    sg.addColorStop(0, "#e7e5e4");
                    sg.addColorStop(1, s.col);
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.ellipse(p.x+s.ox, p.y+s.oy, s.rx, s.ry, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.13)";
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }

                // Each blade: dark outline filled with mid-green, highlight stripe
                for (let bl of p.blades) {
                    let bSway = sw * (0.7 + Math.abs(bl.angle) * 0.5);
                    let tipX = p.x + Math.sin(bl.angle) * bl.len + bSway + bl.curve;
                    let tipY = p.y - Math.cos(bl.angle) * bl.len;
                    let ctrlX = p.x + Math.sin(bl.angle) * bl.len*0.55 + bSway*0.5 + bl.curve*0.6;
                    let ctrlY = p.y - Math.cos(bl.angle) * bl.len*0.55;

                    // Perpendicular offset for blade width
                    let nx = -Math.cos(bl.angle) * bl.width * 0.5;
                    let ny = -Math.sin(bl.angle) * bl.width * 0.5;

                    // Filled blade shape
                    ctx.beginPath();
                    ctx.moveTo(p.x - nx*0.4, p.y - ny*0.4);
                    ctx.quadraticCurveTo(ctrlX - nx, ctrlY - ny, tipX, tipY);
                    ctx.quadraticCurveTo(ctrlX + nx, ctrlY + ny, p.x + nx*0.4, p.y + ny*0.4);
                    ctx.closePath();
                    ctx.fillStyle = c.fill;
                    ctx.fill();

                    // Dark outline
                    ctx.strokeStyle = c.outline;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    // Central highlight stripe
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.quadraticCurveTo(
                        ctrlX + nx*0.1, ctrlY + ny*0.1,
                        tipX - nx*0.15, tipY - ny*0.15
                    );
                    ctx.strokeStyle = c.highlight;
                    ctx.lineWidth = bl.width * 0.22;
                    ctx.globalAlpha = 0.55;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.restore();

            // Gentle pond light ribbons. They add movement without flashing the whole screen.
            ctx.save();
            ctx.globalAlpha = currentTheme === "night" ? 0.08 : 0.12;
            ctx.strokeStyle = "rgba(255,255,255,0.65)";
            ctx.lineWidth = 1.4;
            for (let k = 0; k < 4; k++) {
                let y = 120 + k * 92 + Math.sin((waterSheenOffset + k * 45) * 0.02) * 8;
                ctx.beginPath();
                for (let x = -60; x <= canvas.width + 60; x += 20) {
                    let yy = y + Math.sin((x + waterSheenOffset * 1.8 + k * 30) * 0.025) * 7;
                    if (x === -60) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
                }
                ctx.stroke();
            }
            ctx.restore();

            drawTopAndBottomShade();

            // Bubbles
            let activeTh = themesData.find(t => t.id === currentTheme) || themesData[0];
            ctx.fillStyle = activeTh.bubble;
            for (let b of bubbles) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            // Night theme: add a moon reflection
            if (currentTheme === "night") {
                ctx.fillStyle = "rgba(248,250,252,0.08)";
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, 560, 60, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "rgba(248,250,252,0.12)";
                ctx.beginPath();
                ctx.arc(canvas.width/2, 30, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "rgba(248,250,252,0.06)";
                ctx.beginPath();
                ctx.arc(canvas.width/2, 30, 22, 0, Math.PI*2);
                ctx.fill();
            }
            // Winter theme: snowflakes instead of bubbles
            if (currentTheme === "winter") {
                ctx.strokeStyle = "rgba(200,230,255,0.5)";
                ctx.lineWidth = 1;
                for (let b of bubbles) {
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(b.pulse);
                    for (let arm = 0; arm < 6; arm++) {
                        ctx.beginPath();
                        ctx.moveTo(0,0);
                        ctx.lineTo(0, -b.radius * 1.2);
                        ctx.stroke();
                        ctx.rotate(Math.PI/3);
                    }
                    ctx.restore();
                }

                // Snow on weed blade tips
                ctx.fillStyle = "rgba(240,249,255,0.9)";
                for (let p of plants) {
                    let bx2 = p.x, by2 = p.y;
                    ctx.save();
                    ctx.translate(bx2, by2);
                    let plantScale = p.scale || 1;
                    ctx.scale(plantScale, plantScale);
                    let sw2 = Math.sin(p.sway) * 7;
                    for (let bl of p.blades) {
                        let bSway2 = sw2 * (0.7 + Math.abs(bl.angle) * 0.5);
                        let tipX2 = Math.sin(bl.angle) * bl.len + bSway2 + bl.curve;
                        let tipY2 = -Math.cos(bl.angle) * bl.len;
                        ctx.beginPath();
                        ctx.arc(tipX2, tipY2, bl.width * 0.38, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }

                // Ice crack texture at the bottom edge of the canvas
                ctx.save();
                ctx.strokeStyle = "rgba(186,230,253,0.7)";
                ctx.lineWidth = 1.5;
                // Left cluster
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - 18);
                ctx.lineTo(40, canvas.height - 8);
                ctx.lineTo(25, canvas.height);
                ctx.moveTo(40, canvas.height - 8);
                ctx.lineTo(70, canvas.height - 4);
                ctx.moveTo(25, canvas.height - 12);
                ctx.lineTo(55, canvas.height - 20);
                ctx.lineTo(90, canvas.height - 10);
                ctx.stroke();
                // Right cluster
                ctx.beginPath();
                ctx.moveTo(canvas.width, canvas.height - 15);
                ctx.lineTo(canvas.width - 45, canvas.height - 6);
                ctx.lineTo(canvas.width - 30, canvas.height);
                ctx.moveTo(canvas.width - 45, canvas.height - 6);
                ctx.lineTo(canvas.width - 80, canvas.height - 3);
                ctx.moveTo(canvas.width - 28, canvas.height - 14);
                ctx.lineTo(canvas.width - 60, canvas.height - 22);
                ctx.lineTo(canvas.width - 95, canvas.height - 12);
                ctx.stroke();
                // Middle crack cluster — more prominent
                ctx.beginPath();
                ctx.moveTo(140, canvas.height - 2);
                ctx.lineTo(170, canvas.height - 16);
                ctx.lineTo(200, canvas.height - 6);
                ctx.moveTo(170, canvas.height - 16);
                ctx.lineTo(195, canvas.height - 26);
                ctx.lineTo(230, canvas.height - 14);
                ctx.moveTo(200, canvas.height - 6);
                ctx.lineTo(240, canvas.height - 18);
                ctx.stroke();
                // Extra web cracks along bottom edge
                ctx.strokeStyle = "rgba(186,230,253,0.45)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - 4);
                ctx.lineTo(30, canvas.height - 10);
                ctx.moveTo(100, canvas.height - 2);
                ctx.lineTo(125, canvas.height - 9);
                ctx.moveTo(300, canvas.height - 3);
                ctx.lineTo(320, canvas.height - 11);
                ctx.moveTo(canvas.width - 110, canvas.height - 5);
                ctx.lineTo(canvas.width - 130, canvas.height - 14);
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawFrog(fx, fy, skinId) {
            let sData = skinsData.find(s => s.id === skinId) || skinsData[0];
            
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath();
            ctx.arc(fx - 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.arc(fx + 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.fill();

            // Apply landing squish: compress Y, stretch X
            let sq = landSquish;
            let scaleX = 1 + sq * 0.35;
            let scaleY = 1 - sq * 0.25;

            ctx.save();
            ctx.translate(fx, fy);
            ctx.scale(scaleX, scaleY);
            ctx.translate(-fx, -fy);

            let bodyGrad = ctx.createRadialGradient(fx - 4, fy - 6, 2, fx, fy, frogRadius);
            bodyGrad.addColorStop(0, sData.color);
            bodyGrad.addColorStop(1, adjustColorBrightness(sData.color, -25)); 
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(fx, fy, frogRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = sData.color;
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.fill();

            if (skinId === "alien") {
                ctx.fillStyle = "#a855f7"; 
            } else {
                ctx.fillStyle = "#0284c7";
            }
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 9.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.arc(fx + 6.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = sData.belly;
            ctx.beginPath();
            ctx.arc(fx, fy + 4, 10, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore(); // end squish transform

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(fx, fy - 1, 8, 0, Math.PI);
            ctx.stroke();

            if (skinId === "student") {
                ctx.fillStyle = "#0284c7";
                ctx.fillRect(fx - 12, fy - 22, 24, 3);
                ctx.beginPath(); ctx.moveTo(fx, fy - 22); ctx.lineTo(fx - 12, fy - 26); ctx.lineTo(fx, fy - 30); ctx.lineTo(fx + 12, fy - 26); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "ninja") {
                ctx.fillStyle = "#f43f5e";
                ctx.fillRect(fx - 12, fy - 8, 24, 3);
            }
            else if (skinId === "wizard") {
                ctx.fillStyle = "#7c3aed";
                ctx.beginPath(); ctx.moveTo(fx - 10, fy - 18); ctx.lineTo(fx, fy - 36); ctx.lineTo(fx + 10, fy - 18); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#fde047";
                ctx.beginPath(); ctx.arc(fx, fy - 25, 2, 0, Math.PI * 2); ctx.fill();
            }
            else if (skinId === "royal") {
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath(); ctx.moveTo(fx - 8, fy - 18); ctx.lineTo(fx - 8, fy - 25); ctx.lineTo(fx - 4, fy - 21); ctx.lineTo(fx, fy - 28); ctx.lineTo(fx + 4, fy - 21); ctx.lineTo(fx + 8, fy - 25); ctx.lineTo(fx + 8, fy - 18); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "party") {
                let hue = (Date.now() / 4) % 360;
                ctx.strokeStyle = "hsl(" + hue + ", 100%, 60%)";
                ctx.lineWidth = 2;
                ctx.strokeRect(fx - 13, fy - 10, 11, 7);
                ctx.strokeRect(fx + 2, fy - 10, 11, 7);
                ctx.lineWidth = 1;
                for(let l = -11; l <= -4; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
                for(let l = 4; l <= 11; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
            }
            else if (skinId === "alien") {
                ctx.fillStyle = "#a855f7";
                ctx.fillRect(fx - 2, fy - 26, 4, 10);
                ctx.fillStyle = "#22c55e";
                ctx.beginPath();
                ctx.arc(fx, fy - 27, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function adjustColorBrightness(hex, percent) {
            let num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        function draw() {
            drawBackground();

            if (gameState === "PLAYING") {
                for (let r of ripples) {
                    ctx.strokeStyle = "rgba(255, 255, 255, " + r.alpha + ")";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(r.x, r.y, r.radius * 1.5, r.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            if (gameState === "START_MENU") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let glow = ctx.createRadialGradient(canvas.width/2, 170, 25, canvas.width/2, 170, 220);
                glow.addColorStop(0, "rgba(255,255,255,0.48)");
                glow.addColorStop(1, "rgba(255,255,255,0)");
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawLogo(canvas.width / 2, 66);
                drawMenuTitleText("FROGGY", canvas.width / 2, 126, 36, "#0e7490");
                drawMenuTitleText("ADVENTURE", canvas.width / 2, 171, 34, "#f97316");

                // Animated frog hero, placed higher so controls breathe better.
                let lilyX = canvas.width / 2;
                let frogHeroY = startScreenFrogY - 42;
                let lilyY = frogHeroY + 50;
                ctx.fillStyle = "rgba(15,23,42,0.10)";
                ctx.beginPath(); ctx.ellipse(lilyX, lilyY + 6, 44, 14, 0, 0, Math.PI * 2); ctx.fill();
                let padGrad = ctx.createLinearGradient(lilyX - 38, lilyY - 25, lilyX + 38, lilyY + 20);
                padGrad.addColorStop(0, "#86efac");
                padGrad.addColorStop(1, "#16a34a");
                ctx.fillStyle = padGrad;
                ctx.beginPath(); ctx.ellipse(lilyX, lilyY, 38, 26, 0, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.58)";
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.ellipse(lilyX, lilyY, 38, 26, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = "rgba(255,255,255,0.92)";
                for (let i = 0; i < 5; i++) {
                    let px = lilyX + Math.cos(i * 1.2) * 8;
                    let py = lilyY + Math.sin(i * 1.2) * 5;
                    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.fillStyle = "#eab308";
                ctx.beginPath(); ctx.arc(lilyX, lilyY, 3, 0, Math.PI * 2); ctx.fill();
                drawFrog(lilyX, frogHeroY, currentSkin);

                ctx.textAlign = "center";
                ctx.fillStyle = "rgba(15,76,117,0.90)";
                ctx.font = "bold 13px Arial";
                ctx.fillText("Tap to hop from pad to pad", canvas.width / 2, 308);
                ctx.fillStyle = "rgba(71,85,105,0.90)";
                ctx.font = "11px Arial";
                ctx.fillText("Press P to Pause", canvas.width / 2, 326);
                // Stars shown below controls as plain ⭐ number
                ctx.fillStyle = "#f59e0b";
                ctx.font = "bold 20px Arial";
                ctx.fillText("⭐  " + totalStars, canvas.width / 2, 354);

                let pulse = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
                ctx.save();
                ctx.globalAlpha = 0.16 + pulse * 0.12;
                ctx.fillStyle = "#34d399";
                drawRoundedRect(canvas.width / 2 - 94, canvas.height / 2 + 62, 188, 66, 20);
                ctx.restore();
                drawButton(canvas.width / 2 - 86, canvas.height / 2 + 70, 172, 52, "PLAY", "#34d399", "#059669", "#fff", 18);
                drawButton(canvas.width / 2 - 86, canvas.height / 2 + 135, 172, 52, "SHOP 🛒", "#fbbf24", "#d97706", "#fff", 18);

                // Extra daily stars rewarded ad button; original tap bounds preserved.
                drawButton(canvas.width/2 - 110, canvas.height - 70, 220, 42, "▶  Watch ad for +15", "#fbbf24", "#d97706", "#fff", 13);
                ctx.fillStyle = "rgba(71,85,105,0.88)";
                ctx.font = "10px Arial";
                ctx.fillText("once per day bonus", canvas.width/2, canvas.height - 32);

                if (showDailyBonusBanner && bannerTimer > 0) {
                    let bAlpha = Math.min(1, bannerTimer / 30);
                    ctx.save();
                    ctx.globalAlpha = bAlpha;
                    drawGlassPanel(28, 14, canvas.width - 56, 58, 16, 0.82);
                    if (dailyBonusAlreadyClaimed) {
                        ctx.fillStyle = "#0e7490";
                        ctx.font = "bold 13px Arial";
                        ctx.fillText("⭐ Come back daily for +20 Stars!", canvas.width / 2, 39);
                        ctx.fillStyle = "#64748b";
                        ctx.font = "12px Arial";
                        ctx.fillText("You already collected today's bonus.", canvas.width / 2, 59);
                    } else {
                        ctx.fillStyle = "#d97706";
                        ctx.font = "bold 15px Arial";
                        ctx.fillText("🎉 Daily Reward: +20 Stars!", canvas.width / 2, 39);
                        ctx.fillStyle = "#047857";
                        ctx.font = "12px Arial";
                        ctx.fillText("Visit every day to earn your bonus!", canvas.width / 2, 59);
                    }
                    ctx.restore();
                }

                drawMuteIcon();
                ctx.textAlign = "start";
                return;
            }


            if (gameState === "SHOP") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.36)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawGlassPanel(18, 18, canvas.width - 36, 450, 22, 0.44);

                // Header
                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText("FROG SHOP", canvas.width / 2, 52);
                ctx.fillStyle = "#c2410c";
                ctx.font = "bold 17px Arial";
                ctx.fillText("⭐ " + totalStars + " stars", canvas.width / 2, 76);

                // Back button
                drawButton(14, 14, 70, 36, "BACK", "#22d3ee", "#0891b2", "#fff", 12);

                // ── Tab buttons ────────────────────────────────────────────
                let tabY = 88;
                // Skins tab
                ctx.fillStyle = shopTab === "skins" ? "#0e7490" : "rgba(14,116,144,0.25)";
                drawRoundedRect(canvas.width/2 - 150, tabY, 138, 36, [10,10,0,0]);
                ctx.fillStyle = shopTab === "skins" ? "#fff" : "#0e7490";
                ctx.font = "bold 13px Arial";
                ctx.fillText("🐸  SKINS", canvas.width/2 - 81, tabY + 23);
                // Themes tab
                ctx.fillStyle = shopTab === "themes" ? "#7c3aed" : "rgba(124,58,237,0.2)";
                drawRoundedRect(canvas.width/2 + 12, tabY, 138, 36, [10,10,0,0]);
                ctx.fillStyle = shopTab === "themes" ? "#fff" : "#7c3aed";
                ctx.fillText("🌊  THEMES", canvas.width/2 + 81, tabY + 23);

                // Tab underline
                ctx.fillStyle = shopTab === "skins" ? "#0e7490" : "#7c3aed";
                ctx.fillRect(14, tabY + 36, canvas.width - 28, 2);

                // ── SKINS TAB ────────────────────────────────────────────
                if (shopTab === "skins") {
                    let activeSkin = skinsData[shopIndex];
                    ctx.fillStyle = "#1e293b";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(activeSkin.name, canvas.width / 2, 185);

                    ctx.fillStyle = "rgba(255,255,255,0.4)";
                    drawRoundedRect(canvas.width/2 - 46, 198, 92, 100, 15);
                    drawFrog(canvas.width / 2, 252, activeSkin.id);

                    ctx.fillStyle = "#0e7490";
                    ctx.font = "bold 28px Arial";
                    ctx.fillText("◀", 48, 258);
