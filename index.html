<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Froggy Adventure</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #d1fae5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #a5f3fc 0%, #22d3ee 40%, #0891b2 100%);
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let lastTime = performance.now();

        // ─── CrazyGames SDK v3 Integration ───────────────────────────────────
        let cgSDK = null;

        async function initCrazyGamesSDK() {
            try {
                // Wait for the SDK script to finish loading before using it
                await new Promise((resolve, reject) => {
                    if (window.CrazyGames && window.CrazyGames.SDK) {
                        resolve();
                    } else {
                        const sdkScript = document.querySelector('script[src*="crazygames-sdk"]');
                        if (sdkScript) {
                            sdkScript.addEventListener("load", resolve);
                            sdkScript.addEventListener("error", reject);
                        } else {
                            reject(new Error("CrazyGames SDK script not found"));
                        }
                    }
                });
                await window.CrazyGames.SDK.init();
                cgSDK = window.CrazyGames.SDK;

                // Respect CrazyGames platform mute setting
                const settings = cgSDK.game.settings;
                if (settings && settings.muteAudio) {
                    isMuted = true;
                    localStorage.setItem("frogGameMuted", true);
                }
                // Listen for settings changes (e.g. user mutes from platform)
                cgSDK.game.addSettingsChangeListener((newSettings) => {
                    if (newSettings.muteAudio && !isMuted) {
                        isMuted = true;
                        stopBgMusic();
                    }
                });

                cgSDK.game.loadingStart();
            } catch (e) {
                console.warn("CrazyGames SDK init failed:", e);
            }
        }

        function cgGameplayStart() {
            try { if (cgSDK) cgSDK.game.gameplayStart(); } catch(e) {}
        }

        function cgGameplayStop() {
            try { if (cgSDK) cgSDK.game.gameplayStop(); } catch(e) {}
        }

        function cgHappyTime() {
            try { if (cgSDK) cgSDK.game.happytime(); } catch(e) {}
        }

        function cgRequestRewardedAd(onGranted, onSkipped) {
            if (!cgSDK) { if (onGranted) onGranted(); return; }
            try {
                cgSDK.ad.requestAd("rewarded", {
                    adStarted:  () => { stopBgMusic(); cgGameplayStop(); },
                    adFinished: () => { if (!isMuted) startBgMusic(); if (onGranted) onGranted(); },
                    adError:    () => { if (!isMuted) startBgMusic(); if (onSkipped) onSkipped(); }
                });
            } catch(e) { if (onSkipped) onSkipped(); }
        }

        // Revive state
        let canRevive = true;   // only one revive per run
        let reviveUsed = false;

        function doRevive() {
            reviveUsed = true;
            canRevive = false;
            // Brief invincibility + reset velocity
            frogY = Math.min(frogY, canvas.height - 80);
            velocity = jumpStrength * 0.6;
            gameState = "PLAYING";
            if (!isMuted) startBgMusic();
            cgGameplayStart();
        }

        function cgRequestMidgameAd(onDone) {
            if (!cgSDK) { if (onDone) onDone(); return; }
            try {
                cgSDK.ad.requestAd("midgame", {
                    adStarted: () => {
                        // Pause game & mute audio during ad
                        stopBgMusic();
                        cgGameplayStop();
                    },
                    adFinished: () => {
                        // Resume audio & game after ad
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    },
                    adError: (err) => {
                        console.warn("CrazyGames ad error:", err);
                        if (!isMuted) startBgMusic();
                        if (onDone) onDone();
                    }
                });
            } catch(e) {
                if (onDone) onDone();
            }
        }
        // ─────────────────────────────────────────────────────────────────────

        let audioCtx = null;
        let bgMusicInterval = null;
        let activeMusicNodes = [];
        let isMuted = localStorage.getItem("frogGameMuted") === 'true';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!isMuted) startBgMusic();
            }
        }

        function playPluckedNote(freq, duration, volume = 0.05, type = "sine") {
            if (!audioCtx || isMuted || freq <= 0) return;
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            
            activeMusicNodes.push({ osc, gainNode });
        }

        function playTone(freq, type, duration, vol = 0.08, startTimeOffset = 0) {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTimeOffset);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTimeOffset + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

        function playJumpSound() {
            playTone(392.00, "sine", 0.15, 0.05);
            playTone(523.25, "sine", 0.12, 0.03, 0.03);
        }

        function playStarSound(isBoost) {
            if (isBoost) {
                playTone(523.25, "sine", 0.1, 0.04);
                playTone(659.25, "sine", 0.1, 0.04, 0.03);
                playTone(783.99, "sine", 0.15, 0.04, 0.06);
            } else {
                playTone(523.25, "sine", 0.08, 0.04);
                playTone(783.99, "sine", 0.12, 0.04, 0.03);
            }
        }

        function playSlowdownSound() {
            playTone(880.00, "sine", 0.12, 0.03);
            playTone(698.46, "sine", 0.12, 0.03, 0.05);
            playTone(523.25, "sine", 0.18, 0.03, 0.1);
        }

        function playCrashSound() {
            if (!audioCtx || isMuted) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBgMusic() {
            if (!audioCtx || isMuted) return;
            stopBgMusic();

            let melody = [
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                329.63, 392.00, 523.25, 392.00, 293.66, 349.23, 392.00, 0,
                261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23,
                392.00, 440.00, 493.88, 523.25, 587.33, 0, 523.25, 0
            ];

            let harmony = [
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                196.00, 0, 196.00, 0, 146.83, 0, 196.00, 0,
                196.00, 0, 196.00, 0, 174.61, 0, 174.61, 0,
                146.83, 0, 196.00, 0, 261.63, 0, 196.00, 0
            ];

            let index = 0;
            let noteDuration = 0.22;

            bgMusicInterval = setInterval(() => {
                if (audioCtx && !isMuted) {
                    let currentNote = melody[index % melody.length];
                    let currentBass = harmony[index % harmony.length];
                    if (currentNote > 0) playPluckedNote(currentNote, 0.35, 0.035, "triangle");
                    if (currentBass > 0) playPluckedNote(currentBass, 0.5, 0.025, "sine");
                    index++;
                }
            }, noteDuration * 1000);
        }

        function stopBgMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
            activeMusicNodes.forEach(node => {
                try { node.osc.stop(); } catch(e) {}
            });
            activeMusicNodes = [];
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem("frogGameMuted", isMuted);
            if (!audioCtx) return; 

            if (isMuted) {
                stopBgMusic();
            } else {
                startBgMusic();
            }
        }

        let totalStars = parseInt(localStorage.getItem("frogTotalStars")) || 0;
        let unlockedSkins = JSON.parse(localStorage.getItem("frogUnlockedSkins")) || ["classic"];
        let currentSkin = localStorage.getItem("frogCurrentSkin") || "classic";
        let shopIndex = 0; 

        const skinsData = [
            { id: "classic", name: "Lime Whimsical", cost: 0,    color: "#a3e635", belly: "#fef08a", comingSoon: false },
            { id: "ruby",    name: "Blossom Pink",   cost: 200,  color: "#f43f5e", belly: "#ffe4e6", comingSoon: false },
            { id: "student", name: "Sky Blue",        cost: 400,  color: "#38bdf8", belly: "#e0f2fe", comingSoon: false },
            { id: "ninja",   name: "Deep Teal",       cost: 650,  color: "#0f766e", belly: "#ccfbf1", comingSoon: false },
            { id: "wizard",  name: "Magic Purple",    cost: 950,  color: "#c084fc", belly: "#f3e8ff", comingSoon: false },
            { id: "royal",   name: "Bright Gold",     cost: 1300, color: "#fbbf24", belly: "#fef3c7", comingSoon: false },
            { id: "cyber",   name: "Neon Mint",       cost: 1700, color: "#2dd4bf", belly: "#f1f5f9", comingSoon: true },
            { id: "party",   name: "Rave Magenta",    cost: 2200, color: "#f472b6", belly: "#ecfeff", comingSoon: true },
            { id: "alien",   name: "Galaxy Alien",    cost: 3000, color: "#a855f7", belly: "#22c55e", comingSoon: true }
        ];

        // Pond themes — separate from skins, unlock background style
        const themesData = [
            {
                id: "classic",
                name: "Lake Classic",
                cost: 0,
                comingSoon: false,
                // gradient stops [top, mid, bot] for calm state and full-speed state
                calm:  { top:[178,238,240], mid:[143,221,223], bot:[91,191,194] },
                fast:  { top:[204,251,241], mid:[34,211,238],  bot:[14,116,144] },
                bubble: "rgba(255,255,255,0.25)",
                streakColor: "rgba(255,255,255,{a})"
            },
            {
                id: "sunset",
                name: "Sunset Pond",
                cost: 380,
                comingSoon: false,
                calm:  { top:[254,215,170], mid:[251,146,60],  bot:[194,65,12]  },
                fast:  { top:[255,237,213], mid:[249,115,22],  bot:[154,52,18]  },
                bubble: "rgba(255,200,150,0.3)",
                streakColor: "rgba(255,220,150,{a})"
            },
            {
                id: "night",
                name: "Night Pond",
                cost: 550,
                comingSoon: false,
                calm:  { top:[30,27,75],   mid:[17,24,39],    bot:[7,10,20]    },
                fast:  { top:[49,46,129],  mid:[30,27,75],    bot:[17,24,39]   },
                bubble: "rgba(148,163,184,0.2)",
                streakColor: "rgba(200,220,255,{a})"
            },
            {
                id: "winter",
                name: "Winter Pond",
                cost: 700,
                comingSoon: false,
                calm:  { top:[224,242,254], mid:[186,230,253], bot:[125,211,252] },
                fast:  { top:[240,249,255], mid:[224,242,254], bot:[147,197,253] },
                bubble: "rgba(220,240,255,0.35)",
                streakColor: "rgba(200,230,255,{a})"
            }
        ];

        let currentTheme = localStorage.getItem("frogCurrentTheme") || "classic";
        let unlockedThemes = JSON.parse(localStorage.getItem("frogUnlockedThemes")) || ["classic"];
        let shopTab = "skins";   // "skins" | "themes"

        let showDailyBonusBanner = false;
        let dailyBonusAlreadyClaimed = false;
        let bannerTimer = 0;

        let totalRuns = parseInt(localStorage.getItem("frogTotalRuns")) || 0;
        let totalStarsEver = parseInt(localStorage.getItem("frogTotalStarsEver")) || 0;

        function checkDailyLogin() {
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem("frogLastVisitDate");
            
            if (lastVisit !== today) {
                addStars(20);
                localStorage.setItem("frogLastVisitDate", today);
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = false;
                bannerTimer = 180; 
            } else {
                // Already claimed today — show a reminder on the home page
                showDailyBonusBanner = true;
                dailyBonusAlreadyClaimed = true;
                bannerTimer = 180;
            }
        }
        checkDailyLogin();

        // Init SDK; signal loading complete once the page is ready
        initCrazyGamesSDK().then(() => {
            try { if (cgSDK) { cgSDK.game.loadingStop(); cgGameplayStop(); } } catch(e) {}
        });

        let gameState = "START_MENU"; 

        let frogX = 100;
        let frogY = 300;
        let frogRadius = 16;
        let velocity = 0;
        let gravity = 0.4;
        let jumpStrength = -7.5;
        let score = 0;
        let starsCollectedThisRound = 0;
        let isPaused = false;
        let highScore = localStorage.getItem("frogHighScore") || 0;
        let isFirstRun = !localStorage.getItem("frogHasPlayed");
        let tutorialStep = 0;
        let tutorialTimer = 0;

        // Jumping piranhas (score >= 300)
        let piranhas = [];          // { x, y, vx, vy, phase: "ripple"|"jump", rippleTimer, rippleR }
        let piranhaTimer = 0;
        let piranhaInterval = 420; // frames between piranha warnings (~7s initially)

        // Carnivorous plant snap death
        let snapPlant = null;   // { x, y, snapAngle, timer } — plays snap-shut anim before GAME_OVER
        let snapDeathPending = false;

        // Celebration banners
        let personalBestBanner = false;
        let personalBestTimer = 0;
        let milestoneBanner = null;           // { score, timer }
        let milestonesReachedThisRun = new Set(); // avoid duplicate banners

        // Start screen animated frog
        let startScreenFrogY = 200;
        let startScreenFrogVel = 0;
        let startScreenFrogWave = 0;

        let lilies = [];
        let baseLilySpeed = 2.5;
        let lilySpeed = baseLilySpeed;
        let maxLilySpeed = 5.5; 
        let spawnTimer = 0;
        let spawnInterval = 90;

        let fishes = [];
        let fishTimer = 0;
        let fishInterval = 160; 

        let ripples = [];

        // Juice variables
        let deathAnim = null;          // { x, y, timer, particles[] }
        let landSquish = 0;            // 0→1 squish amount, decays each frame
        let speedStreaks = [];          // motion blur streaks at max speed
        let deathCount = 0;            // track deaths for ad pacing (every 3)
        let bgDanger = 0;              // 0→1 danger tint, ramps at max speed

        // Parallax layer: ribbon-blade lake weeds with stone base
        const WEED_COLORS = [
            { fill:"#16a34a", highlight:"#4ade80", dark:"#052e16", outline:"#14532d" },
            { fill:"#15803d", highlight:"#34d399", dark:"#052e16", outline:"#064e3b" },
            { fill:"#059669", highlight:"#6ee7b7", dark:"#064e3b", outline:"#065f46" },
        ];
        function makeWeedBlades(bladeCount) {
            let blades = [];
            for (let b = 0; b < bladeCount; b++) {
                blades.push({
                    angle: (b - (bladeCount-1)/2) * 0.38 + (Math.random()-0.5)*0.12,
                    len:   Math.random() * 28 + 38,
                    width: Math.random() * 5 + 7,
                    curve: (Math.random()-0.5) * 18
                });
            }
            return blades;
        }
        let plants = [];
        for (let i = 0; i < 7; i++) {
            let c = WEED_COLORS[Math.floor(Math.random()*WEED_COLORS.length)];
            plants.push({
                x:      Math.random() * 400,
                y:      Math.random() * 160 + 420,
                sway:   Math.random() * Math.PI,
                color:  c,
                blades: makeWeedBlades(Math.floor(Math.random()*2)+3),
                // small stone cluster at base
                stones: Array.from({length: Math.floor(Math.random()*2)+2}, () => ({
                    ox: (Math.random()-0.5)*20,
                    oy: Math.random()*4,
                    rx: Math.random()*7+4,
                    ry: Math.random()*3+2,
                    col: ["#a8a29e","#78716c","#d6d3d1"][Math.floor(Math.random()*3)]
                }))
            });
        }

        let slowBlossom = null; 
        let slowdownTimer = 0;
        let slowdownCooldown = 0;
        let dynamicSlowMultiplier = 1.0;
        let preSlowSpeed = 0;       // speed at the moment the freeze lily was collected
        let rampBackTimer = 0;      // counts up during speed ramp-back phase
        let rampBackDuration = 300; // frames (~5s) to ramp back to pre-slow speed

        // Freeze lily: random spawn timer (10-20 seconds = 600-1200 frames at 60fps)
        function newFreezeLilyDelay() {
            // 15-22 seconds at 60fps = 900-1320 frames
            return Math.floor(Math.random() * 420) + 900;
        }
        let freezeLilySpawnTimer = newFreezeLilyDelay();

        let bubbles = [];
        for (let i = 0; i < 15; i++) {
            bubbles.push({
                x: Math.random() * 400,
                y: Math.random() * 600,
                radius: Math.random() * 6 + 2,
                speed: Math.random() * 0.5 + 0.2,
                pulse: Math.random() * Math.PI
            });
        }

        function saveShopData() {
            localStorage.setItem("frogTotalStars", totalStars);
            localStorage.setItem("frogUnlockedSkins", JSON.stringify(unlockedSkins));
            localStorage.setItem("frogCurrentSkin", currentSkin);
            localStorage.setItem("frogCurrentTheme", currentTheme);
            localStorage.setItem("frogUnlockedThemes", JSON.stringify(unlockedThemes));
        }

        function addStars(amount) {
            totalStars += amount;
            totalStarsEver += amount;
            localStorage.setItem("frogTotalStarsEver", totalStarsEver);
            localStorage.setItem("frogTotalStars", totalStars);
        }

        function resetGame() {
            // Count this as a completed run (if player actually played, not first load)
            if (score > 0 || gameState === "GAME_OVER") {
                totalRuns++;
                localStorage.setItem("frogTotalRuns", totalRuns);
            }
            frogX = 100;
            frogY = 250;
            velocity = 0;
            lilies = [];
            fishes = [];
            ripples = [];
            slowBlossom = null;
            slowdownTimer = 0;
            slowdownCooldown = 0;
            dynamicSlowMultiplier = 1.0;
            preSlowSpeed = 0;
            rampBackTimer = 0;
            freezeLilySpawnTimer = newFreezeLilyDelay();
            deathAnim = null;
            landSquish = 0;
            bgDanger = 0;
            speedStreaks = [];
            score = 0;
            starsCollectedThisRound = 0;
            lilySpeed = baseLilySpeed;
            spawnTimer = 0;
            fishTimer = 0;
            spawnInterval = 90;
            gameState = "PLAYING";
            if (audioCtx) startBgMusic();
            cgGameplayStart();
            // Mark first run and set up tutorial
            if (isFirstRun) {
                localStorage.setItem("frogHasPlayed", "1");
                isFirstRun = false;
                tutorialStep = 0;
                tutorialTimer = 300;  // show step 0 for ~5s
            } else {
                tutorialStep = 2;    // skip entirely on returning players
            }
            personalBestBanner = false;
            personalBestTimer = 0;
            milestoneBanner = null;
            milestonesReachedThisRun.clear();
            isPaused = false;
            snapPlant = null;
            snapDeathPending = false;
            canRevive = true;
            reviveUsed = false;
            piranhas = [];
            piranhaTimer = 0;
            piranhaInterval = 420;
            
            lilies.push({
                x: 70,
                y: 300,
                width: 70,
                height: 15,
                purple: false,
                passed: true,
                hasStar: false,
                starType: "gold", 
                starCollected: false,
                justLanded: true
            });
        }

        function triggerDeathAnim() {
            let particles = [];
            for (let i = 0; i < 14; i++) {
                let angle = (Math.PI * 2 / 14) * i + (Math.random() - 0.5) * 0.4;
                let speed = Math.random() * 3.5 + 1.5;
                particles.push({
                    x: frogX, y: frogY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    alpha: 1.0,
                    radius: Math.random() * 5 + 2,
                    color: ["#4ade80","#fef08a","#fff","#22d3ee"][Math.floor(Math.random()*4)]
                });
            }
            deathAnim = { x: frogX, y: frogY, timer: 60, particles };
        }

        function drawRoundedRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
            ctx.fill();
        }

        function spawnLily() {
            let randomY = Math.floor(Math.random() * 250) + 200;
            let lilyW = 65;  // fixed width — difficulty via plants, piranhas, purple frequency
            // Difficulty: purple lilies ramp from 150, plants from 150, piranhas from 350
            let purpleChance = score >= 250 ? 0.45 : (score >= 150 ? 0.32 : 0.25);
            let isPurple = Math.random() < purpleChance;
            let hasStar = !isPurple && Math.random() < 0.66;
            let starType = Math.random() < 0.50 ? "boost" : "gold";
            // Carnivorous plant on purple lilies from score 150
            let hasPlant = false;
            if (isPurple && score >= 150) {
                hasPlant = Math.random() < (score >= 250 ? 0.65 : 0.35);
            }
            // Each plant has its own sway phase and snap timer
            let plantSway = Math.random() * Math.PI * 2;
            let plantSnapAngle = 0.6;   // how open the jaw is (0=closed, 1=fully open)
            let plantSnapDir = -1;      // -1 closing, +1 opening
            
            lilies.push({
                x: canvas.width,
                y: randomY,
                width: lilyW,
                height: 15,
                purple: isPurple,
                passed: false,
                hasStar: hasStar,
                starType: starType,
                starCollected: false,
                justLanded: false,
                hasPlant,
                plantSway,
                plantSnapAngle,
                plantSnapDir
            });
        }

        function spawnFish() {
            let randomY = Math.floor(Math.random() * 280) + 180;
            fishes.push({
                x: canvas.width + 50, 
                y: randomY,
                baseY: randomY,
                angle: 0,
                radius: 12
            });
        }

        function isStandingOn(lily) {
            return frogX + frogRadius > lily.x &&
                   frogX - frogRadius < lily.x + lily.width &&
                   frogY + frogRadius >= lily.y &&
                   frogY + frogRadius <= lily.y + lily.height &&
                   velocity >= 0;
        }

        function checkSideCollision(lily) {
            let padding = lily.purple ? 5 : 0;
            return frogX + frogRadius > lily.x - padding &&
                   frogX - frogRadius < lily.x + lily.width + padding &&
                   frogY + frogRadius > lily.y - padding &&
                   frogY - frogRadius < lily.y + lily.height + padding;
        }

        function checkFishCollision(fish) {
            let dx = frogX - fish.x;
            let dy = frogY - fish.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            return distance < frogRadius + fish.radius;
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            
            let starGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, outerRadius);
            if (color === "boost") {
                starGrad.addColorStop(0, "#ff85a2");
                starGrad.addColorStop(1, "#AA1C41");
            } else {
                starGrad.addColorStop(0, "#fffbeb");
                starGrad.addColorStop(1, "#f59e0b");
            }
            
            ctx.fillStyle = starGrad;
            ctx.fill();
            // Thin outline so star reads on any background
            if (currentTheme === "night" || currentTheme === "sunset") {
                ctx.strokeStyle = currentTheme === "night" ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.25)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawSlowBlossom(cx, cy, radius, blinkState) {
            ctx.save();
            ctx.fillStyle = blinkState ? "#4274D9" : "#06b6d4";
            ctx.shadowBlur = 14;
            ctx.shadowColor = blinkState ? "#4274D9" : "#06b6d4";
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                let angle = (i * Math.PI) / 3;
                let px = cx + Math.cos(angle) * radius * 0.65;
                let py = cy + Math.sin(angle) * radius * 0.45;
                ctx.ellipse(px, py, radius * 0.7, radius * 0.35, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "#e0f7fa";
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawLogo(cx, cy) {
            ctx.save();
            let r = 18;
            
            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.beginPath();
            ctx.arc(cx, cy + 3, r, 0, Math.PI * 2);
            ctx.fill();

            let baseGrad = ctx.createRadialGradient(cx - 3, cy - 5, 2, cx, cy, r);
            baseGrad.addColorStop(0, "#4ade80");
            baseGrad.addColorStop(1, "#16a34a");
            ctx.fillStyle = baseGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fef08a";
            ctx.beginPath();
            ctx.arc(cx, cy + 5, 11, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#4ade80";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 5.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#0284c7";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 3.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(cx - 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.arc(cx + 9, cy - 13, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx - 10.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.arc(cx + 7.5, cy - 14.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(cx, cy + 1, 7, 0, Math.PI);
            ctx.stroke();

            ctx.restore();
        }

        function drawMuteIcon() {
            ctx.save();
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            drawRoundedRect(canvas.width - 50, canvas.height - 50, 40, 40, 10);

            ctx.fillStyle = "#fff";
            ctx.font = "28px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (isMuted) {
                ctx.fillText("🔇", canvas.width - 30, canvas.height - 30);
            } else {
                ctx.fillText("🔊", canvas.width - 30, canvas.height - 30);
            }
            ctx.restore();
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (clientX === undefined || clientY === undefined) return;
            
            const clickX = clientX - rect.left;
            const clickY = clientY - rect.top;

            initAudio();

            if (clickX >= canvas.width - 50 && clickX <= canvas.width - 10 &&
                clickY >= canvas.height - 50 && clickY <= canvas.height - 10) {
                toggleMute();
                return; 
            }

            // Pause button — only active during PLAYING
            if (gameState === "PLAYING" &&
                clickX >= canvas.width - 45 && clickX <= canvas.width - 10 &&
                clickY >= 10 && clickY <= 45) {
                isPaused = !isPaused;
                if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                return;
            }

            // Block jumps and other input while paused
            if (gameState === "PLAYING" && isPaused) return;

            // Advance tutorial on first tap
            if (gameState === "PLAYING" && tutorialStep === 0) {
                tutorialStep = 1;
                tutorialTimer = 320;  // show purple lily warning for ~5.3s
            }

            if (gameState === "START_MENU") {
                // Daily ad bonus button
                if (clickX >= canvas.width/2 - 110 && clickX <= canvas.width/2 + 110 &&
                    clickY >= canvas.height - 70 && clickY <= canvas.height - 28) {
                    let today = new Date().toDateString();
                    let lastAdBonus = localStorage.getItem("frogLastAdBonus");
                    if (lastAdBonus === today) {
                        // Already claimed today — show brief message (handled by existing banner system)
                        return;
                    }
                    cgRequestRewardedAd(
                        () => {
                            addStars(15);
                            localStorage.setItem("frogLastAdBonus", today);
                        },
                        null
                    );
                    return;
                }
                if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                    clickY >= canvas.height / 2 + 135 && clickY <= canvas.height / 2 + 185) {
                    gameState = "SHOP";
                    shopIndex = 0;
                    shopTab = "skins";
                    cgGameplayStop();
                } else if (clickX >= canvas.width / 2 - 80 && clickX <= canvas.width / 2 + 80 &&
                           clickY >= canvas.height / 2 + 70 && clickY <= canvas.height / 2 + 120) {
                    resetGame();
                }
            } 
            else if (gameState === "SHOP") {
                // Back button
                if (clickX >= 14 && clickX <= 84 && clickY >= 14 && clickY <= 50) {
                    gameState = "START_MENU"; return;
                }
                // Tab: Skins (left half, y 88-124)
                if (clickX >= canvas.width/2 - 150 && clickX <= canvas.width/2 - 12 && clickY >= 88 && clickY <= 124) {
                    shopTab = "skins"; shopIndex = 0; return;
                }
                // Tab: Themes (right half, y 88-124)
                if (clickX >= canvas.width/2 + 12 && clickX <= canvas.width/2 + 150 && clickY >= 88 && clickY <= 124) {
                    shopTab = "themes"; shopIndex = 0; return;
                }
                // Arrow left
                if (clickX >= 10 && clickX <= 90 && clickY >= 220 && clickY <= 300) {
                    let len = shopTab === "skins" ? skinsData.length : themesData.length;
                    shopIndex = (shopIndex - 1 + len) % len; return;
                }
                // Arrow right
                if (clickX >= 310 && clickX <= 390 && clickY >= 220 && clickY <= 300) {
                    let len = shopTab === "skins" ? skinsData.length : themesData.length;
                    shopIndex = (shopIndex + 1) % len; return;
                }
                // Action button (BUY/EQUIP/APPLY)
                if (clickX >= canvas.width/2 - 90 && clickX <= canvas.width/2 + 90 && clickY >= 348 && clickY <= 398) {
                    if (shopTab === "skins") {
                        let sel = skinsData[shopIndex];
                        if (sel.comingSoon) return;
                        if (unlockedSkins.includes(sel.id)) {
                            currentSkin = sel.id; saveShopData();
                        } else if (totalStars >= sel.cost) {
                            totalStars -= sel.cost;
                            unlockedSkins.push(sel.id);
                            currentSkin = sel.id; saveShopData();
                        }
                    } else {
                        let sel = themesData[shopIndex % themesData.length];
                        if (unlockedThemes.includes(sel.id)) {
                            currentTheme = sel.id; saveShopData();
                        } else if (totalStars >= sel.cost) {
                            totalStars -= sel.cost;
                            unlockedThemes.push(sel.id);
                            currentTheme = sel.id; saveShopData();
                        }
                    }
                }
            } 
            else if (gameState === "GAME_OVER") {
                let cx3   = canvas.width / 2;
                let goReviveY  = canvas.height/2 + 42;
                let goBoostY   = canvas.height/2 + 102;
                let goRestartY = canvas.height/2 + 162;
                let goMenuY    = canvas.height/2 + 222;

                // Revive button
                if (canRevive && score > 5 &&
                    clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goReviveY && clickY <= goReviveY+48) {
                    cgRequestRewardedAd(() => { doRevive(); }, null);
                    return;
                }
                // Star Boost button
                if (clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goBoostY && clickY <= goBoostY+48) {
                    cgRequestRewardedAd(() => {
                        let bonus = Math.ceil(starsCollectedThisRound * 0.5);
                        addStars(bonus);
                    }, null);
                    return;
                }
                // Main Menu button
                if (clickX >= cx3-90 && clickX <= cx3+90 &&
                    clickY >= goMenuY && clickY <= goMenuY+48) {
                    cgRequestMidgameAd(() => { gameState = "START_MENU"; cgGameplayStop(); });
                    return;
                }
                // Play Again / tap anywhere else
                resetGame();
            } 
            else if (gameState === "PLAYING") {
                velocity = jumpStrength;
                playJumpSound();
            }
        }

        window.addEventListener("keydown", function(e) {
            if (e.code === "Space") {
                e.preventDefault();
                if (gameState === "PLAYING") {
                    handleCanvasClick({ clientX: canvas.getBoundingClientRect().left + 200, clientY: canvas.getBoundingClientRect().top + 300 });
                } else if (gameState === "GAME_OVER") {
                    resetGame();
                } else if (gameState === "START_MENU") {
                    resetGame();
                }
            }
            // Arrow keys navigate the shop
            else if (e.code === "ArrowLeft" && gameState === "SHOP") {
                e.preventDefault();
                let len = shopTab === "skins" ? skinsData.length : themesData.length;
                shopIndex = (shopIndex - 1 + len) % len;
            }
            else if (e.code === "ArrowRight" && gameState === "SHOP") {
                e.preventDefault();
                let len2 = shopTab === "skins" ? skinsData.length : themesData.length;
                shopIndex = (shopIndex + 1) % len2;
            }
            else if (e.code === "Tab" && gameState === "SHOP") {
                e.preventDefault();
                shopTab = shopTab === "skins" ? "themes" : "skins";
                shopIndex = 0;
            }
            else if ((e.code === "Enter" || e.code === "Space") && gameState === "SHOP") {
                e.preventDefault();
                if (shopTab === "skins") {
                    let sel = skinsData[shopIndex];
                    if (sel.comingSoon) return;
                    if (unlockedSkins.includes(sel.id)) {
                        currentSkin = sel.id; saveShopData();
                    } else if (totalStars >= sel.cost) {
                        totalStars -= sel.cost;
                        unlockedSkins.push(sel.id);
                        currentSkin = sel.id; saveShopData();
                    }
                } else {
                    let sel = themesData[shopIndex % themesData.length];
                    if (unlockedThemes.includes(sel.id)) {
                        currentTheme = sel.id; saveShopData();
                    } else if (totalStars >= sel.cost) {
                        totalStars -= sel.cost;
                        unlockedThemes.push(sel.id);
                        currentTheme = sel.id; saveShopData();
                    }
                }
            }
            else if (e.code === "KeyM") {
                e.preventDefault();
                toggleMute();
            }
            else if (e.code === "KeyP" || e.code === "Escape") {
                if (gameState === "PLAYING") {
                    e.preventDefault();
                    isPaused = !isPaused;
                    if (isPaused) stopBgMusic(); else if (!isMuted) startBgMusic();
                }
            }
        });

        function drawBackground() {
            // Use active pond theme for gradient colours
            let th = themesData.find(t => t.id === currentTheme) || themesData[0];
            let d = bgDanger;
            function lerp(a, b) { return Math.round(a + (b-a)*d); }

            let topR = lerp(th.calm.top[0], th.fast.top[0]);
            let topG = lerp(th.calm.top[1], th.fast.top[1]);
            let topB = lerp(th.calm.top[2], th.fast.top[2]);
            let midR = lerp(th.calm.mid[0], th.fast.mid[0]);
            let midG = lerp(th.calm.mid[1], th.fast.mid[1]);
            let midB = lerp(th.calm.mid[2], th.fast.mid[2]);
            let botR = lerp(th.calm.bot[0], th.fast.bot[0]);
            let botG = lerp(th.calm.bot[1], th.fast.bot[1]);
            let botB = lerp(th.calm.bot[2], th.fast.bot[2]);

            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0,    `rgb(${topR},${topG},${topB})`);
            skyGrad.addColorStop(0.42, `rgb(${midR},${midG},${midB})`);
            skyGrad.addColorStop(1,    `rgb(${botR},${botG},${botB})`);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Parallax: ribbon-blade weeds with stone base (like reference image)
            ctx.save();
            for (let p of plants) {
                let sw = Math.sin(p.sway) * 8; // sway offset
                let c  = p.color;

                // Stone cluster at base
                for (let s of p.stones) {
                    let sg = ctx.createRadialGradient(
                        p.x+s.ox-s.rx*0.3, p.y+s.oy-s.ry*0.3, 1,
                        p.x+s.ox, p.y+s.oy, s.rx
                    );
                    sg.addColorStop(0, "#e7e5e4");
                    sg.addColorStop(1, s.col);
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.ellipse(p.x+s.ox, p.y+s.oy, s.rx, s.ry, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.13)";
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }

                // Each blade: dark outline filled with mid-green, highlight stripe
                for (let bl of p.blades) {
                    let bSway = sw * (0.7 + Math.abs(bl.angle) * 0.5);
                    let tipX = p.x + Math.sin(bl.angle) * bl.len + bSway + bl.curve;
                    let tipY = p.y - Math.cos(bl.angle) * bl.len;
                    let ctrlX = p.x + Math.sin(bl.angle) * bl.len*0.55 + bSway*0.5 + bl.curve*0.6;
                    let ctrlY = p.y - Math.cos(bl.angle) * bl.len*0.55;

                    // Perpendicular offset for blade width
                    let nx = -Math.cos(bl.angle) * bl.width * 0.5;
                    let ny = -Math.sin(bl.angle) * bl.width * 0.5;

                    // Filled blade shape
                    ctx.beginPath();
                    ctx.moveTo(p.x - nx*0.4, p.y - ny*0.4);
                    ctx.quadraticCurveTo(ctrlX - nx, ctrlY - ny, tipX, tipY);
                    ctx.quadraticCurveTo(ctrlX + nx, ctrlY + ny, p.x + nx*0.4, p.y + ny*0.4);
                    ctx.closePath();
                    ctx.fillStyle = c.fill;
                    ctx.fill();

                    // Dark outline
                    ctx.strokeStyle = c.outline;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    // Central highlight stripe
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.quadraticCurveTo(
                        ctrlX + nx*0.1, ctrlY + ny*0.1,
                        tipX - nx*0.15, tipY - ny*0.15
                    );
                    ctx.strokeStyle = c.highlight;
                    ctx.lineWidth = bl.width * 0.22;
                    ctx.globalAlpha = 0.55;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            ctx.restore();

            // Bubbles
            let activeTh = themesData.find(t => t.id === currentTheme) || themesData[0];
            ctx.fillStyle = activeTh.bubble;
            for (let b of bubbles) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            // Night theme: add a moon reflection
            if (currentTheme === "night") {
                ctx.fillStyle = "rgba(248,250,252,0.08)";
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, 560, 60, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "rgba(248,250,252,0.12)";
                ctx.beginPath();
                ctx.arc(canvas.width/2, 30, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "rgba(248,250,252,0.06)";
                ctx.beginPath();
                ctx.arc(canvas.width/2, 30, 22, 0, Math.PI*2);
                ctx.fill();
            }
            // Winter theme: snowflakes instead of bubbles
            if (currentTheme === "winter") {
                ctx.strokeStyle = "rgba(200,230,255,0.5)";
                ctx.lineWidth = 1;
                for (let b of bubbles) {
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(b.pulse);
                    for (let arm = 0; arm < 6; arm++) {
                        ctx.beginPath();
                        ctx.moveTo(0,0);
                        ctx.lineTo(0, -b.radius * 1.2);
                        ctx.stroke();
                        ctx.rotate(Math.PI/3);
                    }
                    ctx.restore();
                }
            }
        }

        function drawFrog(fx, fy, skinId) {
            let sData = skinsData.find(s => s.id === skinId) || skinsData[0];
            
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath();
            ctx.arc(fx - 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.arc(fx + 10, fy + 8, 7, 0, Math.PI * 2);
            ctx.fill();

            // Apply landing squish: compress Y, stretch X
            let sq = landSquish;
            let scaleX = 1 + sq * 0.35;
            let scaleY = 1 - sq * 0.25;

            ctx.save();
            ctx.translate(fx, fy);
            ctx.scale(scaleX, scaleY);
            ctx.translate(-fx, -fy);

            let bodyGrad = ctx.createRadialGradient(fx - 4, fy - 6, 2, fx, fy, frogRadius);
            bodyGrad.addColorStop(0, sData.color);
            bodyGrad.addColorStop(1, adjustColorBrightness(sData.color, -25)); 
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(fx, fy, frogRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = sData.color;
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 5, 0, Math.PI * 2);
            ctx.fill();

            if (skinId === "alien") {
                ctx.fillStyle = "#a855f7"; 
            } else {
                ctx.fillStyle = "#0284c7";
            }
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(fx - 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.arc(fx + 8, fy - 12, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(fx - 9.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.arc(fx + 6.5, fy - 13.5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = sData.belly;
            ctx.beginPath();
            ctx.arc(fx, fy + 4, 10, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore(); // end squish transform

            ctx.strokeStyle = "#7c2d12";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(fx, fy - 1, 8, 0, Math.PI);
            ctx.stroke();

            if (skinId === "student") {
                ctx.fillStyle = "#0284c7";
                ctx.fillRect(fx - 12, fy - 22, 24, 3);
                ctx.beginPath(); ctx.moveTo(fx, fy - 22); ctx.lineTo(fx - 12, fy - 26); ctx.lineTo(fx, fy - 30); ctx.lineTo(fx + 12, fy - 26); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "ninja") {
                ctx.fillStyle = "#f43f5e";
                ctx.fillRect(fx - 12, fy - 8, 24, 3);
            }
            else if (skinId === "wizard") {
                ctx.fillStyle = "#7c3aed";
                ctx.beginPath(); ctx.moveTo(fx - 10, fy - 18); ctx.lineTo(fx, fy - 36); ctx.lineTo(fx + 10, fy - 18); ctx.closePath(); ctx.fill();
                ctx.fillStyle = "#fde047";
                ctx.beginPath(); ctx.arc(fx, fy - 25, 2, 0, Math.PI * 2); ctx.fill();
            }
            else if (skinId === "royal") {
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath(); ctx.moveTo(fx - 8, fy - 18); ctx.lineTo(fx - 8, fy - 25); ctx.lineTo(fx - 4, fy - 21); ctx.lineTo(fx, fy - 28); ctx.lineTo(fx + 4, fy - 21); ctx.lineTo(fx + 8, fy - 25); ctx.lineTo(fx + 8, fy - 18); ctx.closePath(); ctx.fill();
            }
            else if (skinId === "party") {
                let hue = (Date.now() / 4) % 360;
                ctx.strokeStyle = "hsl(" + hue + ", 100%, 60%)";
                ctx.lineWidth = 2;
                ctx.strokeRect(fx - 13, fy - 10, 11, 7);
                ctx.strokeRect(fx + 2, fy - 10, 11, 7);
                ctx.lineWidth = 1;
                for(let l = -11; l <= -4; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
                for(let l = 4; l <= 11; l+=3) {
                    ctx.beginPath(); ctx.moveTo(fx + l, fy - 10); ctx.lineTo(fx + l, fy - 3); ctx.stroke();
                }
            }
            else if (skinId === "alien") {
                ctx.fillStyle = "#a855f7";
                ctx.fillRect(fx - 2, fy - 26, 4, 10);
                ctx.fillStyle = "#22c55e";
                ctx.beginPath();
                ctx.arc(fx, fy - 27, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function adjustColorBrightness(hex, percent) {
            let num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        function draw() {
            drawBackground();

            if (gameState === "PLAYING") {
                for (let r of ripples) {
                    ctx.strokeStyle = "rgba(255, 255, 255, " + r.alpha + ")";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(r.x, r.y, r.radius * 1.5, r.radius * 0.6, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            if (gameState === "START_MENU") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw animated frog on a lily pad
                let lilyX = canvas.width / 2;
                let lilyY = startScreenFrogY + 50;
                // Lily pad
                let padGrad = ctx.createLinearGradient(lilyX - 35, lilyY - 40, lilyX + 35, lilyY - 40);
                padGrad.addColorStop(0, "#4ade80");
                padGrad.addColorStop(1, "#16a34a");
                ctx.fillStyle = padGrad;
                ctx.beginPath();
                ctx.ellipse(lilyX, lilyY, 35, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                // Lily petals
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                for (let i = 0; i < 5; i++) {
                    let px = lilyX + Math.cos(i * 1.2) * 8;
                    let py = lilyY + Math.sin(i * 1.2) * 5;
                    ctx.beginPath();
                    ctx.arc(px, py, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = "#eab308";
                ctx.beginPath();
                ctx.arc(lilyX, lilyY, 3, 0, Math.PI * 2);
                ctx.fill();
                // Frog on the lily
                drawFrog(lilyX, startScreenFrogY, currentSkin);

                drawLogo(canvas.width / 2, canvas.height / 2 - 200);

                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 34px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText("FROGGY", canvas.width / 2, canvas.height / 2 - 135);
                
                ctx.fillStyle = "#ea580c";
                ctx.fillText("ADVENTURE", canvas.width / 2, canvas.height / 2 - 85);

                drawMuteIcon();

                ctx.fillStyle = "#b45309";
                ctx.font = "bold 18px Arial";
                ctx.fillText("⭐ " + totalStars, canvas.width / 2, canvas.height / 2 + 40);

                ctx.fillStyle = "#1e40af";
                ctx.font = "14px Arial";
                ctx.fillText("PC: Spacebar or Tap to Jump", canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillText("Mobile: Tap to Jump", canvas.width / 2, canvas.height / 2 + 12);
                ctx.fillStyle = "#64748b";
                ctx.font = "12px Arial";
                ctx.fillText("P or Esc to Pause", canvas.width / 2, canvas.height / 2 + 30);

                // Extra daily stars rewarded ad button
                ctx.fillStyle = "rgba(251,191,36,0.18)";
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 110, canvas.height - 70, 220, 42, 12);
                ctx.fill();
                ctx.strokeStyle = "#fbbf24";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 110, canvas.height - 70, 220, 42, 12);
                ctx.stroke();
                ctx.fillStyle = "#fbbf24";
                ctx.font = "bold 13px Arial";
                ctx.fillText("▶  Watch ad for +15 Stars", canvas.width/2, canvas.height - 48);
                ctx.fillStyle = "rgba(100,116,139,0.8)";
                ctx.font = "10px Arial";
                ctx.fillText("once per day bonus", canvas.width/2, canvas.height - 34);

                ctx.fillStyle = "#10b981";
                drawRoundedRect(canvas.width / 2 - 80, canvas.height / 2 + 70, 160, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("PLAY", canvas.width / 2, canvas.height / 2 + 101);

                ctx.fillStyle = "#f59e0b";
                drawRoundedRect(canvas.width / 2 - 80, canvas.height / 2 + 135, 160, 50, 15);
                ctx.fillStyle = "#fff";
                ctx.fillText("SHOP 🛒", canvas.width / 2, canvas.height / 2 + 166);

                if (showDailyBonusBanner && bannerTimer > 0) {
                    ctx.fillStyle = "rgba(30, 41, 59, 0.9)";
                    drawRoundedRect(30, 18, canvas.width - 60, 54, 12);
                    if (dailyBonusAlreadyClaimed) {
                        ctx.fillStyle = "#67e8f9";
                        ctx.font = "bold 13px Arial";
                        ctx.fillText("⭐ Come back daily for +20 Stars!", canvas.width / 2, 40);
                        ctx.fillStyle = "#94a3b8";
                        ctx.font = "12px Arial";
                        ctx.fillText("You already collected today's bonus.", canvas.width / 2, 60);
                    } else {
                        ctx.fillStyle = "#fbbf24";
                        ctx.font = "bold 15px Arial";
                        ctx.fillText("🎉 Daily Reward: +20 Stars!", canvas.width / 2, 40);
                        ctx.fillStyle = "#a7f3d0";
                        ctx.font = "12px Arial";
                        ctx.fillText("Visit every day to earn your bonus!", canvas.width / 2, 60);
                    }
                }
                
                ctx.textAlign = "start";
                return;
            }

            if (gameState === "SHOP") {
                ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Header
                ctx.fillStyle = "#0e7490";
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText("FROG SHOP", canvas.width / 2, 52);
                ctx.fillStyle = "#c2410c";
                ctx.font = "bold 17px Arial";
                ctx.fillText("⭐ " + totalStars + " stars", canvas.width / 2, 76);

                // Back button
                ctx.fillStyle = "#0891b2";
                drawRoundedRect(14, 14, 70, 36, 10);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 13px Arial";
                ctx.fillText("BACK", 49, 37);

                // ── Tab buttons ────────────────────────────────────────────
                let tabY = 88;
                // Skins tab
                ctx.fillStyle = shopTab === "skins" ? "#0e7490" : "rgba(14,116,144,0.25)";
                drawRoundedRect(canvas.width/2 - 150, tabY, 138, 36, [10,10,0,0]);
                ctx.fillStyle = shopTab === "skins" ? "#fff" : "#0e7490";
                ctx.font = "bold 13px Arial";
                ctx.fillText("🐸  SKINS", canvas.width/2 - 81, tabY + 23);
                // Themes tab
                ctx.fillStyle = shopTab === "themes" ? "#7c3aed" : "rgba(124,58,237,0.2)";
                drawRoundedRect(canvas.width/2 + 12, tabY, 138, 36, [10,10,0,0]);
                ctx.fillStyle = shopTab === "themes" ? "#fff" : "#7c3aed";
                ctx.fillText("🌊  THEMES", canvas.width/2 + 81, tabY + 23);

                // Tab underline
                ctx.fillStyle = shopTab === "skins" ? "#0e7490" : "#7c3aed";
                ctx.fillRect(14, tabY + 36, canvas.width - 28, 2);

                // ── SKINS TAB ────────────────────────────────────────────
                if (shopTab === "skins") {
                    let activeSkin = skinsData[shopIndex];
                    ctx.fillStyle = "#1e293b";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(activeSkin.name, canvas.width / 2, 185);

                    ctx.fillStyle = "rgba(255,255,255,0.4)";
                    drawRoundedRect(canvas.width/2 - 46, 198, 92, 100, 15);
                    drawFrog(canvas.width / 2, 252, activeSkin.id);

                    ctx.fillStyle = "#0e7490";
                    ctx.font = "bold 28px Arial";
                    ctx.fillText("◀", 48, 258);
                    ctx.fillText("▶", 352, 258);

                    let isUnlocked = unlockedSkins.includes(activeSkin.id);
                    let isCurrent = currentSkin === activeSkin.id;

                    if (!isUnlocked && !activeSkin.comingSoon) {
                        let progress = Math.min(1, totalStars / activeSkin.cost);
                        let barW = 180, barH = 9, barX = canvas.width/2 - 90, barY = 316;
                        ctx.fillStyle = "#1e293b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 5); ctx.fill();
                        ctx.fillStyle = progress >= 1 ? "#10b981" : "#f59e0b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 5); ctx.fill();
                        ctx.fillStyle = "#94a3b8";
                        ctx.font = "11px Arial";
                        ctx.fillText("⭐ " + totalStars + " / " + activeSkin.cost, canvas.width/2, barY + 22);
                    }

                    let btnY2 = 348;
                    if (activeSkin.comingSoon) {
                        ctx.fillStyle = "#475569";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 65, 15);
                        ctx.fillStyle = "#fbbf24"; ctx.font = "bold 20px Arial";
                        ctx.fillText("🔒", canvas.width/2, btnY2 + 24);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 13px Arial";
                        ctx.fillText("COMING SOON", canvas.width/2, btnY2 + 42);
                        ctx.fillStyle = "#fde68a"; ctx.font = "12px Arial";
                        ctx.fillText("⭐ " + activeSkin.cost + " stars", canvas.width/2, btnY2 + 57);
                    } else if (isCurrent) {
                        ctx.fillStyle = "#64748b";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("EQUIPPED", canvas.width/2, btnY2 + 31);
                    } else if (isUnlocked) {
                        ctx.fillStyle = "#10b981";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("EQUIP", canvas.width/2, btnY2 + 31);
                    } else {
                        let canBuy = totalStars >= activeSkin.cost;
                        ctx.fillStyle = canBuy ? "#f59e0b" : "#94a3b8";
                        drawRoundedRect(canvas.width/2 - 90, btnY2, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("BUY: ⭐ " + activeSkin.cost, canvas.width/2, btnY2 + 31);
                    }

                    // Dot indicators
                    let dotY = 430;
                    for (let i = 0; i < skinsData.length; i++) {
                        ctx.fillStyle = i === shopIndex ? "#0e7490" : "rgba(14,116,144,0.3)";
                        ctx.beginPath(); ctx.arc(canvas.width/2 - (skinsData.length-1)*8 + i*16, dotY, 4, 0, Math.PI*2); ctx.fill();
                    }

                // ── THEMES TAB ───────────────────────────────────────────
                } else {
                    let activeTheme = themesData[shopIndex % themesData.length];
                    ctx.fillStyle = "#1e293b";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(activeTheme.name, canvas.width/2, 185);

                    // Theme preview: mini gradient swatch
                    let swX = canvas.width/2 - 90, swY = 198, swW = 180, swH = 100;
                    let swGrad = ctx.createLinearGradient(swX, swY, swX, swY + swH);
                    let tc = activeTheme.calm;
                    swGrad.addColorStop(0,   `rgb(${tc.top[0]},${tc.top[1]},${tc.top[2]})`);
                    swGrad.addColorStop(0.5, `rgb(${tc.mid[0]},${tc.mid[1]},${tc.mid[2]})`);
                    swGrad.addColorStop(1,   `rgb(${tc.bot[0]},${tc.bot[1]},${tc.bot[2]})`);
                    ctx.fillStyle = swGrad;
                    ctx.beginPath(); ctx.roundRect(swX, swY, swW, swH, 12); ctx.fill();
                    // Decorative bubbles in preview
                    ctx.fillStyle = activeTheme.bubble;
                    [[swX+30,swY+70,6],[swX+80,swY+40,4],[swX+140,swY+80,7],[swX+160,swY+55,5]].forEach(([bx,by,br]) => {
                        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
                    });
                    // Label overlay
                    ctx.fillStyle = "rgba(0,0,0,0.25)";
                    ctx.font = "11px Arial";
                    ctx.fillText("PREVIEW", canvas.width/2, swY + swH - 8);

                    ctx.fillStyle = "#7c3aed";
                    ctx.font = "bold 28px Arial";
                    ctx.fillText("◀", 48, 258);
                    ctx.fillText("▶", 352, 258);

                    let thIsUnlocked = unlockedThemes.includes(activeTheme.id);
                    let thIsCurrent = currentTheme === activeTheme.id;

                    if (!thIsUnlocked && activeTheme.cost > 0) {
                        let progress = Math.min(1, totalStars / activeTheme.cost);
                        let barW = 180, barH = 9, barX = canvas.width/2 - 90, barY = 316;
                        ctx.fillStyle = "#1e293b";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 5); ctx.fill();
                        ctx.fillStyle = progress >= 1 ? "#10b981" : "#a78bfa";
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 5); ctx.fill();
                        ctx.fillStyle = "#94a3b8"; ctx.font = "11px Arial";
                        ctx.fillText("⭐ " + totalStars + " / " + activeTheme.cost, canvas.width/2, barY + 22);
                    }

                    let btnY3 = 348;
                    if (thIsCurrent) {
                        ctx.fillStyle = "#64748b";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("ACTIVE", canvas.width/2, btnY3 + 31);
                    } else if (thIsUnlocked) {
                        ctx.fillStyle = "#7c3aed";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("APPLY", canvas.width/2, btnY3 + 31);
                    } else {
                        let canBuy = totalStars >= activeTheme.cost;
                        ctx.fillStyle = canBuy ? "#a78bfa" : "#94a3b8";
                        drawRoundedRect(canvas.width/2 - 90, btnY3, 180, 50, 15);
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial";
                        ctx.fillText("BUY: ⭐ " + activeTheme.cost, canvas.width/2, btnY3 + 31);
                    }

                    // Dot indicators
                    let dotY2 = 430;
                    for (let i = 0; i < themesData.length; i++) {
                        ctx.fillStyle = i === shopIndex % themesData.length ? "#7c3aed" : "rgba(124,58,237,0.3)";
                        ctx.beginPath(); ctx.arc(canvas.width/2 - (themesData.length-1)*8 + i*16, dotY2, 4, 0, Math.PI*2); ctx.fill();
                    }
                }

                ctx.textAlign = "start";
                return;
            }

            // Speed streaks (behind everything)
            if (speedStreaks.length > 0) {
                for (let s of speedStreaks) {
                    let th2 = themesData.find(t => t.id === currentTheme) || themesData[0];
                    ctx.strokeStyle = th2.streakColor.replace("{a}", s.alpha);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x + s.length, s.y);
                    ctx.stroke();
                }
            }

            for (let lily of lilies) {
                let centerX = lily.x + lily.width / 2;
                let centerY = lily.y + lily.height / 2;
                let radiusX = lily.width / 2;
                let radiusY = lily.height / 1.2;

                if (lily.purple) {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#c084fc");
                    padGrad.addColorStop(1, "#7c3aed");
                    ctx.fillStyle = padGrad;
                    
                    ctx.fillStyle = "#f43f5e";
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        let spikeX = centerX + Math.cos(angle) * (radiusX + 5);
                        let spikeY = centerY + Math.sin(angle) * (radiusY - 2);
                        ctx.beginPath(); ctx.arc(spikeX, spikeY, 3, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();
                    // Outline purple lily on sunset to keep it distinct
                    if (currentTheme === "sunset") {
                        ctx.strokeStyle = "rgba(255,255,255,0.6)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    } else if (currentTheme === "night") {
                        ctx.strokeStyle = "rgba(200,150,255,0.7)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    }

                    // Carnivorous plant on top of purple lily
                    if (lily.hasPlant) {
                        let px = centerX;
                        let py = lily.y;
                        let sw = Math.sin(lily.plantSway) * 3;
                        let snapA = lily.plantSnapAngle;

                        ctx.save();

                        // Short stubby stem (height 30)
                        ctx.strokeStyle = "#365314";
                        ctx.lineWidth = 5;
                        ctx.lineCap = "round";
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.bezierCurveTo(px + sw, py - 10, px - sw + 2, py - 22, px + sw, py - 30);
                        ctx.stroke();
                        // Stem highlight
                        ctx.strokeStyle = "#4d7c0f";
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(px + 1, py);
                        ctx.bezierCurveTo(px + sw + 1, py - 10, px - sw + 3, py - 22, px + sw + 1, py - 30);
                        ctx.stroke();

                        // Head at tip of stem — flipped to face LEFT (toward incoming frog)
                        let hx = px + sw;
                        let hy = py - 30;
                        let jawOpen = snapA * 0.65;

                        // Mirror the head horizontally so it faces left
                        ctx.save();
                        ctx.translate(hx, hy);
                        ctx.scale(-1, 1);   // flip: now left side of head faces left in screen space

                        // Bottom jaw
                        ctx.save();
                        ctx.rotate(jawOpen * 0.45);
                        ctx.fillStyle = "#86198f";
                        ctx.beginPath();
                        ctx.moveTo(-18, 0);
                        ctx.bezierCurveTo(-14, 9, 14, 9, 18, 0);
                        ctx.bezierCurveTo(14, -3, -14, -3, -18, 0);
                        ctx.fill();
                        ctx.fillStyle = "#f8fafc";
                        for (let t = -14; t <= 14; t += 5) {
                            ctx.beginPath();
                            ctx.moveTo(t, 1);
                            ctx.lineTo(t + 2, 8);
                            ctx.lineTo(t + 4, 1);
                            ctx.closePath();
                            ctx.fill();
                        }
                        ctx.restore();

                        // Top jaw
                        ctx.save();
                        ctx.rotate(-jawOpen * 1.0);
                        ctx.fillStyle = "#a21caf";
                        ctx.beginPath();
                        ctx.moveTo(-18, 0);
                        ctx.bezierCurveTo(-12, -14, 12, -14, 18, 0);
                        ctx.bezierCurveTo(14, 3, -14, 3, -18, 0);
                        ctx.fill();
                        if (snapA > 0.15) {
                            ctx.fillStyle = `rgba(236,72,153,${snapA * 0.85})`;
                            ctx.beginPath();
                            ctx.ellipse(0, -4, 11 * snapA, 6 * snapA, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        ctx.fillStyle = "#f8fafc";
                        for (let t = -14; t <= 14; t += 5) {
                            ctx.beginPath();
                            ctx.moveTo(t, -1);
                            ctx.lineTo(t + 2, -8);
                            ctx.lineTo(t + 4, -1);
                            ctx.closePath();
                            ctx.fill();
                        }
                        // Eye faces left (positive x in flipped space = left on screen)
                        ctx.fillStyle = "#fef08a";
                        ctx.beginPath();
                        ctx.arc(5, -7, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "#1a1a1a";
                        ctx.beginPath();
                        ctx.arc(5 + snapA * 0.8, -7, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(4 + snapA * 0.8, -8, 1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                        ctx.restore(); // end mirror flip

                        ctx.restore();
                    }
                } else {
                    let padGrad = ctx.createLinearGradient(lily.x, lily.y, lily.x + lily.width, lily.y);
                    padGrad.addColorStop(0, "#4ade80");
                    padGrad.addColorStop(1, "#16a34a");
                    ctx.fillStyle = padGrad;
                    ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.fill();
                    // Outline for visibility on dark/sunset themes
                    if (currentTheme === "night") {
                        ctx.strokeStyle = "rgba(255,255,255,0.55)";
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    } else if (currentTheme === "sunset") {
                        ctx.strokeStyle = "rgba(0,0,0,0.3)";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2); ctx.stroke();
                    }

                    ctx.fillStyle = "rgba(255,255,255,0.85)";
                    for (let i = 0; i < 5; i++) {
                        let petalX = centerX + Math.cos(i * 1.2) * 5;
                        let petalY = centerY + Math.sin(i * 1.2) * 3;
                        ctx.beginPath(); ctx.arc(petalX, petalY, 4, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = "#eab308";
                    ctx.beginPath(); ctx.arc(centerX, centerY, 2.5, 0, Math.PI * 2); ctx.fill();

                    if (lily.hasStar && !lily.starCollected) {
                        let hover = Math.sin(Date.now() * 0.007) * 4;
                        // Halo behind star so it pops on any background
                        let haloColor = currentTheme === "night" ? "rgba(255,255,255,0.25)"
                                      : currentTheme === "sunset" ? "rgba(0,0,0,0.2)"
                                      : "rgba(255,255,255,0.15)";
                        ctx.fillStyle = haloColor;
                        ctx.beginPath(); ctx.arc(centerX, lily.y - 22 + hover, 14, 0, Math.PI*2); ctx.fill();
                        drawStar(centerX, lily.y - 22 + hover, 5, 11, 5, lily.starType);
                    }
                }
            }

            if (slowBlossom) {
